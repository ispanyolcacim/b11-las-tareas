 mismo tiempo, conseguir otras sin comprar?", "a1": "ANUNCIO A:\nOfrecemos excursiones en bicicleta por rutas de monta\u00f1a. Aunque algunas subidas son exigentes, las vistas compensan el esfuerzo. Adem\u00e1s, hacemos paradas para descansar y sacar fotos. Por eso, la experiencia resulta muy completa.", "a2": "ANUNCIO B:\nEn nuestro centro ense\u00f1amos inform\u00e1tica b\u00e1sica a personas mayores. Primero explicamos c\u00f3mo usar el correo electr\u00f3nico y luego trabajamos con aplicaciones \u00fatiles del d\u00eda a d\u00eda. Sin embargo, cada alumno avanza a su ritmo. As\u00ed que nadie se queda atr\u00e1s.", "a3": "ANUNCIO C:\n\u00bfTienes prendas que ya no usas? Tr\u00e1elas a nuestro mercadillo de intercambio. Mientras unas personas dejan ropa, otras encuentran algo que necesitan. Adem\u00e1s, as\u00ed das una segunda vida a tus objetos y reduces el consumo innecesario.", "a4": "ANUNCIO D:\nEste verano abrimos un campamento musical. Los participantes practican canto, ritmo y expresi\u00f3n corporal. A pesar de que el programa es intensivo, hay tambi\u00e9n tiempo para juegos. Por lo tanto, aprender resulta m\u00e1s divertido.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 2, "exp": "Do\u011fru cevap C'dir \u00e7\u00fcnk\u00fc burada kullan\u0131lmayan k\u0131yafet veya aksesuarlar\u0131n getirilip ba\u015fka e\u015fyalarla de\u011fi\u015ftirildi\u011fi bir sistem var. Soruda da sat\u0131n almadan ba\u015fka \u015feyler edinmek isteyen biri anlat\u0131l\u0131yor. Bu mant\u0131k do\u011frudan takas pazar\u0131na uyar."}, {"t": "mc", "badge": "anuncio", "q": "39. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio conviene a una persona que desea iniciarse en el cultivo dom\u00e9stico incluso si no dispone de jard\u00edn?", "a1": "ANUNCIO A:\nSi sue\u00f1as con cultivar tus propias verduras, este curso es para ti. Aprender\u00e1s a preparar la tierra, elegir semillas y cuidar las plantas. Adem\u00e1s, explicamos c\u00f3mo aprovechar balcones y espacios peque\u00f1os. Aunque vivas en un piso, tambi\u00e9n puedes empezar.", "a2": "ANUNCIO B:\nNuestra agencia organiza viajes en barco por la costa. Primero visitamos peque\u00f1as calas y luego hacemos una parada para nadar. Sin embargo, la excursi\u00f3n depende del estado del mar. Por eso, a veces hay cambios de horario.", "a3": "ANUNCIO C:\n\u00bfQuieres aprender a bailar salsa? En nuestras clases semanales practicar\u00e1s pasos b\u00e1sicos y movimientos en pareja. Como el ambiente es muy relajado, mucha gente viene tambi\u00e9n para conocer a otras personas. Adem\u00e1s, no hace falta venir con acompa\u00f1ante.", "a4": "ANUNCIO D:\nCada tarde abrimos una sala de juegos de mesa para adultos. Mientras unos prefieren estrategia, otros eligen juegos r\u00e1pidos y divertidos. A pesar de las diferencias, siempre se crea un ambiente muy agradable. As\u00ed que an\u00edmate a venir.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 0, "exp": "Do\u011fru cevap A'd\u0131r \u00e7\u00fcnk\u00fc ilanda sebze yeti\u015ftirmeyi \u00f6\u011frenmekten ve k\u00fc\u00e7\u00fck alanlar ile balkonlardan yararlanmaktan s\u00f6z ediliyor. Soruda da bah\u00e7esi olmasa bile evde yeti\u015ftiricili\u011fe ba\u015flamak isteyen biri var. Bu nedenle A net \u015fekilde do\u011frudur."}, {"t": "mc", "badge": "anuncio", "q": "40. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio se adapta mejor a una persona interesada en arreglar objetos estropeados para no tirarlos y generar menos basura?", "a1": "ANUNCIO A:\nEn nuestra academia preparamos a los alumnos para entrevistas de trabajo. Primero revisamos c\u00f3mo presentarse y luego practicamos respuestas habituales. Aunque las sesiones son serias, el ambiente es cercano. Adem\u00e1s, damos consejos sobre lenguaje corporal.", "a2": "ANUNCIO B:\nAbrimos un espacio donde puedes reparar objetos con ayuda de especialistas. Trae una l\u00e1mpara, una silla o un peque\u00f1o aparato averiado y aprende a arreglarlo en vez de tirarlo. Como queremos reducir residuos, ense\u00f1amos t\u00e9cnicas sencillas. Por eso, cada participante colabora de forma activa.", "a3": "ANUNCIO C:\nSi necesitas un regalo original, visita nuestra tienda de productos artesanales. Vendemos cer\u00e1mica, cuadernos y piezas decorativas hechas a mano. Sin embargo, no disponemos de venta online. As\u00ed que tendr\u00e1s que venir personalmente.", "a4": "ANUNCIO D:\nOfrecemos clases de meditaci\u00f3n guiada para principiantes. Mientras escuchas la voz del instructor, aprendes a respirar y concentrarte mejor. Aunque la pr\u00e1ctica parece sencilla, requiere constancia. Adem\u00e1s, puede ayudarte a reducir la ansiedad.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 1, "exp": "Do\u011fru cevap B'dir \u00e7\u00fcnk\u00fc bu ilanda bozuk e\u015fyalar\u0131 \u00e7\u00f6pe atmak yerine tamir etmeyi \u00f6\u011frenme fikri var. Ayr\u0131ca at\u0131\u011f\u0131 azaltma amac\u0131 a\u00e7\u0131k\u00e7a verilmi\u015f. Sorudaki ihtiya\u00e7 tam olarak budur. Di\u011fer ilanlar i\u015f g\u00f6r\u00fc\u015fmesi haz\u0131rl\u0131\u011f\u0131, el yap\u0131m\u0131 \u00fcr\u00fcn ma\u011fazas\u0131 ve meditasyon dersidir."}, {"t": "mc", "badge": "orden", "frases": ["En conclusi\u00f3n, el teletrabajo es una opci\u00f3n excelente si hay disciplina.", "Para empezar, trabajar desde casa se ha vuelto muy popular \u00faltimamente.", "Sin embargo, a veces es dif\u00edcil separar la vida laboral de la personal.", "Adem\u00e1s, nos permite ahorrar mucho tiempo y dinero en transporte."], "q": "41. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. En conclusi\u00f3n, el teletrabajo es una opci\u00f3n excelente si hay disciplina.\n2. Para empezar, trabajar desde casa se ha vuelto muy popular \u00faltimamente.\n3. Sin embargo, a veces es dif\u00edcil separar la vida laboral de la personal.\n4. Adem\u00e1s, nos permite ahorrar mucho tiempo y dinero en transporte.", "o": ["2 - 3 - 4 - 1", "2 - 4 - 3 - 1", "4 - 2 - 3 - 1", "1 - 2 - 4 - 3"], "a": 1, "exp": "P\u00e1rrafo en espa\u00f1ol: Para empezar, trabajar desde casa se ha vuelto muy popular \u00faltimamente. Adem\u00e1s, nos permite ahorrar mucho tiempo y dinero en transporte. Sin embargo, a veces es dif\u00edcil separar la vida laboral de la personal. En conclusi\u00f3n, el teletrabajo es una opci\u00f3n excelente si hay disciplina.\nT\u00fcrk\u00e7e \u00c7eviri: Ba\u015flamak gerekirse, evden \u00e7al\u0131\u015fmak son zamanlarda \u00e7ok pop\u00fcler oldu. Ayr\u0131ca, ula\u015f\u0131mda \u00e7ok fazla zaman ve para tasarrufu yapmam\u0131z\u0131 sa\u011fl\u0131yor. Ancak, bazen i\u015f hayat\u0131n\u0131 \u00f6zel hayattan ay\u0131rmak zordur. Sonu\u00e7 olarak, disiplin oldu\u011fu s\u00fcrece uzaktan \u00e7al\u0131\u015fma m\u00fckemmel bir se\u00e7enektir.\nDo\u011fru s\u0131ra: Para empezar (giri\u015f) \u2192 Adem\u00e1s (ekleme) \u2192 Sin embargo (z\u0131tl\u0131k) \u2192 En conclusi\u00f3n (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["Adem\u00e1s, te permite conocer gente de diferentes culturas.", "En resumen, hablar varios idiomas abre muchas puertas en el futuro.", "Para comenzar, saber lenguas extranjeras es fundamental hoy en d\u00eda.", "Aunque requiere mucho esfuerzo, la satisfacci\u00f3n final vale la pena."], "q": "42. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. Adem\u00e1s, te permite conocer gente de diferentes culturas.\n2. En resumen, hablar varios idiomas abre muchas puertas en el futuro.\n3. Para comenzar, saber lenguas extranjeras es fundamental hoy en d\u00eda.\n4. Aunque requiere mucho esfuerzo, la satisfacci\u00f3n final vale la pena.", "o": ["3 - 4 - 1 - 2", "2 - 3 - 1 - 4", "1 - 3 - 4 - 2", "3 - 1 - 4 - 2"], "a": 3, "exp": "P\u00e1rrafo en espa\u00f1ol: Para comenzar, saber lenguas extranjeras es fundamental hoy en d\u00eda. Adem\u00e1s, te permite conocer gente de diferentes culturas. Aunque requiere mucho esfuerzo, la satisfacci\u00f3n final vale la pena. En resumen, hablar varios idiomas abre muchas puertas en el futuro.\nT\u00fcrk\u00e7e \u00c7eviri: Ba\u015flamak gerekirse, yabanc\u0131 dil bilmek g\u00fcn\u00fcm\u00fczde temel bir ihtiya\u00e7t\u0131r. Ayr\u0131ca, farkl\u0131 k\u00fclt\u00fcrlerden insanlar tan\u0131man\u0131za olanak sa\u011flar. \u00c7ok \u00e7aba gerektirse de, sonundaki tatmin buna de\u011fer. \u00d6zetle, birka\u00e7 dil konu\u015fmak gelecekte bir\u00e7ok kap\u0131 a\u00e7ar.\nDo\u011fru s\u0131ra: Para comenzar (giri\u015f) \u2192 Adem\u00e1s (ekleme) \u2192 Aunque (z\u0131tl\u0131k/taviz) \u2192 En resumen (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["Por otro lado, dormir las horas suficientes es vital para la mente.", "Para empezar, me gustar\u00eda hablar de la importancia de la dieta.", "En definitiva, cuidar el cuerpo es la mejor inversi\u00f3n que podemos hacer.", "No obstante, mucha gente prefiere la comida r\u00e1pida por falta de tiempo."], "q": "43. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. Por otro lado, dormir las horas suficientes es vital para la mente.\n2. Para empezar, me gustar\u00eda hablar de la importancia de la dieta.\n3. En definitiva, cuidar el cuerpo es la mejor inversi\u00f3n que podemos hacer.\n4. No obstante, mucha gente prefiere la comida r\u00e1pida por falta de tiempo.", "o": ["2 - 1 - 4 - 3", "4 - 2 - 1 - 3", "2 - 4 - 1 - 3", "2 - 3 - 4 - 1"], "a": 2, "exp": "P\u00e1rrafo en espa\u00f1ol: Para empezar, me gustar\u00eda hablar de la importancia de la dieta. No obstante, mucha gente prefiere la comida r\u00e1pida por falta de tiempo. Por otro lado, dormir las horas suficientes es vital para la mente. En definitiva, cuidar el cuerpo es la mejor inversi\u00f3n que podemos hacer.\nT\u00fcrk\u00e7e \u00c7eviri: Ba\u015flamak i\u00e7in diyetin \u00f6neminden bahsetmek isterim. Yine de bir\u00e7ok insan vakit darl\u0131\u011f\u0131ndan dolay\u0131 h\u0131zl\u0131 yeme\u011fi tercih ediyor. \u00d6te yandan, yeterli saat uyumak zihin i\u00e7in hayatidir. Sonu\u00e7 olarak, v\u00fccuda bakmak yapabilece\u011fimiz en iyi yat\u0131r\u0131md\u0131r.\nDo\u011fru s\u0131ra: Para empezar \u2192 No obstante (z\u0131tl\u0131k) \u2192 Por otro lado (ba\u015fka konu) \u2192 En definitiva (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["Primero, es necesario reducir el uso de pl\u00e1sticos en nuestra rutina.", "Por consiguiente, nuestras acciones individuales pueden salvar el planeta.", "Asimismo, el reciclaje ayuda a conservar los recursos naturales.", "A pesar de estos esfuerzos, la contaminaci\u00f3n sigue siendo un gran reto."], "q": "44. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. Primero, es necesario reducir el uso de pl\u00e1sticos en nuestra rutina.\n2. Por consiguiente, nuestras acciones individuales pueden salvar el planeta.\n3. Asimismo, el reciclaje ayuda a conservar los recursos naturales.\n4. A pesar de estos esfuerzos, la contaminaci\u00f3n sigue siendo un gran reto.", "o": ["1 - 3 - 4 - 2", "1 - 4 - 3 - 2", "3 - 1 - 4 - 2", "2 - 1 - 3 - 4"], "a": 0, "exp": "P\u00e1rrafo en espa\u00f1ol: Primero, es necesario reducir el uso de pl\u00e1sticos en nuestra rutina. Asimismo, el reciclaje ayuda a conservar los recursos naturales. A pesar de estos esfuerzos, la contaminaci\u00f3n sigue siendo un gran reto. Por consiguiente, nuestras acciones individuales pueden salvar el planeta.\nT\u00fcrk\u00e7e \u00c7eviri: \u0130lk olarak, rutinimizde plastik kullan\u0131m\u0131n\u0131 azaltmak gerekiyor. Ayn\u0131 \u015fekilde, geri d\u00f6n\u00fc\u015f\u00fcm do\u011fal kaynaklar\u0131 korumaya yard\u0131mc\u0131 olur. Bu \u00e7abalara ra\u011fmen, kirlilik hala b\u00fcy\u00fck bir zorluk olmaya devam ediyor. Dolay\u0131s\u0131yla, bireysel eylemlerimiz gezegeni kurtarabilir.\nDo\u011fru s\u0131ra: Primero \u2192 Asimismo (ekleme) \u2192 A pesar de (z\u0131tl\u0131k) \u2192 Por consiguiente (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["Para empezar, vivir en la ciudad ofrece muchas oportunidades culturales.", "Finalmente, la mejor opci\u00f3n depende del estilo de vida de cada uno.", "Adem\u00e1s, el transporte p\u00fablico facilita mucho los desplazamientos.", "En cambio, el ruido y el estr\u00e9s pueden ser aspectos muy negativos."], "q": "45. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. Para empezar, vivir en la ciudad ofrece muchas oportunidades culturales.\n2. Finalmente, la mejor opci\u00f3n depende del estilo de vida de cada uno.\n3. Adem\u00e1s, el transporte p\u00fablico facilita mucho los desplazamientos.\n4. En cambio, el ruido y el estr\u00e9s pueden ser aspectos muy negativos.", "o": ["1 - 3 - 4 - 2", "1 - 2 - 3 - 4", "3 - 1 - 4 - 2", "4 - 3 - 1 - 2"], "a": 0, "exp": "P\u00e1rrafo en espa\u00f1ol: Para empezar, vivir en la ciudad ofrece muchas oportunidades culturales. Adem\u00e1s, el transporte p\u00fablico facilita mucho los desplazamientos. En cambio, el ruido y el estr\u00e9s pueden ser aspectos muy negativos. Finalmente, la mejor opci\u00f3n depende del estilo de vida de cada uno.\nT\u00fcrk\u00e7e \u00c7eviri: Ba\u015flamak gerekirse, \u015fehirde ya\u015famak bir\u00e7ok k\u00fclt\u00fcrel f\u0131rsat sunar. Ayr\u0131ca, toplu ta\u015f\u0131ma ula\u015f\u0131mlar\u0131 \u00e7ok kolayla\u015ft\u0131r\u0131r. Buna kar\u015f\u0131l\u0131k, g\u00fcr\u00fclt\u00fc ve stres \u00e7ok olumsuz y\u00f6nler olabilir. Sonunda, en iyi se\u00e7enek her birinin ya\u015fam tarz\u0131na ba\u011fl\u0131d\u0131r.\nDo\u011fru s\u0131ra: Para empezar \u2192 Adem\u00e1s (ekleme) \u2192 En cambio (z\u0131tl\u0131k) \u2192 Finalmente (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["Por una parte, leer libros desarrolla la imaginaci\u00f3n de forma \u00fanica.", "Para concluir, ambas formas de arte son valiosas y complementarias.", "Por otra parte, las pel\u00edculas ofrecen una experiencia visual r\u00e1pida.", "Aun as\u00ed, mucha gente dice que el libro siempre es mejor que el film."], "q": "46. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. Por una parte, leer libros desarrolla la imaginaci\u00f3n de forma \u00fanica.\n2. Para concluir, ambas formas de arte son valiosas y complementarias.\n3. Por otra parte, las pel\u00edculas ofrecen una experiencia visual r\u00e1pida.\n4. Aun as\u00ed, mucha gente dice que el libro siempre es mejor que el film.", "o": ["1 - 4 - 3 - 2", "3 - 1 - 4 - 2", "1 - 3 - 4 - 2", "2 - 1 - 3 - 4"], "a": 2, "exp": "P\u00e1rrafo en espa\u00f1ol: Por una parte, leer libros desarrolla la imaginaci\u00f3n de forma \u00fanica. Por otra parte, las pel\u00edculas ofrecen una experiencia visual r\u00e1pida. Aun as\u00ed, mucha gente dice que el libro siempre es mejor que el film. Para concluir, ambas formas de arte son valiosas y complementarias.\nT\u00fcrk\u00e7e \u00c7eviri: Bir taraftan, kitap okumak hayal g\u00fcc\u00fcn\u00fc benzersiz bir \u015fekilde geli\u015ftirir. \u00d6te yandan, filmler h\u0131zl\u0131 bir g\u00f6rsel deneyim sunar. Yine de bir\u00e7ok insan kitab\u0131n her zaman filmden daha iyi oldu\u011funu s\u00f6yl\u00fcyor. Bitirmek gerekirse, her iki sanat formu da de\u011ferlidir ve birbirini tamamlar.\nDo\u011fru s\u0131ra: Por una parte \u2192 Por otra parte \u2192 Aun as\u00ed (z\u0131tl\u0131k) \u2192 Para concluir."}, {"t": "mc", "badge": "orden", "frases": ["Adem\u00e1s, son herramientas perfectas para estar informado al instante.", "Para comenzar, las redes sociales han cambiado nuestra forma de hablar.", "Por todo ello, debemos usarlas con responsabilidad y sentido com\u00fan.", "Sin embargo, pasar demasiado tiempo en ellas puede ser adictivo."], "q": "47. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. Adem\u00e1s, son herramientas perfectas para estar informado al instante.\n2. Para comenzar, las redes sociales han cambiado nuestra forma de hablar.\n3. Por todo ello, debemos usarlas con responsabilidad y sentido com\u00fan.\n4. Sin embargo, pasar demasiado tiempo en ellas puede ser adictivo.", "o": ["2 - 4 - 1 - 3", "4 - 2 - 1 - 3", "1 - 2 - 4 - 3", "2 - 1 - 4 - 3"], "a": 3, "exp": "P\u00e1rrafo en espa\u00f1ol: Para comenzar, las redes sociales han cambiado nuestra forma de hablar. Adem\u00e1s, son herramientas perfectas para estar informado al instante. Sin embargo, pasar demasiado tiempo en ellas puede ser adictivo. Por todo ello, debemos usarlas con responsabilidad y sentido com\u00fan.\nT\u00fcrk\u00e7e \u00c7eviri: Ba\u015flamak gerekirse, sosyal a\u011flar konu\u015fma \u015feklimizi de\u011fi\u015ftirdi. Ayr\u0131ca, anl\u0131k bilgilenmek i\u00e7in m\u00fckemmel ara\u00e7lard\u0131r. Ancak, onlarda \u00e7ok fazla zaman ge\u00e7irmek ba\u011f\u0131ml\u0131l\u0131k yapabilir. B\u00fct\u00fcn bunlardan dolay\u0131, onlar\u0131 sorumlulukla ve sa\u011fduyu ile kullanmal\u0131y\u0131z.\nDo\u011fru s\u0131ra: Para comenzar \u2192 Adem\u00e1s (ekleme) \u2192 Sin embargo (z\u0131tl\u0131k) \u2192 Por todo ello (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["En conclusi\u00f3n, viajar sin compa\u00f1\u00eda es una aventura que todos deben probar.", "Para empezar, viajar solo te ayuda a conocerte mejor a ti mismo.", "No obstante, es fundamental planificar bien la seguridad del viaje.", "Tambi\u00e9n te da la libertad de decidir tu propio itinerario sin prisa."], "q": "48. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. En conclusi\u00f3n, viajar sin compa\u00f1\u00eda es una aventura que todos deben probar.\n2. Para empezar, viajar solo te ayuda a conocerte mejor a ti mismo.\n3. No obstante, es fundamental planificar bien la seguridad del viaje.\n4. Tambi\u00e9n te da la libertad de decidir tu propio itinerario sin prisa.", "o": ["2 - 3 - 4 - 1", "2 - 4 - 3 - 1", "4 - 2 - 3 - 1", "1 - 2 - 3 - 4"], "a": 1, "exp": "P\u00e1rrafo en espa\u00f1ol: Para empezar, viajar solo te ayuda a conocerte mejor a ti mismo. Tamb 00e7ok daha enerjik hissedersiniz. \u00d6zetle, dengeli bir ya\u015fama sahip olmak i\u00e7in egzersiz esast\u0131r.\nDo\u011fru s\u0131ra: Para empezar \u2192 Asimismo (ekleme) \u2192 Aunque (z\u0131tl\u0131k/taviz) \u2192 En resumen (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["En conclusi\u00f3n, debemos reflexionar sobre nuestra responsabilidad como consumidores.", "Primero, el consumo excesivo de recursos da\u00f1a gravemente el medio ambiente.", "No obstante, las grandes empresas siguen promoviendo un estilo de vida materialista.", "Adem\u00e1s, esta tendencia genera una cantidad de residuos que el planeta no puede procesar."], "q": "51. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. En conclusi\u00f3n, debemos reflexionar sobre nuestra responsabilidad como consumidores.\n2. Primero, el consumo excesivo de recursos da\u00f1a gravemente el medio ambiente.\n3. No obstante, las grandes empresas siguen promoviendo un estilo de vida materialista.\n4. Adem\u00e1s, esta tendencia genera una cantidad de residuos que el planeta no puede procesar.", "o": ["2 - 3 - 4 - 1", "2 - 1 - 4 - 3", "2 - 4 - 3 - 1", "4 - 2 - 3 - 1"], "a": 2, "exp": "P\u00e1rrafo en espa\u00f1ol: Primero, el consumo excesivo de recursos da\u00f1a gravemente el medio ambiente. Adem\u00e1s, esta tendencia genera una cantidad de residuos que el planeta no puede procesar. No obstante, las grandes empresas siguen promoviendo un estilo de vida materialista. En conclusi\u00f3n, debemos reflexionar sobre nuestra responsabilidad como consumidores.\nT\u00fcrk\u00e7e \u00c7eviri: \u0130lk olarak, kaynaklar\u0131n a\u015f\u0131r\u0131 t\u00fcketimi \u00e7evreye ciddi \u015fekilde zarar verir. Ayr\u0131ca, bu e\u011filim gezegenin i\u015fleyemeyece\u011fi miktarda at\u0131k \u00fcretir. Yine de b\u00fcy\u00fck \u015firketler materyalist bir ya\u015fam tarz\u0131n\u0131 te\u015fvik etmeye devam ediyor. Sonu\u00e7 olarak, t\u00fcketiciler olarak sorumlulu\u011fumuzu \u00fczerinde d\u00fc\u015f\u00fcnmeliyiz.\nDo\u011fru s\u0131ra: Primero \u2192 Adem\u00e1s (ekleme) \u2192 No obstante (z\u0131tl\u0131k) \u2192 En conclusi\u00f3n."}, {"t": "mc", "badge": "orden", "frases": ["Por otro lado, existen riesgos \u00e9ticos significativos sobre la privacidad de los datos.", "Para comenzar, la inteligencia artificial est\u00e1 transformando la medicina moderna.", "En resumen, es una herramienta poderosa que requiere una regulaci\u00f3n estricta.", "Asimismo, permite realizar diagn\u00f3sticos mucho m\u00e1s precisos y r\u00e1pidos que antes."], "q": "52. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. Por otro lado, existen riesgos \u00e9ticos significativos sobre la privacidad de los datos.\n2. Para comenzar, la inteligencia artificial est\u00e1 transformando la medicina moderna.\n3. En resumen, es una herramienta poderosa que requiere una regulaci\u00f3n estricta.\n4. Asimismo, permite realizar diagn\u00f3sticos mucho m\u00e1s precisos y r\u00e1pidos que antes.", "o": ["2 - 1 - 4 - 3", "4 - 2 - 1 - 3", "1 - 2 - 4 - 3", "2 - 4 - 1 - 3"], "a": 3, "exp": "P\u00e1rrafo en espa\u00f1ol: Para comenzar, la inteligencia artificial est\u00e1 transformando la medicina moderna. Asimismo, permite realizar diagn\u00f3sticos mucho m\u00e1s precisos y r\u00e1pidos que antes. Por otro lado, existen riesgos \u00e9ticos significativos sobre la privacidad de los datos. En resumen, es una herramienta poderosa que requiere una regulaci\u00f3n estricta.\nT\u00fcrk\u00e7e \u00c7eviri: Ba\u015flamak gerekirse, yapay zeka modern t\u0131bb\u0131 d\u00f6n\u00fc\u015ft\u00fcr\u00fcyor. Ayn\u0131 \u015fekilde, eskisinden \u00e7ok daha kesin ve h\u0131zl\u0131 te\u015fhisler konulmas\u0131n\u0131 sa\u011fl\u0131yor. \u00d6te yandan, veri gizlili\u011fi konusunda \u00f6nemli etik riskler mevcut. \u00d6zetle, s\u0131k\u0131 bir d\u00fczenleme gerektiren g\u00fc\u00e7l\u00fc bir ara\u00e7t\u0131r.\nDo\u011fru s\u0131ra: Para comenzar \u2192 Asimismo (ekleme) \u2192 Por otro lado (z\u0131tl\u0131k) \u2192 En resumen (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["Para empezar, la transici\u00f3n energ\u00e9tica es fundamental para combatir el cambio clim\u00e1tico.", "Por consiguiente, invertir en energ\u00eda solar y e\u00f3lica es una decisi\u00f3n estrat\u00e9gica.", "Sin embargo, todav\u00eda dependemos excesivamente de los combustibles f\u00f3siles.", "De igual forma, estas fuentes renovables ofrecen una alternativa limpia y econ\u00f3mica."], "q": "53. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. Para empezar, la transici\u00f3n energ\u00e9tica es fundamental para combatir el cambio clim\u00e1tico.\n2. Por consiguiente, invertir en energ\u00eda solar y e\u00f3lica es una decisi\u00f3n estrat\u00e9gica.\n3. Sin embargo, todav\u00eda dependemos excesivamente de los combustibles f\u00f3siles.\n4. De igual forma, estas fuentes renovables ofrecen una alternativa limpia y econ\u00f3mica.", "o": ["1 - 4 - 3 - 2", "1 - 2 - 3 - 4", "4 - 1 - 3 - 2", "3 - 1 - 4 - 2"], "a": 0, "exp": "P\u00e1rrafo en espa\u00f1ol: Para empezar, la transici\u00f3n energ\u00e9tica es fundamental para combatir el cambio clim\u00e1tico. De igual forma, estas fuentes renovables ofrecen una alternativa limpia y econ\u00f3mica. Sin embargo, todav\u00eda dependemos excesivamente de los combustibles f\u00f3siles. Por consiguiente, invertir en energ\u00eda solar y e\u00f3lica es una decisi\u00f3n estrat\u00e9gica.\nT\u00fcrk\u00e7e \u00c7eviri: Ba\u015flamak gerekirse, enerji d\u00f6n\u00fc\u015f\u00fcm\u00fc iklim de\u011fi\u015fikli\u011fiyle m\u00fccadele i\u00e7in temeldir. Ayn\u0131 \u015fekilde, bu yenilenebilir kaynaklar temiz ve ekonomik bir alternatif sunar. Ancak, hala a\u015f\u0131r\u0131 derecede fosil yak\u0131tlara ba\u011fl\u0131y\u0131z. Dolay\u0131s\u0131yla, g\u00fcne\u015f ve r\u00fczgar enerjisine yat\u0131r\u0131m yapmak stratejik bir karard\u0131r.\nDo\u011fru s\u0131ra: Para empezar \u2192 De igual forma (ekleme) \u2192 Sin embargo (z\u0131tl\u0131k) \u2192 Por consiguiente (sonu\u00e7)."}, {"t": "mc", "badge": "orden", "frases": ["En definitiva, la educaci\u00f3n h\u00edbrida parece ser el modelo m\u00e1s viable del futuro.", "En primer lugar, las plataformas digitales facilitan enormemente el acceso al conocimiento.", "A pesar de esto, muchos alumnos echan de menos la interacci\u00f3n social presencial.", "Del mismo modo, permiten que personas de zonas remotas estudien en grandes universidades."], "q": "54. SORU\n\u00bfCu\u00e1l es el orden l\u00f3gico de estas frases?\n\n1. En definitiva, la educaci\u00f3n h\u00edbrida parece ser el modelo m\u00e1s viable del futuro.\n2. En primer lugar, las plataformas digitales facilitan enormemente el acceso al conocimiento.\n3. A pesar de esto, muchos alumnos echan de menos la interacci\u00f3n social presencial.\n4. Del mismo modo, permiten que personas de zonas remotas estudien en grandes universidades.", "o": ["2 - 3 - 4 - 1", "2 - 4 - 3 - 1", "4 - 2 - 3 - 1", "1 - 2 - 4 - 3"], "a": 1, "exp": "P\u00e1rrafo en espa\u00f1ol: En primer lugar, las plataformas digitales facilitan enormemente el acceso al conocimiento. Del mismo modo, permiten que personas de zonas remotas estudien en grandes universidades. A pesar de esto, muchos alumnos echan de menos la interacci\u00f3n social presencial. En definitiva, la educaci\u00f3n h\u00edbrida parece ser el modelo m\u00e1s viable del futuro.\nT\u00fcrk\u00e7e \u00c7eviri: \u0130lk olarak, dijital platformlar bilgiye eri\u015fimi b\u00fcy\u00fck \u00f6l\u00e7\u00fcde kolayla\u015ft\u0131r\u0131yor. Ayn\u0131 \u015fekilde, uzak b\u00f6lgelerdeki insanlar\u0131n b\u00fcy\u00fck \u00fcniversitelerde okumas\u0131na imkan tan\u0131yor. Buna ra\u011fmen, bir\u00e7ok \u00f6\u011frenci y\u00fcz y\u00fcze sosyal etkile\u015fimi \u00f6zl\u00fcyor. Nihayetinde, hibrit e\u011fitim gelece\u011fin en uygulanabilir modeli gibi g\u00f6r\u00fcn\u00fcyor.\nDo\u011fru s\u0131ra: En primer lugar \ var state={cur:0,answered:[],scores:[],okCount:0,errCount:0};
function startQuiz(){var name=document.getElementById('introName').value;if(!name){alert('L\u00fctfen ad\u0131n\u0131z\u0131 se\u00e7in.');return;}document.getElementById('resName').value=name;document.getElementById('introScreen').style.display='none';document.getElementById('quizScreen').style.display='block';renderQ();}
function stripA(s,l){return s?s.replace('ANUNCIO '+l+':\n',''):'';}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function renderQ(){
  var i=state.cur;var q=Q[i];var html='';

    html+='<div class="anuncio-block"><div class="anuncio-title">ANUNCIO D</div>'+esc(stripA(q.a4,'D'))+'</div>';
    html+='</div>';
  } else if(q.badge==='orden'){
    html+='<div class="q-text">'+esc(q.q)+'</div><div class="orden-block">';

    html+='</div>';
  } else html+='<div class="q-text">'+esc(q.q)+'</div>';
  html+='<div class="opts">';
  var L=['A','B','C','D'];

}

function skipQ(){if(state.cur<Q.length-1){state.cur++;renderQ();}}
function confirmFinish(){var answered=0;for(var i=0;i<Q.length;i++){if(state.answered[i]!==undefined)answered++;}var unanswered=Q.length-answered;var msg='Toplam '+Q.length+' sorudan '+answered+' tanesini cevaplad\u0131n\u0131z.';if(unanswered>0)msg+='\n\n'+unanswered+' soru cevaps\u0131z kalacak (0 puan).';msg+='\n\nTesti bitirmek istedi\u011finize emin misiniz?';document.getElementById('confirmMsg').textContent=msg;document.getElementById('confirmOverlay').style.display='flex';}
function closeConfirm(){document.getElementById('confirmOverlay').style.display='none';}
function doFinish(){closeConfirm();showResult();}
function showResult(){document.getElementById('quizScreen').style.display='none';document.getElementById('resultScreen').style.display='block';var total=0;for(var i=0;i<Q.length;i++){total+=(state.scores[i]||0);}var pct=Math.round(total*100/Q.length);document.getElementById('resScore').textContent=pct;document.getElementById('resOk').textContent='\u2713 '+state.okCount+' do\u011fru';document.getElementById('resErr').textContent='\u2717 '+state.errCount+' yanl\u0131\u015f';document.getElementById('resNote').textContent='60 sorudan '+state.okCount+' tanesi do\u011fru';var rev=document.getElementById('reviewList');var L=['A','B','C','D'];var html='';for(var i=0;i<Q.length;i++){var ans=state.answered[i];if(ans===undefined||ans===Q[i].a)continue;var q=Q[i];html+='<div class="rev-item"><div class="rev-q">'+esc(q.q.split('\n')[0])+'</div><div class="rev-chosen">Verdi\u011finiz cevap: '+L[ans]+') '+esc(q.o[ans])+'</div><div class="rev-correct">Do\u011fru cevap: '+L[q.a]+') '+esc(q.o[q.a])+'</div><div class="rev-exp">'+esc(q.exp)+'</div></div>';}rev.innerHTML=html||'<div style="padding:.5rem;color:#666">Yanl\u0131\u015f soru bulunamad\u0131.</div>';}
function toggleReview(){var rv=document.getElementById('reviewList');rv.style.display=(rv.style.display==='flex'?'none':'flex');}
function submitResult(){var name=document.getElementById('resName').value;if(!name)return;var total=0;for(var i=0;i<Q.length;i++){total+=(state.scores[i]||0);}var pct=Math.round(total*100/Q.length);var payload=JSON.stringify({ogrenci:name,odev:ODEV_ADI,grup:'B1.1',puan:pct,dogru:state.okCount,yanlis:state.errCount,tarih:new Date().toLocaleDateString('tr-TR')});document.getElementById('submitMsg').style.display='block';document.getElementById('submitMsg').textContent='G\u00f6nderiliyor...';fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:payload}).then(function(){document.getElementById('submitMsg').textContent=name+' \u00f6\u011frencisinin \u201c'+ODEV_ADI+'\u201d \u00f6devi teslim edildi. Puan: '+pct+'/100. Te\u015fekk\u00fcrler!';}).catch(function(){document.getElementById('submitMsg').textContent=name+' \u00f6\u011frencisinin \u201c'+ODEV_ADI+'\u201d \u00f6devi teslim edildi. Puan: '+pct+'/100.';});}
</script>
