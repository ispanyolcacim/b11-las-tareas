<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbwbAQtk4nhM73aqYCKwg0z5s5qxPaCAWeLncNVHtSQ2jHbuo7SomG4PJpOBN8C0sXzTQw/exec';
var ODEV_ADI='H3 \u2013 11-12.Ders';
var Q=[{"t": "mc", "q": "1. Soru\nLuc\u00eda quiere mejorar su nivel de espa\u00f1ol este a\u00f1o. Va a tomar clases presenciales dos veces por semana. ______, escucha p\u00f3dcast en espa\u00f1ol cada ma\u00f1ana para practicar m\u00e1s. No quiere perder tiempo, ______ ha organizado un horario muy estricto para estudiar en casa.", "o": ["adem\u00e1s / por eso", "sin embargo / aunque", "por ejemplo / porque", "al final / en cambio"], "a": 0, "exp": "C\u00fcmlenin tamam\u0131: Luc\u00eda quiere mejorar su nivel de espa\u00f1ol este a\u00f1o. Va a tomar clases presenciales dos veces por semana. Adem\u00e1s, escucha p\u00f3dcast en espa\u00f1ol cada ma\u00f1ana para practicar m\u00e1s. No quiere perder tiempo, por eso ha organizado un horario muy estricto para estudiar en casa. Tambi\u00e9n habla con una amiga mexicana los fines de semana. Gracias a esa rutina, siente que entiende mejor los textos y las conversaciones.\nT\u00fcrk\u00e7e \u00e7evirisi: Luc\u00eda bu y\u0131l \u0130spanyolca seviyesini geli\u015ftirmek istiyor. Haftada iki kez y\u00fcz y\u00fcze ders alacak. Ayr\u0131ca, daha fazla pratik yapmak i\u00e7in her sabah \u0130spanyolca podcast dinliyor. Zaman kaybetmek istemiyor, bu y\u00fczden evde \u00e7al\u0131\u015fmak i\u00e7in \u00e7ok d\u00fczenli bir program haz\u0131rlad\u0131. Hafta sonlar\u0131 Meksikal\u0131 bir arkada\u015f\u0131yla da konu\u015fuyor. Bu rutin sayesinde metinleri ve konu\u015fmalar\u0131 daha iyi anlad\u0131\u011f\u0131n\u0131 hissediyor.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta ek bilgi veriliyor. Luc\u00eda'n\u0131n derse gitmesine ek olarak podcast dinlemesi anlat\u0131l\u0131yor. Bu nedenle adem\u00e1s en uygun ba\u011fla\u00e7t\u0131r. \u0130kinci bo\u015flukta ise \"zaman kaybetmek istememesi\" ile \"program haz\u0131rlamas\u0131\" aras\u0131nda sonu\u00e7 ili\u015fkisi vard\u0131r. Bu y\u00fczden por eso kullan\u0131l\u0131r. Di\u011fer se\u00e7eneklerdeki ba\u011fla\u00e7lar ya z\u0131tl\u0131k ya \u00f6rnek ya da zaman/s\u0131ralama anlam\u0131 verir; burada o ili\u015fkiler yoktur."}, {"t": "mc", "q": "2. Soru\nAyer ten\u00edamos pensado hacer un picnic en el parque. Salimos de casa con comida y bebidas; ______, cuando llegamos, empez\u00f3 a llover muy fuerte. No pudimos quedarnos mucho tiempo, ______ regresamos antes de lo previsto.", "o": ["adem\u00e1s / para que", "por ejemplo / mientras", "a fin de / igualmente", "sin embargo / por eso"], "a": 3, "exp": "C\u00fcmlenin tamam\u0131: Ayer ten\u00edamos pensado hacer un picnic en el parque. El cielo estaba un poco gris por la ma\u00f1ana. Salimos de casa con comida y bebidas; sin embargo, cuando llegamos, empez\u00f3 a llover muy fuerte. No pudimos quedarnos mucho tiempo, por eso regresamos antes de lo previsto. Al final, comimos todo en casa y vimos una pel\u00edcula. Aunque el plan cambi\u00f3, pasamos una tarde agradable.\nT\u00fcrk\u00e7e \u00e7evirisi: D\u00fcn parkta piknik yapmay\u0131 planlam\u0131\u015ft\u0131k. Sabah g\u00f6ky\u00fcz\u00fc biraz griydi. Yiyecek ve i\u00e7eceklerle evden \u00e7\u0131kt\u0131k; ancak, vard\u0131\u011f\u0131m\u0131zda \u00e7ok \u015fiddetli ya\u011fmur ba\u015flad\u0131. Uzun s\u00fcre kalamad\u0131k, bu y\u00fczden planlanandan \u00f6nce geri d\u00f6nd\u00fck. Sonunda her \u015feyi evde yedik ve film izledik. Plan de\u011fi\u015fse de g\u00fczel bir \u00f6\u011fleden sonra ge\u00e7irdik.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta beklentiyle ger\u00e7ek durum aras\u0131nda kar\u015f\u0131tl\u0131k var: pikni\u011fe gidiliyor ama ya\u011fmur ba\u015fl\u0131yor. Bu y\u00fczden sin embargo do\u011fru se\u00e7imdir. \u0130kinci bo\u015flukta uzun s\u00fcre kalamamak sonucunda erken d\u00f6nmek var; yani sonu\u00e7 ili\u015fkisi kuruluyor. Bu nedenle por eso gerekir. Di\u011fer \u015f\u0131klar anlam ili\u015fkisini bozuyor."}, {"t": "mc", "q": "3. Soru\nMarta trabaja en una oficina muy lejos de su casa. ______ vive lejos del centro, tarda casi una hora en llegar al trabajo. Lleva un libro en el bolso, ______ puede leer durante el viaje y aprovechar mejor el tiempo.", "o": ["por eso / aunque", "como / as\u00ed", "en cambio / desde mi punto de vista", "para empezar / por culpa de"], "a": 1, "exp": "C\u00fcmlenin tamam\u0131: Marta trabaja en una oficina muy lejos de su casa. Tiene que levantarse temprano todos los d\u00edas para no perder el autob\u00fas. Como vive lejos del centro, tarda casi una hora en llegar al trabajo. Lleva un libro en el bolso, as\u00ed puede leer durante el viaje y aprovechar mejor el tiempo. A veces se cansa mucho, pero dice que ya est\u00e1 acostumbrada a esa rutina. Los fines de semana intenta descansar m\u00e1s.\nT\u00fcrk\u00e7e \u00e7evirisi: Marta evinden \u00e7ok uzakta bir ofiste \u00e7al\u0131\u015f\u0131yor. Otob\u00fcs\u00fc ka\u00e7\u0131rmamak i\u00e7in her g\u00fcn erken kalkmak zorunda. Merkezden uzakta ya\u015fad\u0131\u011f\u0131 i\u00e7in, i\u015fe varmas\u0131 neredeyse bir saat s\u00fcr\u00fcyor. \u00c7antas\u0131nda bir kitap ta\u015f\u0131yor, b\u00f6ylece yolculuk s\u0131ras\u0131nda okuyabiliyor ve zaman\u0131n\u0131 daha iyi de\u011ferlendirebiliyor. Bazen \u00e7ok yoruluyor ama bu d\u00fczene al\u0131\u015ft\u0131\u011f\u0131n\u0131 s\u00f6yl\u00fcyor. Hafta sonlar\u0131 daha \u00e7ok dinlenmeye \u00e7al\u0131\u015f\u0131yor.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta sebep veriliyor ve c\u00fcmle ba\u015f\u0131nda kullan\u0131l\u0131yor. Bu kullan\u0131m i\u00e7in como ba\u011flac\u0131n\u0131n \"\u00e7\u00fcnk\u00fc\" anlam\u0131nda c\u00fcmle ba\u015f\u0131nda kullan\u0131labildi\u011fi belirtilmi\u015fti. \u0130kinci bo\u015flukta ise kitap ta\u015f\u0131mas\u0131n\u0131n sonucu olarak yolculukta okuyabilmesi anlat\u0131l\u0131yor; burada as\u00ed do\u011fru sonu\u00e7 ba\u011flac\u0131d\u0131r. Ba\u015fka se\u00e7enekler semantik olarak uymaz."}, {"t": "mc", "q": "4. Soru\nEl profesor nos pidi\u00f3 preparar una presentaci\u00f3n sobre el medio ambiente. Primero buscamos informaci\u00f3n. ______, organizamos las ideas principales. Quer\u00edamos hacer una exposici\u00f3n clara y din\u00e1mica, ______ a\u00f1adimos im\u00e1genes y ejemplos reales.", "o": ["aunque / de todas formas", "por culpa de / en particular", "a continuaci\u00f3n / por eso", "seg\u00fan yo / despu\u00e9s de"], "a": 2, "exp": "C\u00fcmlenin tamam\u0131: El profesor nos pidi\u00f3 preparar una presentaci\u00f3n sobre el medio ambiente. Primero buscamos informaci\u00f3n en internet y en varios libros de la biblioteca. A continuaci\u00f3n, organizamos las ideas principales en un documento compartido para trabajar mejor en grupo. Quer\u00edamos hacer una exposici\u00f3n clara y din\u00e1mica, por eso a\u00f1adimos im\u00e1genes y ejemplos reales. Ensayamos dos veces antes de presentarla en clase. Al final, el profesor dijo que nuestro trabajo estaba muy bien estructurado.\nT\u00fcrk\u00e7e \u00e7evirisi: \u00d6\u011fretmen bizden \u00e7evre hakk\u0131nda bir sunum haz\u0131rlamam\u0131z\u0131 istedi. \u00d6nce internette ve k\u00fct\u00fcphanedeki \u00e7e\u015fitli kitaplarda bilgi arad\u0131k. Ard\u0131ndan, daha iyi grup \u00e7al\u0131\u015fmas\u0131 yapmak i\u00e7in ana fikirleri ortak bir belgede d\u00fczenledik. A\u00e7\u0131k ve dinamik bir sunum yapmak istiyorduk, bu y\u00fczden g\u00f6rseller ve ger\u00e7ek \u00f6rnekler ekledik. Sunumu s\u0131n\u0131fta yapmadan \u00f6nce iki kez prova ettik. Sonunda \u00f6\u011fretmen \u00e7al\u0131\u015fmam\u0131z\u0131n \u00e7ok iyi yap\u0131land\u0131r\u0131ld\u0131\u011f\u0131n\u0131 s\u00f6yledi.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015fluk bir s\u0131ralama ba\u011flac\u0131 ister. \"Primero\" ile ba\u015flayan s\u00fcre\u00e7 devam ediyor, bu y\u00fczden a continuaci\u00f3n en mant\u0131kl\u0131 se\u00e7imdir. \u0130kinci bo\u015flukta ise ama\u00e7tan \u00e7\u0131kan bir sonu\u00e7 var: sunum a\u00e7\u0131k ve dinamik olsun istedikleri i\u00e7in g\u00f6rseller ekliyorlar. Burada por eso uygundur. Di\u011fer \u015f\u0131klarda ya anlams\u0131z ya da dil bilgisel olarak zay\u0131f e\u015fle\u015fmeler vard\u0131r."}, {"t": "mc", "q": "5. Soru\nMuchas personas dicen que hacer deporte es solo una actividad f\u00edsica. Yo no estoy del todo de acuerdo. ______, practicar ejercicio ayuda a reducir el estr\u00e9s y mejora el estado de \u00e1nimo. Voy a caminar tres veces por semana; ______, duermo mejor y me concentro m\u00e1s cuando estudio.", "o": ["en cambio / aunque", "luego / a pesar de", "en mi opini\u00f3n / por eso", "por ejemplo / mientras"], "a": 2, "exp": "C\u00fcmlenin tamam\u0131: Muchas personas dicen que hacer deporte es solo una actividad f\u00edsica. Yo no estoy del todo de acuerdo con esa idea. En mi opini\u00f3n, practicar ejercicio ayuda a reducir el estr\u00e9s y mejora el estado de \u00e1nimo. Voy a caminar tres veces por semana; por eso, duermo mejor y me concentro m\u00e1s cuando estudio. Tambi\u00e9n he conocido a gente nueva gracias a esta rutina. Por eso, ahora recomiendo el deporte a casi todos mis amigos.\nT\u00fcrk\u00e7e \u00e7evirisi: Bir\u00e7ok insan spor yapman\u0131n sadece fiziksel bir etkinlik oldu\u011funu s\u00f6yl\u00fcyor. Ben bu fikre tamamen kat\u0131lm\u0131yorum. Bence, egzersiz yapmak stresi azaltmaya yard\u0131mc\u0131 olur ve ruh halini iyile\u015ftirir. Haftada \u00fc\u00e7 kez y\u00fcr\u00fcy\u00fc\u015fe \u00e7\u0131k\u0131yorum; bu y\u00fczden daha iyi uyuyorum ve ders \u00e7al\u0131\u015f\u0131rken daha iyi odaklan\u0131yorum. Ayr\u0131ca bu rutin sayesinde yeni insanlarla tan\u0131\u015ft\u0131m. Bu nedenle art\u0131k sporu neredeyse t\u00fcm arkada\u015flar\u0131ma tavsiye ediyorum.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015fluk a\u00e7\u0131k\u00e7a ki\u015fisel g\u00f6r\u00fc\u015f istiyor. Bu nedenle fikir belirtme ba\u011flac\u0131 olan en mi opini\u00f3n kullan\u0131lmal\u0131d\u0131r. \u0130kinci bo\u015flukta y\u00fcr\u00fcy\u00fc\u015f yapma ile daha iyi uyuma/odaklanma aras\u0131nda sonu\u00e7 ili\u015fkisi vard\u0131r; bu y\u00fczden por eso do\u011frudur. Ba\u015fka se\u00e7enekler ya \u00f6rnek verme ya z\u0131tl\u0131k ya da zaman anlam\u0131 verir, burada uygun de\u011fildir."}, {"t": "mc", "q": "6. Soru\nCarlos ten\u00eda un examen importante esta ma\u00f1ana. Estudi\u00f3 durante varias horas, ______ sab\u00eda que el examen iba a ser dif\u00edcil. Prepar\u00f3 un resumen con los puntos m\u00e1s importantes, ______ repas\u00f3 todo antes de dormir.", "o": ["por ejemplo / en cambio", "porque / y", "finalmente / a mi parecer", "aunque / por culpa de"], "a": 1, "exp": "C\u00fcmlenin tamam\u0131: Carlos ten\u00eda un examen importante esta ma\u00f1ana. Anoche quer\u00eda salir con sus amigos, pero al final decidi\u00f3 quedarse en casa. Estudi\u00f3 durante varias horas, porque sab\u00eda que el examen iba a ser dif\u00edcil. Prepar\u00f3 un resumen con los puntos m\u00e1s importantes, y repas\u00f3 todo antes de dormir. Hoy ha dicho que se sinti\u00f3 bastante seguro durante la prueba. Ahora espera recibir una buena nota.\nT\u00fcrk\u00e7e \u00e7evirisi: Carlos'un bu sabah \u00f6nemli bir s\u0131nav\u0131 vard\u0131. D\u00fcn gece arkada\u015flar\u0131yla d\u0131\u015far\u0131 \u00e7\u0131kmak istiyordu ama sonunda evde kalmaya karar verdi. S\u0131nav\u0131n zor olaca\u011f\u0131n\u0131 bildi\u011fi i\u00e7in saatlerce \u00e7al\u0131\u015ft\u0131. En \u00f6nemli noktalarla bir \u00f6zet haz\u0131rlad\u0131 ve uyumadan \u00f6nce her \u015feyi tekrar etti. Bug\u00fcn s\u0131nav s\u0131ras\u0131nda kendini olduk\u00e7a g\u00fcvende hissettti\u011fini s\u00f6yledi. \u015eimdi iyi bir not almay\u0131 umuyor.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015fluk do\u011frudan sebep bildiriyor; \u00e7al\u0131\u015fmas\u0131n\u0131n nedeni s\u0131nav\u0131n zor olmas\u0131. Bu y\u00fczden porque gerekir. \u0130kinci bo\u015flukta iki eylem ekleniyor: \u00f6zet haz\u0131rlamak ve tekrar yapmak. Bu nedenle basit ekleme ba\u011flac\u0131 y do\u011frudur. Burada daha karma\u015f\u0131k bir ba\u011fla\u00e7 gerekmiyor; en do\u011fal ve do\u011fru yap\u0131 budur."}, {"t": "mc", "q": "7. Soru\nMe encanta salir a caminar por sitios hist\u00f3ricos; ______, el parque antiguo que est\u00e1 junto al r\u00edo. No est\u00e1 muy cerca de mi casa; ______, suelo ir all\u00ed una o dos veces al mes porque me ayuda a desconectar.", "o": ["porque / entonces", "desde mi punto de vista / luego", "aunque / asimismo", "por ejemplo / de todas formas"], "a": 3, "exp": "C\u00fcmlenin tamam\u0131: En mi ciudad hay muchos lugares interesantes para visitar durante el fin de semana. A m\u00ed me gustan especialmente los espacios tranquilos y con naturaleza. Me encanta salir a caminar por sitios hist\u00f3ricos; por ejemplo, el parque antiguo que est\u00e1 junto al r\u00edo. No est\u00e1 muy cerca de mi casa; de todas formas, suelo ir all\u00ed una o dos veces al mes porque me ayuda a desconectar. A veces voy solo y otras veces con mi hermana. Siempre volvemos con muchas fotos y buenos recuerdos.\nT\u00fcrk\u00e7e \u00e7evirisi: \u015eehrimde hafta sonu ziyaret etmek i\u00e7in bir\u00e7ok ilgin\u00e7 yer var. Ben \u00f6zellikle sakin ve do\u011fayla i\u00e7 i\u00e7e alanlar\u0131 seviyorum. Tarihi yerlerde y\u00fcr\u00fcy\u00fc\u015f yapmaya bay\u0131l\u0131yorum; \u00f6rne\u011fin, nehir kenar\u0131ndaki eski parkta. Evime \u00e7ok yak\u0131n de\u011fil; yine de, ayda bir ya da iki kez oraya gidiyorum \u00e7\u00fcnk\u00fc rahatlamama yard\u0131mc\u0131 oluyor. Bazen yaln\u0131z gidiyorum, bazen de k\u0131z karde\u015fimle. Her zaman bir\u00e7ok foto\u011fraf ve g\u00fczel an\u0131yla d\u00f6n\u00fcyoruz.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta genel bir fikirden sonra \u00f6rnek veriliyor, bu y\u00fczden por ejemplo kullan\u0131lmal\u0131d\u0131r. \u0130kinci bo\u015flukta park\u0131n uzak olmas\u0131yla oraya gitmeye devam etmesi aras\u0131nda taviz/z\u0131tl\u0131\u011fa yak\u0131n bir anlam vard\u0131r; burada de todas formas \u00e7ok uygundur. Yani \"uzak ama yine de gidiyorum\" mant\u0131\u011f\u0131 kuruluyor. Di\u011fer se\u00e7enekler bu anlam\u0131 do\u011fru vermez."}, {"t": "mc", "q": "8. Soru\nMarina quiere estudiar en una universidad extranjera. Sabe que necesita un buen nivel de idioma. ______, est\u00e1 tomando clases extra por las tardes. Tambi\u00e9n ha empezado a ver series sin subt\u00edtulos, ______ quiere acostumbrarse a escuchar diferentes acentos.", "o": ["por eso / porque", "sin embargo / luego", "en cambio / por consiguiente", "al final / adem\u00e1s"], "a": 0, "exp": "C\u00fcmlenin tamam\u0131: Marina quiere estudiar en una universidad extranjera el pr\u00f3ximo a\u00f1o. Sabe que necesita un buen nivel de idioma para poder hacerlo. Por eso, est\u00e1 tomando clases extra por las tardes y practica conversaci\u00f3n con una profesora nativa. Tambi\u00e9n ha empezado a ver series sin subt\u00edtulos, porque quiere acostumbrarse a escuchar diferentes acentos. Sus padres la apoyan mucho y le recuerdan que debe ser constante. Ella cree que, con esfuerzo, podr\u00e1 cumplir su objetivo.\nT\u00fcrk\u00e7e \u00e7evirisi: Marina gelecek y\u0131l yabanc\u0131 bir \u00fcniversitede okumak istiyor. Bunu yapabilmek i\u00e7in iyi bir dil seviyesine ihtiyac\u0131 oldu\u011funu biliyor. Bu y\u00fczden, \u00f6\u011fleden sonralar\u0131 ek ders al\u0131yor ve ana dili o dil olan bir \u00f6\u011fretmenle konu\u015fma prati\u011fi yap\u0131yor. Ayr\u0131ca altyaz\u0131s\u0131z diziler izlemeye ba\u015flad\u0131, \u00e7\u00fcnk\u00fc farkl\u0131 aksanlar\u0131 duymaya al\u0131\u015fmak istiyor. Ailesi onu \u00e7ok destekliyor ve istikrarl\u0131 olmas\u0131 gerekti\u011fini hat\u0131rlat\u0131yor. O da \u00e7abayla hedefine ula\u015fabilece\u011fine inan\u0131yor.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta ihtiya\u00e7 ile yap\u0131lan eylem aras\u0131nda sonu\u00e7 ili\u015fkisi var: dile ihtiyac\u0131 var, bu y\u00fczden ekstra \u00e7al\u0131\u015f\u0131yor. Bu nedenle por eso do\u011fru. \u0130kinci bo\u015flukta ise altyaz\u0131s\u0131z dizi izlemesinin sebebi veriliyor; bu y\u00fczden porque gerekir. Di\u011fer \u015f\u0131klar anlam\u0131 kayd\u0131r\u0131yor."}, {"t": "mc", "q": "9. Soru\nAyer ayud\u00e9 a mi hermano a preparar una cena especial. ______, fuimos al supermercado para comprar todo lo necesario. Despu\u00e9s limpiamos la cocina. ______, empezamos a cocinar y a poner la mesa.", "o": ["Primero / luego", "Sin embargo / por culpa de", "En mi caso / aunque", "Gracias a / en cambio"], "a": 0, "exp": "C\u00fcmlenin tamam\u0131: Ayer ayud\u00e9 a mi hermano a preparar una cena especial para nuestra familia. Primero, fuimos al supermercado para comprar todo lo necesario. Despu\u00e9s limpiamos la cocina y dejamos los ingredientes sobre la mesa. Luego, empezamos a cocinar y a poner la mesa para que todo estuviera listo a tiempo. Mis padres llegaron un poco tarde, pero la comida segu\u00eda caliente. Al final, todos cenamos juntos y pasamos una noche muy agradable.\nT\u00fcrk\u00e7e \u00e7evirisi: D\u00fcn karde\u015fime ailemiz i\u00e7in \u00f6zel bir ak\u015fam yeme\u011fi haz\u0131rlamas\u0131nda yard\u0131m ettim. \u0130lk olarak, gerekli her \u015feyi almak i\u00e7in s\u00fcpermarkete gittik. Sonra mutfa\u011f\u0131 temizledik ve malzemeleri masan\u0131n \u00fczerine b\u0131rakt\u0131k. Sonra, her \u015feyin zaman\u0131nda haz\u0131r olmas\u0131 i\u00e7in yemek yapmaya ve masay\u0131 kurmaya ba\u015flad\u0131k. Ailem biraz ge\u00e7 geldi ama yemek h\u00e2l\u00e2 s\u0131cakt\u0131. Sonunda hepimiz birlikte ak\u015fam yeme\u011fi yedik ve \u00e7ok ho\u015f bir gece ge\u00e7irdik.\nDetayl\u0131 a\u00e7\u0131klama: Bu soruda olaylar s\u0131rayla anlat\u0131l\u0131yor. \u0130lk bo\u015fluk i\u00e7in en do\u011fal ba\u011fla\u00e7 primero \u00e7\u00fcnk\u00fc s\u00fcre\u00e7 ba\u015fl\u0131yor. \u0130kinci bo\u015flukta sonraki ad\u0131m veriliyor, bu y\u00fczden luego uygun. Di\u011fer se\u00e7enekler anlam alan\u0131 olarak tamamen farkl\u0131d\u0131r."}, {"t": "mc", "q": "10. Soru\nHoy en d\u00eda muchas personas pasan varias horas al d\u00eda frente al m\u00f3vil. ______, no todo uso del tel\u00e9fono es negativo si sabemos controlar el tiempo. Es una herramienta muy \u00fatil para estudiar; ______, tambi\u00e9n puede distraernos demasiado si no tenemos l\u00edmites.", "o": ["En cambio / adem\u00e1s", "Para empezar / por eso", "Desde mi punto de vista / sin embargo", "Por ejemplo / entonces"], "a": 2, "exp": "C\u00fcmlenin tamam\u0131: Hoy en d\u00eda muchas personas pasan varias horas al d\u00eda frente al m\u00f3vil. Algunas lo usan por trabajo y otras para entretenerse o hablar con amigos. Desde mi punto de vista, no todo uso del tel\u00e9fono es negativo si sabemos controlar el tiempo. Es una herramienta muy \u00fatil para estudiar, buscar informaci\u00f3n o aprender idiomas; sin embargo, tambi\u00e9n puede distraernos demasiado si no tenemos l\u00edmites. Por esa raz\u00f3n, intento apagarlo cuando necesito concentrarme. As\u00ed aprovecho mejor mi tiempo y termino mis tareas m\u00e1s r\u00e1pido.\nT\u00fcrk\u00e7e \u00e7evirisi: G\u00fcn\u00fcm\u00fczde bir\u00e7ok insan g\u00fcnde birka\u00e7 saatini telefon kar\u015f\u0131s\u0131nda ge\u00e7iriyor. Baz\u0131lar\u0131 onu i\u015f i\u00e7in, baz\u0131lar\u0131 ise e\u011flenmek ya da arkada\u015flar\u0131yla konu\u015fmak i\u00e7in kullan\u0131yor. Benim bak\u0131\u015f a\u00e7\u0131ma g\u00f6re, zaman\u0131 kontrol etmeyi biliyorsak telefonun her kullan\u0131m\u0131 olumsuz de\u011fildir. Ders \u00e7al\u0131\u015fmak, bilgi aramak ya da dil \u00f6\u011frenmek i\u00e7in \u00e7ok yararl\u0131 bir ara\u00e7t\u0131r; ancak, s\u0131n\u0131rlar\u0131m\u0131z yoksa bizi fazlas\u0131yla da dikkat da\u011f\u0131tabilir. Bu nedenle odaklanmam gerekti\u011finde telefonu kapatmaya \u00e7al\u0131\u015f\u0131yorum. B\u00f6ylece zaman\u0131m\u0131 daha iyi de\u011ferlendiriyor ve g\u00f6revlerimi daha h\u0131zl\u0131 bitiriyorum.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015fluk ki\u015fisel de\u011ferlendirme istiyor. Bu nedenle fikir belirtme ba\u011flac\u0131 olan desde mi punto de vista tam uygundur. \u0130kinci bo\u015flukta telefonun yararl\u0131 y\u00f6n\u00fc ile dikkat da\u011f\u0131t\u0131c\u0131 y\u00f6n\u00fc kar\u015f\u0131la\u015ft\u0131r\u0131l\u0131yor; burada net bir z\u0131tl\u0131k vard\u0131r. Bu y\u00fczden sin embargo se\u00e7ilmelidir."}, {"t": "mc", "q": "11. Soru\nRa\u00fal decidi\u00f3 cambiar algunos h\u00e1bitos de su vida. Tambi\u00e9n ha dejado de comprar productos procesados, ______ prefiere preparar comida casera. Dice que al principio fue dif\u00edcil, ______ ahora nota que tiene m\u00e1s fuerza para trabajar.", "o": ["sin embargo / por ejemplo", "porque / pero", "adem\u00e1s / por eso", "en cambio / luego"], "a": 1, "exp": "C\u00fcmlenin tamam\u0131: Ra\u00fal decidi\u00f3 cambiar algunos h\u00e1bitos de su vida diaria porque \u00faltimamente se sent\u00eda sin energ\u00eda. Ahora intenta acostarse m\u00e1s temprano y comer de manera m\u00e1s equilibrada. Tambi\u00e9n ha dejado de comprar tantos productos procesados, porque prefiere preparar comida casera durante la semana. Dice que al principio fue dif\u00edcil organizarse mejor, pero ahora nota que tiene m\u00e1s fuerza para trabajar y hacer ejercicio. Los fines de semana sale a caminar por el barrio y evita pasar tantas horas sentado.\nT\u00fcrk\u00e7e \u00e7evirisi: Ra\u00fal, son zamanlarda kendini enerjisiz hissetti\u011fi i\u00e7in g\u00fcnl\u00fck ya\u015fam\u0131ndaki baz\u0131 al\u0131\u015fkanl\u0131klar\u0131n\u0131 de\u011fi\u015ftirmeye karar verdi. Art\u0131k daha erken uyumaya ve daha dengeli beslenmeye \u00e7al\u0131\u015f\u0131yor. Ayr\u0131ca art\u0131k \u00e7ok fazla i\u015flenmi\u015f \u00fcr\u00fcn alm\u0131yor, \u00e7\u00fcnk\u00fc hafta i\u00e7inde ev yeme\u011fi haz\u0131rlamay\u0131 tercih ediyor. Ba\u015fta daha d\u00fczenli olmak zordu, ama \u015fimdi \u00e7al\u0131\u015fmak ve spor yapmak i\u00e7in daha fazla g\u00fcc\u00fc oldu\u011funu fark ediyor. Hafta sonlar\u0131 mahallede y\u00fcr\u00fcy\u00fc\u015fe \u00e7\u0131k\u0131yor ve \u00e7ok fazla oturarak vakit ge\u00e7irmekten ka\u00e7\u0131n\u0131yor.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta a\u00e7\u0131k sebep var: i\u015flenmi\u015f \u00fcr\u00fcn almamas\u0131n\u0131n nedeni ev yeme\u011fi tercih etmesi. Bu y\u00fczden porque do\u011fru. \u0130kinci bo\u015flukta ba\u015fta zordu ile \u015fimdi daha iyi hissediyor aras\u0131nda kar\u015f\u0131tl\u0131k var; bu nedenle pero gerekir."}, {"t": "mc", "q": "12. Soru\nIrene hizo un viaje al norte de Espa\u00f1a. Quer\u00edan visitar lugares tranquilos y probar comida t\u00edpica; ______, reservaron habitaciones en casas rurales. El primer d\u00eda llov\u00ed casi todo el tiempo; ______, decidieron seguir con el plan y visitar un museo.", "o": ["por culpa de / mientras", "en mi opini\u00f3n / as\u00ed", "por ejemplo / porque", "por eso / de todas formas"], "a": 3, "exp": "C\u00fcmlenin tamam\u0131: El verano pasado, Irene hizo un viaje con dos amigas al norte de Espa\u00f1a. Antes de salir, buscaron informaci\u00f3n sobre los pueblos m\u00e1s bonitos de la zona. Quer\u00edan visitar lugares tranquilos y probar comida t\u00edpica; por eso, reservaron habitaciones peque\u00f1as en casas rurales. El primer d\u00eda llovi\u00f3 casi todo el tiempo; de todas formas, decidieron seguir con el plan y visitar un museo etnogr\u00e1fico. All\u00ed aprendieron muchas cosas sobre la historia local y compraron algunos recuerdos.\nT\u00fcrk\u00e7e \u00e7evirisi: Ge\u00e7en yaz Irene, \u0130spanya'n\u0131n kuzeyine iki arkada\u015f\u0131yla bir yolculuk yapt\u0131. \u00c7\u0131kmadan \u00f6nce b\u00f6lgenin en g\u00fczel k\u00f6yleri hakk\u0131nda bilgi arad\u0131lar. Sakin yerleri ziyaret etmek ve y\u00f6resel yemekler denemek istiyorlard\u0131; bu y\u00fczden k\u0131rsal evlerde k\u00fc\u00e7\u00fck odalar ay\u0131rtt\u0131lar. \u0130lk g\u00fcn neredeyse b\u00fct\u00fcn g\u00fcn ya\u011fmur ya\u011fd\u0131; yine de plana devam edip bir etnografya m\u00fczesini ziyaret etmeye karar verdiler. Orada yerel tarih hakk\u0131nda bir\u00e7ok \u015fey \u00f6\u011frendiler ve baz\u0131 hediyelik e\u015fyalar ald\u0131lar.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta istekleri ile yapt\u0131klar\u0131 rezervasyon aras\u0131nda sonu\u00e7 ili\u015fkisi var, bu y\u00fczden por eso do\u011fru. \u0130kinci bo\u015flukta ya\u011fmur ya\u011fmas\u0131na ra\u011fmen plan\u0131 s\u00fcrd\u00fcrmeleri anlat\u0131l\u0131yor; burada taviz/z\u0131tl\u0131k anlam\u0131 veren de todas formas gerekir."}, {"t": "mc", "q": "13. Soru\nSonia se mud\u00f3 a un piso compartido. A ella le toca limpiar la cocina los martes y jueves; ______, su compa\u00f1era Laura se ocupa del ba\u00f1o y del sal\u00f3n. El piso no es muy grande; ______, todos intentan respetar las normas para convivir mejor.", "o": ["aunque / por consiguiente", "por ejemplo / adem\u00e1s", "para m\u00ed / al final", "en cambio / sin embargo"], "a": 3, "exp": "C\u00fcmlenin tamam\u0131: Sonia se mud\u00f3 hace poco a un piso compartido cerca del centro. Est\u00e1 contenta porque ahora tarda menos en llegar al trabajo. Sus compa\u00f1eros de piso son bastante organizados y cada uno tiene tareas concretas en casa. A ella le toca limpiar la cocina los martes y jueves; en cambio, su compa\u00f1era Laura se ocupa del ba\u00f1o y del sal\u00f3n. El piso no es muy grande y a veces falta espacio; sin embargo, todos intentan respetar las normas para convivir mejor.\nT\u00fcrk\u00e7e \u00e7evirisi: Sonia k\u0131sa s\u00fcre \u00f6nce merkeze yak\u0131n ortak bir daireye ta\u015f\u0131nd\u0131. Art\u0131k i\u015fe daha az s\u00fcrede gitti\u011fi i\u00e7in mutlu. Ev arkada\u015flar\u0131 olduk\u00e7a d\u00fczenli ve her birinin evde somut g\u00f6revleri var. Ona sal\u0131 ve per\u015fembe g\u00fcnleri mutfa\u011f\u0131 temizlemek d\u00fc\u015f\u00fcyor; buna kar\u015f\u0131l\u0131k, ev arkada\u015f\u0131 Laura banyo ve salonla ilgileniyor. Ev \u00e7ok b\u00fcy\u00fck de\u011fil ve bazen yer yetmiyor; ancak, herkes daha iyi ge\u00e7inmek i\u00e7in kurallara uymaya \u00e7al\u0131\u015f\u0131yor.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta g\u00f6rev da\u011f\u0131l\u0131m\u0131 kar\u015f\u0131la\u015ft\u0131r\u0131l\u0131yor: Sonia'n\u0131n g\u00f6revi ba\u015fka, Laura'n\u0131nki ba\u015fka. Bu nedenle en cambio uygun. \u0130kinci bo\u015flukta evin k\u00fc\u00e7\u00fck olmas\u0131yla kurallara sayg\u0131 g\u00f6stererek uyumlu ya\u015famalar\u0131 aras\u0131nda z\u0131tl\u0131k var; burada sin embargo gerekir."}, {"t": "mc", "q": "14. Soru\nAlicia quiere comprarse una bicicleta. No quiere gastar demasiado dinero, ______ est\u00e1 buscando una opci\u00f3n pr\u00e1ctica y resistente. Le interesa usarla todos los d\u00edas, ______ ha preguntado si la tienda ofrece revisiones gratuitas durante el primer a\u00f1o.", "o": ["por eso / as\u00ed que", "sin embargo / adem\u00e1s", "aunque / por ejemplo", "por el contrario / por lo tanto"], "a": 0, "exp": "C\u00fcmlenin tamam\u0131: Alicia quiere comprarse una bicicleta para ir al trabajo de una manera m\u00e1s ecol\u00f3gica. Ha comparado varios modelos en internet y tambi\u00e9n ha visitado dos tiendas del barrio. No quiere gastar demasiado dinero, por eso est\u00e1 buscando una opci\u00f3n pr\u00e1ctica y resistente. Le interesa usarla todos los d\u00edas, as\u00ed que ha preguntado si la tienda ofrece revisiones gratuitas durante el primer a\u00f1o. Sus padres le han recomendado que pruebe varias antes de tomar una decisi\u00f3n.\nT\u00fcrk\u00e7e \u00e7evirisi: Alicia i\u015fe daha ekolojik bir \u015fekilde gitmek i\u00e7in bisiklet almak istiyor. \u0130nternette \u00e7e\u015fitli modelleri kar\u015f\u0131la\u015ft\u0131rd\u0131 ve mahallede iki ma\u011fazay\u0131 da ziyaret etti. \u00c7ok fazla para harcamak istemiyor, bu y\u00fczden kullan\u0131\u015fl\u0131 ve dayan\u0131kl\u0131 bir se\u00e7enek ar\u0131yor. Onu her g\u00fcn kullanmakla ilgileniyor, dolay\u0131s\u0131yla ma\u011fazan\u0131n ilk y\u0131l \u00fccretsiz bak\u0131m sunup sunmad\u0131\u011f\u0131n\u0131 sordu. Ailesi karar vermeden \u00f6nce birka\u00e7 tanesini denemesini tavsiye etti.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015fluk: Para harcamak istememesi ile pratik bir model aramas\u0131 aras\u0131nda sonu\u00e7 ili\u015fkisi var. Por eso burada en do\u011fal sonucu verir. \u0130kinci bo\u015fluk: Bisikleti her g\u00fcn kullanacak olmas\u0131, onu \u00fccretsiz bak\u0131mlar\u0131 sormaya itiyor. As\u00ed que kullanarak hem anlam\u0131 tamaml\u0131yoruz hem de por eso'yu tekrar etmiyoruz. B, C ve D \u015f\u0131klar\u0131 mant\u0131ksal ak\u0131\u015f\u0131 bozmaktad\u0131r."}, {"t": "mc", "q": "15. Soru\nEn muchas ciudades hay un problema de basura en espacios p\u00fablicos. No basta con poner m\u00e1s contenedores; ______, hace falta educar mejor a la poblaci\u00f3n. Las campa\u00f1as de informaci\u00f3n pueden ayudar mucho; ______, algunos colegios organizan actividades para ense\u00f1ar a reciclar.", "o": ["sin embargo / en cambio", "luego / por eso", "tambi\u00e9n / por ejemplo", "aunque / para empezar"], "a": 2, "exp": "C\u00fcmlenin tamam\u0131: En muchas ciudades se habla cada vez m\u00e1s del problema de la basura en los espacios p\u00fablicos. Algunas personas dejan botellas y papeles en parques, plazas y playas. Yo creo que no basta con poner m\u00e1s contenedores; tambi\u00e9n, hace falta educar mejor a la poblaci\u00f3n desde peque\u00f1a. Las campa\u00f1as de informaci\u00f3n pueden ayudar mucho; por ejemplo, algunos colegios organizan actividades para ense\u00f1ar a reciclar de forma responsable. Si todos colaboraran un poco m\u00e1s, las calles estar\u00edan mucho m\u00e1s limpias.\nT\u00fcrk\u00e7e \u00e7evirisi: Bir\u00e7ok \u015fehirde kamusal alanlardaki \u00e7\u00f6p sorunundan giderek daha fazla s\u00f6z ediliyor. Baz\u0131 ki\u015filer parklara, meydanlara ve plajlara \u015fi\u015fe ve k\u00e2\u011f\u0131t b\u0131rak\u0131yor. Bence sadece daha fazla \u00e7\u00f6p kutusu koymak yetmez; ayn\u0131 zamanda, halk\u0131 k\u00fc\u00e7\u00fck ya\u015ftan itibaren daha iyi e\u011fitmek gerekir. Bilgilendirme kampanyalar\u0131 \u00e7ok yard\u0131mc\u0131 olabilir; \u00f6rne\u011fin, baz\u0131 okullar sorumlu \u015fekilde geri d\u00f6n\u00fc\u015f\u00fcm \u00f6\u011fretmek i\u00e7in etkinlikler d\u00fczenliyor. Herkes biraz daha i\u015f birli\u011fi yapsa, sokaklar \u00e7ok daha temiz olurdu.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta ekleme anlam\u0131 var: sadece \u00e7\u00f6p kutusu yetmez, buna ek olarak e\u011fitim de gerekir. Bu y\u00fczden tambi\u00e9n uygundur. \u0130kinci bo\u015flukta genel fikirden sonra \u00f6rnek geliyor; bu y\u00fczden por ejemplo do\u011fru ba\u011flac\u0131d\u0131r."}, {"t": "mc", "q": "16. Soru\nNuria empez\u00f3 un curso para mejorar sus habilidades profesionales. Va a clase dos noches por semana, ______ durante el d\u00eda sigue con su horario normal de oficina. A veces llega cansada a casa, ______ dice que est\u00e1 aprendiendo cosas muy \u00fatiles.", "o": ["por consiguiente / tal como", "mientras / pero", "seg\u00fan yo / adem\u00e1s", "como / as\u00ed que"], "a": 1, "exp": "C\u00fcmlenin tamam\u0131: Hace dos meses, Nuria empez\u00f3 un curso para mejorar sus habilidades profesionales. Trabaja en una empresa peque\u00f1a y quiere aspirar a un puesto mejor en el futuro. Va a clase dos noches por semana, mientras durante el d\u00eda sigue con su horario normal de oficina. A veces llega cansada a casa, pero dice que est\u00e1 aprendiendo cosas muy \u00fatiles para su trabajo. Su jefe sabe que est\u00e1 haciendo ese esfuerzo y valora mucho su iniciativa.\nT\u00fcrk\u00e7e \u00e7evirisi: \u0130ki ay \u00f6nce Nuria, mesleki becerilerini geli\u015ftirmek i\u00e7in bir kursa ba\u015flad\u0131. K\u00fc\u00e7\u00fck bir \u015firkette \u00e7al\u0131\u015f\u0131yor ve gelecekte daha iyi bir pozisyona ge\u00e7mek istiyor. Haftada iki gece derse gidiyor, bu s\u0131rada g\u00fcnd\u00fczleri normal ofis program\u0131na devam ediyor. Bazen eve yorgun geliyor ama i\u015fi i\u00e7in \u00e7ok faydal\u0131 \u015feyler \u00f6\u011frendi\u011fini s\u00f6yl\u00fcyor. Amiri bu \u00e7abay\u0131 bildi\u011fi ve giri\u015fimini \u00e7ok takdir etti\u011fini s\u00f6yl\u00fcyor.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta iki paralel durum anlat\u0131l\u0131yor: ak\u015fam kurs, g\u00fcnd\u00fcz ofis. Bu t\u00fcr e\u015fzamanl\u0131 yap\u0131 i\u00e7in mientras \u00e7ok uygundur. \u0130kinci bo\u015flukta yoruluyor ile yine de faydal\u0131 buluyor aras\u0131nda z\u0131tl\u0131k var; burada pero gerekir."}, {"t": "mc", "q": "17. Soru\nTom\u00e1s pasa demasiado tiempo mirando el m\u00f3vil por la noche. Quiere cambiar esa costumbre, ______ ha decidido dejar el tel\u00e9fono en otra habitaci\u00f3n antes de dormir. Tambi\u00e9n ha empezado a leer unas p\u00e1ginas de una novela cada noche, ______ as\u00ed consigue relajarse sin usar pantallas.", "o": ["aunque / en cambio", "por eso / porque", "a continuaci\u00f3n / asimismo", "para m\u00ed / luego"], "a": 1, "exp": "C\u00fcmlenin tamam\u0131: Tom\u00e1s pasa demasiado tiempo mirando el m\u00f3vil por la noche y eso le trae algunos problemas. Muchas veces se acuesta tarde y al d\u00eda siguiente le cuesta concentrarse en clase. Quiere cambiar esa costumbre, por eso ha decidido dejar el tel\u00e9fono en otra habitaci\u00f3n antes de dormir. Tambi\u00e9n ha empezado a leer unas p\u00e1ginas de una novela cada noche, porque as\u00ed consigue relajarse sin usar pantallas. Sus profesores le hab\u00edan recomendado descansar mejor desde hac\u00eda meses.\nT\u00fcrk\u00e7e \u00e7evirisi: Tom\u00e1s geceleri telefona \u00e7ok zaman harc\u0131yor ve bu baz\u0131 sorunlara yol a\u00e7\u0131yor. \u00c7o\u011fu zaman ge\u00e7 yat\u0131yor ve ertesi g\u00fcn derste odaklanmakta g\u00fc\u00e7l\u00fck \u00e7ekiyor. Bu al\u0131\u015fkanl\u0131\u011f\u0131 de\u011fi\u015ftirmek istiyor, bu y\u00fczden uyumadan \u00f6nce telefonu ba\u015fka bir odada b\u0131rakmaya karar verdi. Ayr\u0131ca her gece bir roman\u0131n birka\u00e7 sayfas\u0131n\u0131 okumaya ba\u015flad\u0131, \u00e7\u00fcnk\u00fc bu \u015fekilde ekran kullanmadan rahatlayabiliyor. \u00d6\u011fretmenleri ona aylard\u0131r daha iyi uyumas\u0131n\u0131 tavsiye ediyordu.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta sorun ve al\u0131nan karar aras\u0131nda sonu\u00e7 ili\u015fkisi var, bu y\u00fczden por eso do\u011fru. \u0130kinci bo\u015flukta ise roman okuma al\u0131\u015fkanl\u0131\u011f\u0131n\u0131n sebebi a\u00e7\u0131klan\u0131yor: ekran kullanmadan rahatlamak. Bu nedenle porque gerekir."}, {"t": "mc", "q": "18. Soru\nEl ayuntamiento organiz\u00f3 una jornada de voluntariado para mejorar un parque. Todos trabajaron varias horas; ______, al terminar, el lugar ten\u00eda un aspecto mucho m\u00e1s agradable. Muchos vecinos llevaron agua y comida; ______, una panader\u00eda cercana regal\u00f3 varias cajas de galletas.", "o": ["sin embargo / aunque", "mientras / en cambio", "por lo tanto / adem\u00e1s", "a pesar de / por ejemplo"], "a": 2, "exp": "C\u00fcmlenin tamam\u0131: El ayuntamiento del barrio organiz\u00f3 una jornada de voluntariado para mejorar un peque\u00f1o parque. Participaron familias, estudiantes y algunos comerciantes de la zona. Primero recogieron la basura y despu\u00e9s plantaron flores en varias partes del jard\u00edn. Todos trabajaron varias horas; por lo tanto, al terminar, el lugar ten\u00eda un aspecto mucho m\u00e1s agradable. Muchos vecinos llevaron agua y comida para los participantes; adem\u00e1s, una panader\u00eda cercana regal\u00f3 varias cajas de galletas.\nT\u00fcrk\u00e7e \u00e7evirisi: Belediye, k\u00fc\u00e7\u00fck bir park\u0131 iyile\u015ftirmek i\u00e7in bir g\u00f6n\u00fcll\u00fcl\u00fck g\u00fcn\u00fc d\u00fczenledi. Aileler, \u00f6\u011frenciler ve b\u00f6lgeden baz\u0131 esnaf kat\u0131ld\u0131. \u00d6nce \u00e7\u00f6pleri toplad\u0131lar, ard\u0131ndan bah\u00e7enin \u00e7e\u015fitli yerlerine \u00e7i\u00e7ek diktiler. Herkes saatlerce \u00e7al\u0131\u015ft\u0131; dolay\u0131s\u0131yla, sonunda yer \u00e7ok daha ho\u015f bir g\u00f6r\u00fcn\u00fcme kavu\u015ftu. Bir\u00e7ok kom\u015fu kat\u0131l\u0131mc\u0131lar i\u00e7in su ve yiyecek getirdi; ayr\u0131ca, yak\u0131ndaki bir f\u0131r\u0131n birka\u00e7 kutu kurabiye hediye etti.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta yap\u0131lan eme\u011fin do\u011fal sonucu veriliyor; bu nedenle por lo tanto uygundur. \u0130kinci bo\u015flukta kom\u015fular\u0131n deste\u011fine ek bir bilgi daha geliyor; bu y\u00fczden adem\u00e1s do\u011fru se\u00e7imdir."}, {"t": "mc", "q": "19. Soru\nClara fue a una feria del libro. A Clara le interesan sobre todo las novelas hist\u00f3ricas; ______, pas\u00f3 bastante tiempo en los estands de varias editoriales especializadas. ______, compr\u00f3 solo dos libros porque se hab\u00eda puesto un presupuesto.", "o": ["por eso / al final", "sin embargo / en particular", "luego / porque", "tal como / adem\u00e1s"], "a": 0, "exp": "C\u00fcmlenin tamam\u0131: La semana pasada, Clara fue con su hermano a una feria del libro que se celebra cada a\u00f1o en su ciudad. Hab\u00eda autores invitados, actividades para ni\u00f1os y descuentos especiales en muchas tiendas. A Clara le interesan sobre todo las novelas hist\u00f3ricas; por eso, pas\u00f3 bastante tiempo en los estands de varias editoriales especializadas. Tambi\u00e9n asisti\u00f3 a una charla sobre h\u00e1bitos de lectura, y tom\u00f3 algunas notas en una libreta. Al final, compr\u00f3 solo dos libros porque se hab\u00eda puesto un presupuesto.\nT\u00fcrk\u00e7e \u00e7evirisi: Ge\u00e7en hafta Clara, karde\u015fiyle \u015fehrinde her y\u0131l d\u00fczenlenen bir kitap fuar\u0131na gitti. Davetli yazarlar, \u00e7ocuklar i\u00e7in etkinlikler ve bir\u00e7ok ma\u011fazada \u00f6zel indirimler vard\u0131. Clara \u00f6zellikle tarihi romanlarla ilgileniyor; bu y\u00fczden, uzman yay\u0131nevlerinin stantlar\u0131nda epey zaman ge\u00e7irdi. Ayr\u0131ca okuma al\u0131\u015fkanl\u0131klar\u0131yla ilgili bir s\u00f6yle\u015fiye kat\u0131ld\u0131 ve bir deftere baz\u0131 notlar ald\u0131. Sonunda, kendine bir b\u00fct\u00e7e koydu\u011fu i\u00e7in sadece iki kitap sat\u0131n ald\u0131.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta ilgi alan\u0131 ile davran\u0131\u015f aras\u0131nda sonu\u00e7 ili\u015fkisi var; bu y\u00fczden por eso do\u011fru. \u0130kinci bo\u015flukta ise olaylar\u0131n sonunda ula\u015f\u0131lan nihai durum veriliyor: sadece iki kitap almas\u0131. Bu nedenle al final gerekir."}, {"t": "mc", "q": "20. Soru\nEn mi edificio vive una se\u00f1ora mayor. Algunos vecinos casi nunca hablan con ella; yo, ______, intento preguntarle si necesita algo. No siempre tiene un problema concreto; ______, agradece mucho que alguien le dedique unos minutos para conversar.", "o": ["por ejemplo / aunque", "luego / por consiguiente", "a fin de / en particular", "en cambio / sin embargo"], "a": 3, "exp": "C\u00fcmlenin tamam\u0131: En mi edificio vive una se\u00f1ora mayor que a veces necesita ayuda con algunas tareas cotidianas. No puede cargar cosas pesadas y le cuesta bajar las bolsas de la compra por las escaleras. Algunos vecinos casi nunca hablan con ella; yo, en cambio, intento preguntarle de vez en cuando si necesita algo. No siempre tiene un problema concreto; sin embargo, agradece mucho que alguien le dedique unos minutos para conversar. Creo que estos peque\u00f1os gestos hacen m\u00e1s agradable la vida en comunidad.\nT\u00fcrk\u00e7e \u00e7evirisi: Binamda zaman zaman baz\u0131 g\u00fcnl\u00fck i\u015flerde yard\u0131ma ihtiya\u00e7 duyan ya\u015fl\u0131 bir bayan ya\u015f\u0131yor. A\u011f\u0131r \u015feyler ta\u015f\u0131yam\u0131yor ve al\u0131\u015fveri\u015f torbalar\u0131n\u0131 merdivenlerden indirmekte g\u00fc\u00e7l\u00fck \u00e7ekiyor. Baz\u0131 kom\u015fular onunla neredeyse hi\u00e7 konu\u015fmuyor; ben ise buna kar\u015f\u0131l\u0131k, ara s\u0131ra bir \u015feye ihtiyac\u0131 olup olmad\u0131\u011f\u0131n\u0131 sormaya \u00e7al\u0131\u015f\u0131yorum. Her zaman belirli bir sorunu olmuyor; ancak, birinin ona birka\u00e7 dakika ay\u0131r\u0131p sohbet etmesine \u00e7ok memnun oluyor. Bu k\u00fc\u00e7\u00fck jestlerin toplulukta ya\u015famay\u0131 daha keyifli k\u0131ld\u0131\u011f\u0131na inan\u0131yorum.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta di\u011fer kom\u015fularla konuyan\u0131n tavr\u0131 kar\u015f\u0131la\u015ft\u0131r\u0131l\u0131yor. Bu nedenle en cambio en uygun ba\u011fla\u00e7t\u0131r. \u0130kinci bo\u015flukta somut bir sorunu olmamas\u0131 ile yine de ilgiyi takdir etmesi aras\u0131nda z\u0131tl\u0131k var; bu y\u00fczden sin embargo gerekir."}, {"t": "mc", "q": "21. Soru\nEn Sevilla, la Feria de Abril es una de las celebraciones m\u00e1s conocidas. La ciudad recibe a much\u00edsimos visitantes, ______ el ambiente suele ser muy animado. Muchas mujeres llevan trajes tradicionales; ______, para muchos turistas, la feria es una oportunidad para conocer la cultura andaluza.", "o": ["aunque / en cambio", "por culpa de / adem\u00e1s", "mientras / por ejemplo", "por eso / adem\u00e1s"], "a": 3, "exp": "C\u00fcmlenin tamam\u0131: En Sevilla, la Feria de Abril es una de las celebraciones m\u00e1s conocidas de la primavera. Durante esos d\u00edas, muchas personas se re\u00fanen en casetas para comer, bailar y pasar tiempo con amigos o familia. La ciudad recibe a much\u00edsimos visitantes, por eso el ambiente suele ser muy animado desde la tarde hasta la noche. Muchas mujeres llevan trajes tradicionales y en muchas casetas se escucha m\u00fasica flamenca; adem\u00e1s, para muchos turistas, la feria es una oportunidad excelente para conocer mejor la cultura andaluza.\nT\u00fcrk\u00e7e \u00e7evirisi: Sevilla'da Nisan Fuar\u0131, ilkbahar\u0131n en bilinen kutlamalar\u0131ndan biridir. O g\u00fcnlerde bir\u00e7ok ki\u015fi yemek yemek, dans etmek ve arkada\u015f ya da aileyle vakit ge\u00e7irmek i\u00e7in \u00e7ad\u0131rlarda bir araya gelir. \u015eehir \u00e7ok say\u0131da ziyaret\u00e7i al\u0131r, bu y\u00fczden ortam \u00f6\u011fleden ak\u015fama kadar \u00e7ok canl\u0131 olur. Bir\u00e7ok kad\u0131n geleneksel k\u0131yafetler giyer ve bir\u00e7ok \u00e7ad\u0131rda flamenko m\u00fczi\u011fi duyulur; ayr\u0131ca, bir\u00e7ok turist i\u00e7in fuar End\u00fcl\u00fcs k\u00fclt\u00fcr\u00fcn\u00fc daha iyi tan\u0131mak i\u00e7in m\u00fckemmel bir f\u0131rsatt\u0131r.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta \u015fehire \u00e7ok ziyaret\u00e7i gelmesi ile ortam\u0131n \u00e7ok canl\u0131 olmas\u0131 aras\u0131nda net bir sonu\u00e7 ili\u015fkisi vard\u0131r. Bu nedenle por eso do\u011fru se\u00e7imdir. \u0130kinci bo\u015flukta ise ek bilgi verilmektedir. Bu y\u00fczden adem\u00e1s gerekir."}, {"t": "mc", "q": "22. Soru\nEn C\u00f3rdoba, mayo es un mes muy especial. Muchas familias abren sus casas al p\u00fablico, ______ los visitantes pueden entrar y admirar colores, macetas y fuentes. No todos los patios son iguales; ______, algunos son peque\u00f1os y sencillos, y otros est\u00e1n decorados de una manera m\u00e1s elaborada.", "o": ["de modo que / por ejemplo", "aunque / sin embargo", "por eso / al final", "mientras / asimismo"], "a": 0, "exp": "C\u00fcmlenin tamam\u0131: En C\u00f3rdoba, mayo es un mes muy especial porque mucha gente visita la ciudad para ver sus patios decorados con flores. Estos patios tienen una historia muy antigua y forman parte de la imagen m\u00e1s tradicional de la ciudad. Muchas familias abren sus casas al p\u00fablico durante esos d\u00edas, de modo que los visitantes pueden entrar y admirar colores, macetas y fuentes. No todos los patios son iguales; por ejemplo, algunos son peque\u00f1os y sencillos, y otros est\u00e1n decorados de una manera m\u00e1s elaborada.\nT\u00fcrk\u00e7e \u00e7evirisi: C\u00f3rdoba'da may\u0131s, \u00e7i\u00e7eklerle s\u00fcslenmi\u015f avlular\u0131n\u0131 g\u00f6rmek i\u00e7in \u015fehri ziyaret eden bir\u00e7ok ki\u015fi oldu\u011fu i\u00e7in \u00e7ok \u00f6zel bir ayd\u0131r. Bu avlular\u0131n \u00e7ok eski bir tarihi vard\u0131r ve \u015fehrin en geleneksel imgesinin bir par\u00e7as\u0131n\u0131 olu\u015ftururlar. O g\u00fcnlerde bir\u00e7ok aile evlerini halka a\u00e7ar, bu nedenle ziyaret\u00e7iler i\u00e7eri girip renkleri, saks\u0131lar\u0131 ve \u00e7e\u015fmeleri hayranl\u0131kla izleyebilir. T\u00fcm avlular ayn\u0131 de\u011fildir; \u00f6rne\u011fin, baz\u0131lar\u0131 k\u00fc\u00e7\u00fck ve sadedir.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta ailelerin evlerini a\u00e7mas\u0131 ile ziyaret\u00e7ilerin girebilmesi aras\u0131nda sonu\u00e7/\u00e7\u0131kt\u0131 ili\u015fkisi vard\u0131r. Bu nedenle de modo que \u00e7ok uygundur. \u0130kinci bo\u015flukta ise genel bir a\u00e7\u0131klaman\u0131n ard\u0131ndan somut \u00f6rnekler verildi\u011fi i\u00e7in por ejemplo do\u011fru cevapt\u0131r."}, {"t": "mc", "q": "23. Soru\nMadrid celebra en mayo las fiestas de San Isidro. Algunas personas se visten con ropa tradicional; ______, otras prefieren participar solo en los conciertos o en las verbenas. La fiesta mezcla costumbres antiguas con formas modernas; ______, resulta atractiva tanto para los habitantes como para los visitantes.", "o": ["por ejemplo / aunque", "adem\u00e1s / en cambio", "en cambio / por eso", "luego / seg\u00fan yo"], "a": 2, "exp": "C\u00fcmlenin tamam\u0131: Madrid celebra en mayo las fiestas de San Isidro, que est\u00e1n dedicadas al patr\u00f3n de la ciudad. Durante esos d\u00edas hay conciertos, actividades populares y reuniones al aire libre en diferentes zonas. Muchas personas van a la Pradera de San Isidro con amigos o familiares para comer y escuchar m\u00fasica. Algunas personas se visten con ropa tradicional madrile\u00f1a; en cambio, otras prefieren participar solo en los conciertos o en las verbenas. La fiesta mezcla costumbres antiguas con formas modernas de celebrar; por eso, resulta atractiva tanto para los habitantes de Madrid como para los visitantes.\nT\u00fcrk\u00e7e \u00e7evirisi: Madrid, may\u0131s ay\u0131nda \u015fehrin koruyucusuna adanm\u0131\u015f San Isidro festivalini kutlar. O g\u00fcnlerde farkl\u0131 b\u00f6lgelerde konserler, halk etkinlikleri ve a\u00e7\u0131k hava toplant\u0131lar\u0131 d\u00fczenlenir. Bir\u00e7ok ki\u015fi yemek yemek ve m\u00fczik dinlemek i\u00e7in San Isidro \u00c7ay\u0131r\u0131'na arkada\u015f ya da aileyle gider. Baz\u0131 ki\u015filer geleneksel Madrid k\u0131yafetleri giyer; buna kar\u015f\u0131l\u0131k, baz\u0131lar\u0131 sadece konserlere kat\u0131lmay\u0131 tercih eder. Festival eski gelenekleri modern kutlama bi\u00e7imleriyle birle\u015ftirir; bu y\u00fczden, hem Madridliler hem de ziyaret\u00e7iler i\u00e7in \u00e7ekicidir.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta iki farkl\u0131 kat\u0131l\u0131m bi\u00e7imi kar\u015f\u0131la\u015ft\u0131r\u0131l\u0131yor. Bu nedenle en cambio uygundur. \u0130kinci bo\u015flukta ise gelenek + modernlik kar\u0131\u015f\u0131m\u0131 ile herkes i\u00e7in \u00e7ekici olmas\u0131 aras\u0131nda sonu\u00e7 ili\u015fkisi var; bu y\u00fczden por eso gerekir."}, {"t": "mc", "q": "24. Soru\nLa noche de San Juan se celebra en junio con fuego, m\u00fasica y reuniones en la playa. Algunos encienden hogueras y otros miran fuegos artificiales, ______ la noche tiene un ambiente muy especial. Muchos consideran esta celebraci\u00f3n como una manera simb\u00f3lica de recibir el verano, ______ se mantienen costumbres que se repiten cada a\u00f1o.", "o": ["por ejemplo / asimismo", "por eso / y por eso", "aunque / sin embargo", "mientras / en particular"], "a": 1, "exp": "C\u00fcmlenin tamam\u0131: En muchas zonas de Espa\u00f1a, la noche de San Juan se celebra en junio con fuego, m\u00fasica y reuniones en la playa o en la calle. En ciudades como Alicante o A Coru\u00f1a, esta fiesta atrae a much\u00edsimas personas. La gente suele salir con amigos para cenar y esperar hasta medianoche. Algunos encienden hogueras y otros miran fuegos artificiales, por eso la noche tiene un ambiente muy especial y lleno de energ\u00eda. Muchos consideran esta celebraci\u00f3n como una manera simb\u00f3lica de recibir el verano, y por eso se mantienen costumbres que se repiten cada a\u00f1o.\nT\u00fcrk\u00e7e \u00e7evirisi: \u0130spanya'n\u0131n bir\u00e7ok b\u00f6lgesinde San Juan gecesi haziranda ate\u015f, m\u00fczik ve plaj ya da sokakta toplant\u0131larla kutlan\u0131r. Alicante veya A Coru\u00f1a gibi \u015fehirlerde bu festival \u00e7ok say\u0131da ki\u015fiyi \u00e7eker. \u0130nsanlar genellikle yemek yemek ve gece yar\u0131s\u0131n\u0131 beklemek i\u00e7in arkada\u015flar\u0131yla d\u0131\u015far\u0131 \u00e7\u0131kar. Baz\u0131lar\u0131 ate\u015f yakar, baz\u0131lar\u0131 da havai fi\u015fekleri izler, bu y\u00fczden gece \u00e7ok \u00f6zel bir atmosfere sahip olur. Bir\u00e7ok ki\u015fi bu kutlamay\u0131 yaz\u0131 sembolik olarak kar\u015f\u0131lama bi\u00e7imi olarak g\u00f6r\u00fcr, ve bu y\u00fczden her y\u0131l tekrarlanan gelenekler s\u00fcrd\u00fcr\u00fcl\u00fcr.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta kutlama unsurlar\u0131 ile ortaya \u00e7\u0131kan atmosfer aras\u0131nda sonu\u00e7 ili\u015fkisi vard\u0131r; bu y\u00fczden por eso gerekir. \u0130kinci bo\u015flukta ise kutlaman\u0131n sembolik \u00f6nemi ile geleneklerin s\u00fcrmesi aras\u0131nda yine sonu\u00e7 ili\u015fkisi bulunur. Bu nedenle y por eso en do\u011fal se\u00e7enektir."}, {"t": "mc", "q": "25. Soru\nDurante la Feria de Abril, muchas personas pasan horas dentro de las casetas hablando y bailando. Estas reuniones forman parte esencial de la fiesta, ______ permiten compartir tiempo con otras personas. Para muchos visitantes, la feria es visualmente espectacular; ______, tambi\u00e9n sirve para comprender mejor algunas costumbres sociales de Andaluc\u00eda.", "o": ["en cambio / luego", "porque / adem\u00e1s", "aunque / por ejemplo", "al principio / sin embargo"], "a": 1, "exp": "C\u00fcmlenin tamam\u0131: Muchos turistas visitan Sevilla no solo por sus monumentos, sino tambi\u00e9n por la imagen festiva que ofrece en primavera. La ciudad tiene una relaci\u00f3n muy fuerte con la m\u00fasica, el baile y ciertas formas tradicionales de convivencia social. Durante la Feria de Abril, muchas personas pasan horas dentro de las casetas hablando, comiendo y bailando. Estas reuniones forman parte esencial de la fiesta, porque permiten compartir tiempo con otras personas en un ambiente muy abierto. Para muchos visitantes, la feria es visualmente espectacular; adem\u00e1s, tambi\u00e9n sirve para comprender mejor algunas costumbres sociales de Andaluc\u00eda.\nT\u00fcrk\u00e7e \u00e7evirisi: Bir\u00e7ok turist Sevilla'y\u0131 yaln\u0131zca an\u0131tlar\u0131 i\u00e7in de\u011fil, ayn\u0131 zamanda ilkbaharda sundu\u011fu \u015fenlikli g\u00f6r\u00fcnt\u00fc i\u00e7in de ziyaret eder. \u015eehrin m\u00fczik, dans ve geleneksel toplumsal birliktelik bi\u00e7imleriyle \u00e7ok g\u00fc\u00e7l\u00fc bir ba\u011f\u0131 vard\u0131r. Nisan Fuar\u0131 s\u0131ras\u0131nda bir\u00e7ok ki\u015fi saatlerce \u00e7ad\u0131rlarda sohbet ederek, yiyerek ve dans ederek vakit ge\u00e7irir. Bu bulu\u015fmalar festivalin temel bir par\u00e7as\u0131d\u0131r, \u00e7\u00fcnk\u00fc di\u011fer insanlarla \u00e7ok a\u00e7\u0131k bir ortamda vakit payla\u015fmay\u0131 sa\u011flar. Bir\u00e7ok ziyaret\u00e7i i\u00e7in fuar g\u00f6rsel olarak \u00e7ok etkileyicidir; ayr\u0131ca, baz\u0131 sosyal gelenekleri daha iyi anlamaya da yarar.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta caseta bulu\u015fmalar\u0131n\u0131n neden \u00f6nemli oldu\u011fu a\u00e7\u0131klan\u0131yor. Bu nedenle porque ile sebep verilir. \u0130kinci bo\u015flukta ise g\u00f6rsel olarak etkileyici olmas\u0131na ek bir i\u015flev daha ekleniyor; bu y\u00fczden adem\u00e1s do\u011fru ba\u011flac\u0131d\u0131r."}, {"t": "mc", "q": "26. Soru\nC\u00f3rdoba es una ciudad que muchos viajeros asocian con la historia. Algunos patios tienen muchas macetas; ______, cada uno ofrece una experiencia distinta. No todas las personas viajan a C\u00f3rdoba por la misma raz\u00f3n; ______, muchas terminan recordando precisamente esa parte \u00edntima y tranquila.", "o": ["por culpa de / aunque", "porque / entonces", "tal como / a fin de", "por eso / sin embargo"], "a": 3, "exp": "C\u00fcmlenin tamam\u0131: C\u00f3rdoba es una ciudad que muchos viajeros asocian con la historia y con la mezcla de culturas. Sin embargo, en mayo tambi\u00e9n destaca por la belleza cotidiana de sus patios llenos de flores. Durante la fiesta, los visitantes suelen recorrer diferentes barrios para comparar estilos, colores y formas de decoraci\u00f3n. Algunos patios tienen muchas macetas peque\u00f1as y otros incluyen fuentes o rincones m\u00e1s sombreados; por eso, cada uno ofrece una experiencia distinta. No todas las personas viajan a C\u00f3rdoba por la misma raz\u00f3n; sin embargo, muchas terminan recordando precisamente esa parte \u00edntima y tranquila de la ciudad.\nT\u00fcrk\u00e7e \u00e7evirisi: C\u00f3rdoba, bir\u00e7ok gezginin tarihle ve k\u00fclt\u00fcr kar\u0131\u015f\u0131m\u0131yla \u00f6zde\u015fle\u015ftirdi\u011fi bir \u015fehirdir. Ancak may\u0131s ay\u0131nda ayn\u0131 zamanda \u00e7i\u00e7eklerle dolu avlular\u0131n\u0131n g\u00fcnl\u00fck g\u00fczelli\u011fiyle de \u00f6ne \u00e7\u0131kar. Festival s\u0131ras\u0131nda ziyaret\u00e7iler genellikle stil, renk ve dekorasyon bi\u00e7imlerini kar\u015f\u0131la\u015ft\u0131rmak i\u00e7in farkl\u0131 mahalleleri gezerler. Baz\u0131 avlularda \u00e7ok say\u0131da k\u00fc\u00e7\u00fck saks\u0131 vard\u0131r, baz\u0131lar\u0131nda ise \u00e7e\u015fmeler ya da daha g\u00f6lgeli k\u00f6\u015feler bulunur; bu y\u00fczden her biri farkl\u0131 bir deneyim sunar. Herkes C\u00f3rdoba'ya ayn\u0131 nedenle gitmez; ancak, bir\u00e7ok ki\u015fi sonunda tam da \u015fehrin o samimi ve sakin y\u00f6n\u00fcn\u00fc hat\u0131rlar.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta avlular\u0131n farkl\u0131 yap\u0131da olmas\u0131 ile her birinin farkl\u0131 deneyim sunmas\u0131 aras\u0131nda a\u00e7\u0131k bir sonu\u00e7 ili\u015fkisi vard\u0131r. Bu y\u00fczden por eso uygundur. \u0130kinci bo\u015flukta ise insanlar\u0131n geli\u015f nedeni farkl\u0131 olsa da benzer bir izlenimle d\u00f6nmeleri anlat\u0131l\u0131r; burada sin embargo ile z\u0131tl\u0131k kurulmal\u0131d\u0131r."}, {"t": "mc", "q": "27. Soru\nEn Madrid, las fiestas de San Isidro permiten ver una imagen muy popular. Algunas personas van por tradici\u00f3n familiar y otras solo porque quieren escuchar m\u00fasica. ______, la fiesta consigue reunir a personas con intereses muy distintos. Mucha gente lleva comida para compartir; ______, el encuentro no se limita a los conciertos.", "o": ["por eso / adem\u00e1s", "en cambio / aunque", "por ejemplo / luego", "a mi parecer / sin embargo"], "a": 0, "exp": "C\u00fcmlenin tamam\u0131: En Madrid, las fiestas de San Isidro permiten ver una imagen muy popular de la ciudad, diferente de la vida cotidiana de oficina o del ritmo tur\u00edstico habitual. Durante esos d\u00edas se organizan actividades para todas las edades y en varios espacios abiertos. Algunas personas van por tradici\u00f3n familiar y otras solo porque quieren escuchar m\u00fasica o salir con amigos. Por eso, la fiesta consigue reunir a personas con intereses muy distintos en un mismo ambiente. Mucha gente lleva comida para compartir en la pradera y pasa all\u00ed varias horas; adem\u00e1s, el encuentro no se limita a los conciertos, sino que tambi\u00e9n tiene un lado social muy importante.\nT\u00fcrk\u00e7e \u00e7evirisi: Madrid'de San Isidro festivalleri \u015fehrin \u00e7ok pop\u00fcler bir imgesini g\u00f6rmemizi sa\u011flar; ofis ya\u015fam\u0131ndan veya al\u0131\u015f\u0131lm\u0131\u015f turistik tempodan farkl\u0131 bir g\u00f6r\u00fcnt\u00fc sunar. O g\u00fcnlerde her ya\u015fa y\u00f6nelik etkinlikler ve \u00e7e\u015fitli a\u00e7\u0131k alanlarda bulu\u015fmalar d\u00fczenlenir. Baz\u0131 insanlar aile gelene\u011fi i\u00e7in gider, baz\u0131lar\u0131 ise sadece m\u00fczik dinlemek i\u00e7in. Bu y\u00fczden festival \u00e7ok farkl\u0131 ilgi alanlar\u0131na sahip insanlar\u0131 ayn\u0131 ortamda bir araya getirmeyi ba\u015far\u0131r. Bir\u00e7ok ki\u015fi \u00e7ay\u0131rda payla\u015fmak i\u00e7in yiyecek g\u00f6t\u00fcr\u00fcr; ayr\u0131ca, bulu\u015fma yaln\u0131zca konserlerle s\u0131n\u0131rl\u0131 de\u011fildir.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta insanlar\u0131n farkl\u0131 nedenlerle gelmesi sonucunda festivalin \u00e7e\u015fitli ki\u015fileri bir araya getirmesi anlat\u0131l\u0131yor. Bu y\u00fczden por eso do\u011frudur. \u0130kinci bo\u015flukta sosyal y\u00f6n, konserlere eklenen yeni bir bilgi olarak veriliyor; bu nedenle adem\u00e1s gerekir."}, {"t": "mc", "q": "28. Soru\nLa noche de San Juan tiene una presencia especial en varias ciudades costeras. No todos participan de la misma forma; ______, algunos prefieren saltar hogueras y otros simplemente pasean. La fiesta combina diversi\u00f3n y tradici\u00f3n; ______, sigue siendo importante para muchas personas incluso en contextos muy modernos.", "o": ["por eso / adem\u00e1s", "aunque / en cambio", "por ejemplo / por eso", "mientras / al final"], "a": 2, "exp": "C\u00fcmlenin tamam\u0131: La noche de San Juan tiene una presencia especial en varias ciudades costeras de Espa\u00f1a. Muchas personas la relacionan con el fuego, el mar y ciertos deseos o rituales simb\u00f3licos. En algunos lugares, la gente se re\u00fane en la playa para esperar la medianoche y ver c\u00f3mo cambian el ambiente y la luz. No todos participan de la misma forma; por ejemplo, algunos prefieren saltar hogueras y otros simplemente pasean o hablan con amigos. La fiesta combina diversi\u00f3n y tradici\u00f3n; por eso, sigue siendo importante para muchas personas incluso en contextos muy modernos.\nT\u00fcrk\u00e7e \u00e7evirisi: San Juan gecesi, \u0130spanya'n\u0131n \u00e7e\u015fitli k\u0131y\u0131 \u015fehirlerinde \u00f6zel bir yere sahiptir. Bir\u00e7ok ki\u015fi onu ate\u015f, deniz ve baz\u0131 dilekler ya da sembolik rit\u00fcellerle ili\u015fkilendirir. Baz\u0131 yerlerde insanlar gece yar\u0131s\u0131n\u0131 beklemek ve ortam\u0131n ve \u0131\u015f\u0131\u011f\u0131n nas\u0131l de\u011fi\u015fti\u011fini g\u00f6rmek i\u00e7in plajda bir araya gelir. Herkes ayn\u0131 \u015fekilde kat\u0131lmaz; \u00f6rne\u011fin, baz\u0131lar\u0131 ate\u015flerin \u00fczerinden atlamay\u0131 tercih eder. Festival e\u011flenceyle gelene\u011fi birle\u015ftirir; bu y\u00fczden, \u00e7ok modern ba\u011flamlarda bile bir\u00e7ok insan i\u00e7in \u00f6nemini korur.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta kat\u0131l\u0131m bi\u00e7imlerine \u00f6rnek veriliyor; bu y\u00fczden por ejemplo gerekir. \u0130kinci bo\u015flukta ise e\u011flence + gelenek birle\u015fimi ile bug\u00fcn h\u00e2l\u00e2 \u00f6nemli olmas\u0131 aras\u0131nda sonu\u00e7 ili\u015fkisi var. Bu nedenle por eso do\u011fru cevapt\u0131r."}, {"t": "mc", "q": "29. Soru\nAlgunos estudiantes viajan a Espa\u00f1a en primavera para practicar el idioma. Otro que prefiera m\u00fasica y reuniones m\u00e1s numerosas podr\u00eda escoger Sevilla; ______, alguien m\u00e1s interesado en una fiesta urbana y popular quiz\u00e1 disfrutar\u00eda especialmente Madrid. Todas estas opciones permiten aprender cultura; ______, muchas personas recuerdan esos viajes como experiencias muy completas.", "o": ["aunque / mientras", "por ejemplo / pero", "en cambio / por eso", "al contrario / asimismo"], "a": 2, "exp": "C\u00fcmlenin tamam\u0131: Algunos estudiantes de espa\u00f1ol viajan a Espa\u00f1a en primavera para practicar el idioma y conocer mejor las costumbres del pa\u00eds. Elegir una ciudad durante una fiesta puede ser muy \u00fatil porque se escuchan acentos reales y se observan comportamientos sociales aut\u00e9nticos. Sevilla, C\u00f3rdoba o Madrid ofrecen oportunidades muy distintas, seg\u00fan el mes y el tipo de celebraci\u00f3n. Un estudiante interesado en flores, tradici\u00f3n y espacios tranquilos podr\u00eda sentirse muy c\u00f3modo en C\u00f3rdoba durante mayo. Otro que prefiera m\u00fasica, movimiento y reuniones m\u00e1s numerosas podr\u00eda escoger Sevilla; en cambio, alguien m\u00e1s interesado en una fiesta urbana y popular quiz\u00e1 disfrutar\u00eda especialmente Madrid. Todas estas opciones permiten aprender cultura de manera directa; por eso, muchas personas recuerdan esos viajes como experiencias muy completas.\nT\u00fcrk\u00e7e \u00e7evirisi: Baz\u0131 \u0130spanyolca \u00f6\u011frencileri dili pratik yapmak ve \u00fclkenin geleneklerini daha iyi tan\u0131mak i\u00e7in ilkbaharda \u0130spanya'ya gidiyor. Bir festival s\u0131ras\u0131nda bir \u015fehir se\u00e7mek \u00e7ok yararl\u0131 olabilir \u00e7\u00fcnk\u00fc ger\u00e7ek aksanlar duyulur ve \u00f6zg\u00fcn sosyal davran\u0131\u015flar g\u00f6zlemlenir. Sevilla, C\u00f3rdoba veya Madrid, ay ve kutlama t\u00fcr\u00fcne g\u00f6re \u00e7ok farkl\u0131 f\u0131rsatlar sunar. \u00c7i\u00e7ekler, gelenek ve sakin mek\u00e2nlara ilgi duyan bir \u00f6\u011frenci may\u0131s ay\u0131nda C\u00f3rdoba'da \u00e7ok rahat hissedebilir. M\u00fczik, hareket ve daha kalabal\u0131k bulu\u015fmalar\u0131 seven biri Sevilla'y\u0131 se\u00e7ebilir; buna kar\u015f\u0131l\u0131k, daha kentsel bir festivale ilgi duyan biri muhtemelen \u00f6zellikle Madrid'den ho\u015flanacakt\u0131r. B\u00fct\u00fcn bu se\u00e7enekler k\u00fclt\u00fcr\u00fc do\u011frudan \u00f6\u011frenmeye imk\u00e2n verir; bu y\u00fczden, bir\u00e7ok insan bu yolculuklar\u0131 \u00e7ok kapsaml\u0131 deneyimler olarak hat\u0131rlar.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta \u00f6\u011frenci profilleri ve \u015fehir tercihleri kar\u015f\u0131la\u015ft\u0131r\u0131l\u0131yor. Bu nedenle en cambio uygundur. \u0130kinci bo\u015flukta ise k\u00fclt\u00fcr\u00fc do\u011frudan \u00f6\u011frenme imk\u00e2n\u0131 ile seyahatin \u00e7ok dolu bir deneyim olarak hat\u0131rlanmas\u0131 aras\u0131nda sonu\u00e7 ili\u015fkisi vard\u0131r; bu y\u00fczden por eso gerekir."}, {"t": "mc", "q": "30. Soru\nLos Patios de C\u00f3rdoba permiten descubrir una belleza m\u00e1s tranquila y cotidiana, ______ la noche de San Juan destaca por su relaci\u00f3n con el fuego, el verano y el espacio p\u00fablico. Todas estas celebraciones son diferentes entre s\u00ed; ______, juntas ofrecen una visi\u00f3n muy rica de la diversidad cultural espa\u00f1ola.", "o": ["aunque / sin embargo", "mientras / por eso", "porque / adem\u00e1s", "por ejemplo / luego"], "a": 1, "exp": "C\u00fcmlenin tamam\u0131: Espa\u00f1a tiene muchas fiestas locales, pero algunas consiguen representar muy bien el car\u00e1cter de una ciudad concreta. San Isidro suele asociarse con una imagen castiza y popular de Madrid. La Feria de Abril muestra una parte muy sociable y festiva de Sevilla. Los Patios de C\u00f3rdoba permiten descubrir una belleza m\u00e1s tranquila y cotidiana, mientras la noche de San Juan destaca por su relaci\u00f3n con el fuego, el verano y el espacio p\u00fablico. Todas estas celebraciones son diferentes entre s\u00ed; por eso, juntas ofrecen una visi\u00f3n muy rica de la diversidad cultural espa\u00f1ola.\nT\u00fcrk\u00e7e \u00e7evirisi: \u0130spanya'n\u0131n bir\u00e7ok yerel festivali vard\u0131r, ancak baz\u0131lar\u0131 belirli bir \u015fehrin karakterini \u00e7ok iyi temsil etmeyi ba\u015far\u0131r. San Isidro genellikle Madrid'in \u00f6zg\u00fcn ve pop\u00fcler bir imgesiyle \u00f6zde\u015fle\u015ftirilir. Nisan Fuar\u0131 Sevilla'n\u0131n \u00e7ok sosyal ve \u015fenlikli bir y\u00f6n\u00fcn\u00fc g\u00f6sterir. C\u00f3rdoba avlular\u0131 daha sakin ve g\u00fcnl\u00fck bir g\u00fczelli\u011fi ke\u015ffetmeyi sa\u011flar, oysa/iken San Juan gecesi ate\u015f, yaz ve kamusal alanla ili\u015fkisiyle \u00f6ne \u00e7\u0131kar. B\u00fct\u00fcn bu kutlamalar birbirinden farkl\u0131d\u0131r; bu y\u00fczden, birlikte \u0130spanyol k\u00fclt\u00fcrel \u00e7e\u015fitlili\u011fine dair \u00e7ok zengin bir bak\u0131\u015f sunarlar.\nDetayl\u0131 a\u00e7\u0131klama: \u0130lk bo\u015flukta C\u00f3rdoba'n\u0131n sakin estetik ile San Juan'\u0131n daha ate\u015fli, kamusal ve enerjik yap\u0131s\u0131 kar\u015f\u0131la\u015ft\u0131r\u0131l\u0131yor. Bu y\u00fczden mientras burada \"buna kar\u015f\u0131l\u0131k\" i\u015fleviyle do\u011fru kullan\u0131md\u0131r. \u0130kinci bo\u015flukta farkl\u0131 olmalar\u0131n\u0131n sonucunda birlikte zengin bir tablo sunmalar\u0131 anlat\u0131l\u0131yor; bu nedenle por eso gereklidir."}, {"t": "mc", "badge": "anuncio", "q": "31. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio se adapta mejor a una persona que necesita un lugar donde dejen a su mascota durante la jornada laboral?", "a1": "ANUNCIO A:\n\u00bfQuieres mejorar tu forma f\u00edsica? Entonces prueba nuestras clases de entrenamiento funcional. Adem\u00e1s, abrimos todos los d\u00edas desde las siete de la ma\u00f1ana. Aunque el trabajo es intenso, cada persona puede avanzar a su propio ritmo. Por eso, muchas personas sin experiencia tambi\u00e9n se apuntan.", "a2": "ANUNCIO B:\nEste verano proponemos talleres de cocina para j\u00f3venes y adultos. Primero aprender\u00e1s recetas sencillas y luego preparar\u00e1s platos m\u00e1s creativos. Como utilizamos ingredientes frescos, cada sesi\u00f3n termina con una peque\u00f1a degustaci\u00f3n. Sin embargo, las plazas son limitadas.", "a3": "ANUNCIO C:\n\u00bfTe interesa descubrir rincones hist\u00f3ricos de la ciudad? Organizamos recorridos a pie con gu\u00eda especializado. A pesar de que las visitas duran dos horas, el ritmo es tranquilo. Adem\u00e1s, al final del recorrido te damos un mapa con recomendaciones culturales.", "a4": "ANUNCIO D:\n\u00bfTu perro pasa demasiadas horas solo en casa? En nuestro centro podr\u00e1 jugar, correr y relacionarse con otros animales. Mientras t\u00fa trabajas, nosotros cuidamos de \u00e9l con atenci\u00f3n profesional. Por lo tanto, tendr\u00e1 un d\u00eda entretenido y seguro.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 3, "exp": "Do\u011fru cevap D'dir \u00e7\u00fcnk\u00fc bu ilanda ki\u015finin \u00e7al\u0131\u015ft\u0131\u011f\u0131 s\u0131rada k\u00f6pe\u011finin g\u00fcvenli bir yerde kalabilece\u011fi anlat\u0131l\u0131yor. \u0130landa do\u011frudan \"sen \u00e7al\u0131\u015f\u0131rken biz onunla ilgileniyoruz\" anlam\u0131 var. Di\u011fer ilanlar spor, yemek at\u00f6lyesi ve \u015fehir turu ile ilgili oldu\u011fu i\u00e7in sorudaki ihtiyaca uymaz."}, {"t": "mc", "badge": "anuncio", "q": "32. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio podr\u00eda interesar a alguien que quiere hacer una actividad para aprender sobre edificios antiguos y zonas con historia?", "a1": "ANUNCIO A:\n\u00bfTe gustar\u00eda conocer mejor el pasado de tu ciudad? Ofrecemos paseos guiados por barrios antiguos y monumentos menos conocidos. Adem\u00e1s, explicamos curiosidades que no suelen aparecer en las gu\u00edas tur\u00edsticas. Aunque la actividad es cultural, tambi\u00e9n resulta muy entretenida.", "a2": "ANUNCIO B:\nSi quieres renovar tu sal\u00f3n, ven a nuestra tienda de muebles. Tenemos mesas, sof\u00e1s y l\u00e1mparas para todos los gustos. En cambio, no vendemos art\u00edculos para exteriores. Por eso, consulta nuestro cat\u00e1logo antes de visitarnos.", "a3": "ANUNCIO C:\nAprende a tocar la guitarra desde cero. Primero conocer\u00e1s los acordes b\u00e1sicos y despu\u00e9s practicar\u00e1s canciones sencillas. Como los grupos son reducidos, el profesor puede corregir a cada alumno. Sin embargo, es necesario traer instrumento propio.", "a4": "ANUNCIO D:\nNuestro servicio de lavander\u00eda expr\u00e9s abre incluso los domingos. Lavamos, secamos y doblamos tu ropa en pocas horas. Adem\u00e1s, utilizamos productos especiales para prendas delicadas. As\u00ed que ahorras tiempo sin renunciar al buen cuidado de tu ropa.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 0, "exp": "Do\u011fru cevap A'd\u0131r \u00e7\u00fcnk\u00fc burada rehberli y\u00fcr\u00fcy\u00fc\u015flerle eski mahalleler ve tarihi yap\u0131lar tan\u0131t\u0131l\u0131yor. Soruda tarihi b\u00f6lgeler ve eski yap\u0131larla ilgili bir etkinlik arayan ki\u015fiden bahsediliyor. B mobilya ma\u011fazas\u0131, C gitar kursu, D ise \u00e7ama\u015f\u0131r hizmeti oldu\u011fu i\u00e7in uygun de\u011fil."}, {"t": "mc", "badge": "anuncio", "q": "33. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio conviene a una persona que tiene un problema con su dispositivo m\u00f3vil y quiere una soluci\u00f3n r\u00e1pida?", "a1": "ANUNCIO A:\n\u00bfTu tel\u00e9fono ya no funciona bien? En nuestro establecimiento revisamos pantallas, bater\u00edas y conectores. Adem\u00e1s, realizamos un diagn\u00f3stico antes de empezar el trabajo. Aunque algunas reparaciones tardan m\u00e1s, muchas se resuelven en el mismo d\u00eda.", "a2": "ANUNCIO B:\nEste mes abrimos inscripciones para clases de franc\u00e9s. Primero practicar\u00e1s expresiones cotidianas y luego trabajar\u00e1s la pronunciaci\u00f3n. Como las sesiones son presenciales, podr\u00e1s hablar con otros estudiantes. Sin embargo, el material no est\u00e1 incluido.", "a3": "ANUNCIO C:\nOfrecemos desayunos saludables cerca de la universidad. Por la ma\u00f1ana servimos caf\u00e9, fruta y bocadillos caseros. En cambio, cerramos a las cuatro de la tarde. Por eso, no abrimos en horario nocturno.", "a4": "ANUNCIO D:\nSi quieres aprender a nadar, ven a nuestro curso intensivo. A pesar de que dura solo un mes, los resultados suelen ser muy buenos. Adem\u00e1s, hay grupos para ni\u00f1os y adultos. Por lo tanto, cualquiera puede empezar.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 0, "exp": "Do\u011fru cevap A'd\u0131r \u00e7\u00fcnk\u00fc bu ilanda telefon tamiri yap\u0131ld\u0131\u011f\u0131 ve baz\u0131 onar\u0131mlar\u0131n ayn\u0131 g\u00fcn i\u00e7inde tamamland\u0131\u011f\u0131 belirtiliyor. Soruda da mobil cihaz\u0131nda sorun olan ve h\u0131zl\u0131 \u00e7\u00f6z\u00fcm arayan bir ki\u015fi var. Di\u011fer ilanlar dil kursu, kafe ve y\u00fczme kursuyla ilgilidir."}, {"t": "mc", "badge": "anuncio", "q": "34. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio ser\u00eda \u00fatil para una persona que prefiere comprar alimentos directamente a vendedores de la zona?", "a1": "ANUNCIO A:\n\u00bfTe cuesta concentrarte en casa? En nuestra biblioteca encontrar\u00e1s zonas silenciosas y acceso a prensa digital. Adem\u00e1s, puedes reservar una mesa por internet. Sin embargo, no se permite comer dentro de las salas de lectura.", "a2": "ANUNCIO B:\nCada s\u00e1bado organizamos un mercado de productores locales. All\u00ed encontrar\u00e1s verduras, miel, queso y pan elaborado de forma artesanal. Como participan agricultores de la regi\u00f3n, los productos cambian seg\u00fan la temporada. Por eso, siempre hay algo diferente.", "a3": "ANUNCIO C:\nSi buscas relajarte, prueba nuestras clases de yoga al aire libre. Mientras haces ejercicio, disfrutas tambi\u00e9n del parque y del buen clima. Aunque las sesiones son suaves, ayudan mucho a reducir el estr\u00e9s. Adem\u00e1s, no necesitas experiencia previa.", "a4": "ANUNCIO D:\nOfrecemos servicio de mudanzas para pisos y oficinas. Primero estudiamos la cantidad de objetos y luego organizamos el traslado. A pesar de que trabajamos con rapidez, tratamos cada mueble con mucho cuidado. As\u00ed que puedes confiar en nosotros.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 1, "exp": "Do\u011fru cevap B'dir \u00e7\u00fcnk\u00fc burada yerel \u00fcreticilerin kat\u0131ld\u0131\u011f\u0131 bir pazar anlat\u0131l\u0131yor. Soruda da b\u00f6lgedeki sat\u0131c\u0131lardan do\u011frudan yiyecek almak isteyen bir ki\u015fi var. A k\u00fct\u00fcphane, C yoga, D ta\u015f\u0131nma hizmeti oldu\u011fu i\u00e7in uygun de\u011fil."}, {"t": "mc", "badge": "anuncio", "q": "35. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio puede interesar a alguien que va a estudiar fuera de su pa\u00eds y necesita ayuda para buscar d\u00f3nde vivir?", "a1": "ANUNCIO A:\nEste fin de semana proyectamos tres pel\u00edculas europeas en versi\u00f3n original. Adem\u00e1s, despu\u00e9s de una de ellas habr\u00e1 un coloquio con un director invitado. Aunque las entradas son econ\u00f3micas, conviene comprarlas con antelaci\u00f3n. Por lo tanto, te recomendamos reservar hoy.", "a2": "ANUNCIO B:\n\u00bfQuieres mejorar tu escritura? En nuestro taller redactar\u00e1s textos breves y aprender\u00e1s a corregir errores frecuentes. Primero trabajamos la estructura y luego el estilo. Sin embargo, no es un curso de preparaci\u00f3n de ex\u00e1menes.", "a3": "ANUNCIO C:\nTe ayudamos a encontrar alojamiento para estudiantes en el extranjero. Buscamos opciones cercanas a centros de estudio y bien comunicadas. Como colaboramos con varias agencias, podemos ofrecer distintas posibilidades. Adem\u00e1s, te orientamos antes de tu salida.", "a4": "ANUNCIO D:\nEn nuestra florister\u00eda preparamos ramos para celebraciones y regalos. A pesar de que trabajamos con flores delicadas, garantizamos la mejor conservaci\u00f3n posible. En cambio, no abrimos los lunes. As\u00ed que haz tu pedido con tiempo.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 2, "exp": "Do\u011fru cevap C'dir \u00e7\u00fcnk\u00fc bu ilanda yurt d\u0131\u015f\u0131nda e\u011fitim g\u00f6recek \u00f6\u011frenciler i\u00e7in kalacak yer bulma deste\u011fi sunuluyor. Soruda da ba\u015fka bir \u00fclkede okuyacak ve konaklama arayan bir ki\u015fi anlat\u0131l\u0131yor. Di\u011fer ilanlar sinema, yaz\u0131 at\u00f6lyesi ve \u00e7i\u00e7ek\u00e7iyle ilgilidir."}, {"t": "mc", "badge": "anuncio", "q": "36. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio se adapta a una persona que quiere cambiar el color de su vivienda sin hacerlo por s\u00ed misma?", "a1": "ANUNCIO A:\nAprende a hacer pan en casa con nuestros cursos de fin de semana. Primero conocer\u00e1s las masas b\u00e1sicas y luego experimentar\u00e1s con ingredientes diferentes. Aunque el taller dura pocas horas, saldr\u00e1s con muchas ideas nuevas. Adem\u00e1s, podr\u00e1s llevarte tus propias preparaciones.", "a2": "ANUNCIO B:\nNuestra tienda vende accesorios para ciclistas urbanos. Encontrar\u00e1s cascos, luces, mochilas y candados de seguridad. Sin embargo, no realizamos reparaciones mec\u00e1nicas. Por eso, si tu bicicleta tiene una aver\u00eda, deber\u00e1s acudir a un taller.", "a3": "ANUNCIO C:\n\u00bfTe gusta actuar? En nuestras clases de teatro trabajar\u00e1s la voz, el movimiento y la improvisaci\u00f3n. Como los grupos son peque\u00f1os, el profesor puede seguir tu evoluci\u00f3n. Adem\u00e1s, a final de curso hacemos una representaci\u00f3n abierta al p\u00fablico.", "a4": "ANUNCIO D:\nSi tu casa necesita una mano de pintura, ll\u00e1manos. Renovamos paredes interiores y exteriores con materiales de calidad. Aunque trabajamos con rapidez, cuidamos cada detalle. Por lo tanto, evitamos molestias innecesarias.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 3, "exp": "Do\u011fru cevap D'dir \u00e7\u00fcnk\u00fc burada evin i\u00e7 ve d\u0131\u015f duvarlar\u0131n\u0131 boyayan bir hizmet sunuluyor. Soruda da evinin rengini yeniletmek isteyen ama bunu kendi yapmayacak biri var. A ekmek kursu, B bisiklet aksesuarlar\u0131, C tiyatro dersi oldu\u011fu i\u00e7in uygun de\u011fildir."}, {"t": "mc", "badge": "anuncio", "q": "37. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio ser\u00eda ideal para una familia que necesita atenci\u00f3n para sus hijos despu\u00e9s de las clases?", "a1": "ANUNCIO A:\nEste mes ofrecemos descuentos en libros infantiles y juveniles. Adem\u00e1s, organizamos una sesi\u00f3n de cuentacuentos cada mi\u00e9rcoles por la tarde. Aunque la librer\u00eda es peque\u00f1a, tenemos una selecci\u00f3n muy cuidada. Por eso, muchas familias vuelven cada semana.", "a2": "ANUNCIO B:\nVen a nuestro curso de fotograf\u00eda nocturna. Primero aprender\u00e1s a usar la luz y luego saldr\u00e1s por la ciudad para practicar. Sin embargo, es importante tener conocimientos b\u00e1sicos de c\u00e1mara. As\u00ed que no est\u00e1 pensado para principiantes absolutos.", "a3": "ANUNCIO C:\n\u00bfTienes ganas de cambiar de imagen? En nuestro sal\u00f3n realizamos cortes modernos y tratamientos capilares. Mientras esperas, puedes tomar una bebida sin coste adicional. Adem\u00e1s, trabajamos tambi\u00e9n con cita previa online.", "a4": "ANUNCIO D:\nCada tarde recogemos a los ni\u00f1os a la salida del colegio y les ayudamos con los deberes. Despu\u00e9s meriendan y participan en actividades creativas o deportivas. Como muchos padres terminan de trabajar tarde, ofrecemos flexibilidad horaria. Por eso, pueden recogerlos m\u00e1s tarde sin problema.", "o": ["Anuncio A", "Anuncio B", "Anuncio C", "Anuncio D"], "a": 3, "exp": "Do\u011fru cevap D'dir \u00e7\u00fcnk\u00fc burada \u00e7ocuklar\u0131n okul \u00e7\u0131k\u0131\u015f\u0131nda al\u0131nmas\u0131, \u00f6devlerine yard\u0131m edilmesi ve aileler i\u015ften ge\u00e7 \u00e7\u0131kt\u0131\u011f\u0131 i\u00e7in esnek saat sunulmas\u0131 anlat\u0131l\u0131yor. Soruda da derslerden sonra \u00e7ocuklarla ilgilenecek bir hizmet arayan aile var. Bu y\u00fczden do\u011fru se\u00e7enek D'dir."}, {"t": "mc", "badge": "anuncio", "q": "38. Soru\nA\u015fa\u011f\u0131daki ilanlar\u0131 okuyun.\n\n\u00bfQu\u00e9 anuncio puede interesar a alguien que quiere deshacerse de cosas que ya no utiliza y, al
