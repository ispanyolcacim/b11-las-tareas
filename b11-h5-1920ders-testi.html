<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbwbAQtk4nhM73aqYCKwg0z5s5qxPaCAWeLncNVHtSQ2jHbuo7SomG4PJpOBN8C0sXzTQw/exec';
var ODEV_ADI='H5 \u2013 19-20.Ders';
var Q=[
{q:"1. Quiero que t\u00fa ______ a mi fiesta el s\u00e1bado.",o:["vienes","venir","vayas","vengas"],a:3,exp:"C\u00fcmlede iki farkl\u0131 \u00f6zne var (Yo quiero / t\u00fa vengas). \u0130stek bildirdi\u011fi i\u00e7in Subjuntivo kulland\u0131k."},
{q:"2. Es necesario que nosotros ______ la verdad.",o:["sabemos","saber","sepamos","sep\u00e1is"],a:2,exp:"\"Es necesario que...\" ki\u015fisel olmayan bir gereklilik ifadesidir ve devam\u0131nda Subjuntivo gerektirir."},
{q:"3. Mi madre me pide que ______ mi habitaci\u00f3n.",o:["limpio","limpie","limpia","limpiado"],a:1,exp:"Birinden bir \u015fey yapmas\u0131n\u0131 istemek/rica etmek (pedir que) Subjuntivo tetikler."},
{q:"4. Te aconsejo que ______ m\u00e1s agua.",o:["bebas","bebes","beber","bebiste"],a:0,exp:"Tavsiye vermek (aconsejar que) Subjuntivo kullan\u0131m\u0131 gerektirir."},
{q:"5. Me alegra que t\u00fa ______ bien.",o:["est\u00e9s","est\u00e1s","estar","estuviste"],a:0,exp:"\"Me alegra que...\" bir duygu ifadesidir. Farkl\u0131 \u00f6zneler oldu\u011fu i\u00e7in Subjuntivo gelir."},
{q:"6. Es una l\u00e1stima que no ______ sol hoy.",o:["hace","haga","hacer","hizo"],a:1,exp:"\"Es una l\u00e1stima que...\" (Yaz\u0131k ki...) bir de\u011ferlendirme c\u00fcmlesidir, Subjuntivo ile devam eder."},
{q:"7. Siento mucho que ella no ______ venir.",o:["puede","poder","pueda","podr\u00e1"],a:2,exp:"\"Siento que...\" (\u00dczül\u00fcyorum ki...) duygu belirtti\u011fi i\u00e7in Subjuntivo kullan\u0131l\u0131r."},
{q:"8. Es importante que nosotros ______ el espa\u00f1ol.",o:["practicamos","practicar","practicaste","practiquemos"],a:3,exp:"\u00d6nem (Es importante que) belirten ifadeler Subjuntivo ister."},
{q:"9. No creo que \u00e9l ______ raz\u00f3n.",o:["tiene","tener","tendr\u00e1","tenga"],a:3,exp:"\"Creo que\" indicativo al\u0131rken, \"No creo que\" (\u0130nanm\u0131yorum ki) \u015f\u00fcphe yaratt\u0131\u011f\u0131 i\u00e7in Subjuntivo al\u0131r."},
{q:"10. Dudo que ellos ______ a tiempo.",o:["lleguen","llegan","llegar","llegaron"],a:0,exp:"\"Dudar que\" (\u015e\u00fcphe duymak) do\u011frudan Subjuntivo gerektiren bir fiildir."},
{q:"11. No pienso que esta ______ una buena idea.",o:["es","ser","sea","era"],a:2,exp:"\"No pienso que...\" olumsuz d\u00fc\u015f\u00fcnce belirtti\u011fi i\u00e7in belirsizlik yaratir ve Subjuntivo ister."},
{q:"12. Quiz\u00e1s ______ ma\u00f1ana, el cielo est\u00e1 muy gris.",o:["llueve","llueva","llover","llovi\u00f3"],a:1,exp:"\"Quiz\u00e1s\" (Belki) belirsizlik i\u00e7erdi\u011fi i\u00e7in Subjuntivo ile kullan\u0131l\u0131r."},
{q:"13. Te lo explico para que lo ______.",o:["entiendes","entiendas","entender","entendiste"],a:1,exp:"\"Para que\" (Halsin/diye) ba\u011flac\u0131 her zaman Subjuntivo ile kullan\u0131l\u0131r."},
{q:"14. No salgas a menos que ______ paraguas.",o:["llevas","llevar","lleves","llevaste"],a:2,exp:"\"A menos que\" (-medik\u00e7e) ba\u011flac\u0131 istisnasiz Subjuntivo gerektirir."},
{q:"15. Puedes ir con tal de que ______ temprano.",o:["vuelves","volver","volviste","vuelvas"],a:3,exp:"\"Con tal de que\" (-\u015fart\u0131yla) ko\u015ful bildirdi\u011fi i\u00e7in Subjuntivo ile kullan\u0131l\u0131r."},
{q:"16. Te presto el libro a condici\u00f3n de que me lo ______.",o:["devuelvas","devuelves","devolver","devolviste"],a:0,exp:"\"A condici\u00f3n de que\" (-\u015fart\u0131yla) kesinlikle Subjuntivo ister."},
{q:"17. Cuando ______ a casa, ll\u00e1mame.",o:["llegues","llegas","llegar","llegaste"],a:0,exp:"Henüz ger\u00e7ekle\u015fmemi\u015f, gelece\u011fe dair bir \"cuando\" (oldu\u011funda) kullan\u0131m\u0131 Subjuntivo gerektirir."},
{q:"18. En cuanto ______ las noticias, te avisar\u00e9.",o:["s\u00e9","saber","supe","sepa"],a:3,exp:"\"En cuanto\" (...olur olmaz) gelecekteki bir eylemi niteledi\u011fi i\u00e7in Subjuntivo al\u0131r."},
{q:"19. Esperar\u00e9 hasta que t\u00fa ______ de trabajar.",o:["terminas","terminar","termines","termin\u00f3"],a:2,exp:"\"Hasta que\" (...olana kadar) gelecekteki bir s\u0131n\u0131r\u0131 belirtti\u011finde Subjuntivo ister."},
{q:"20. Tan pronto como ______ el sol, saldremos.",o:["sale","salga","salir","sali\u00f3"],a:1,exp:"\"Tan pronto como\" (...olur olmaz) gelecekteki bir eylemi i\u015faret eder, bu y\u00fczden Subjuntivo."},
{q:"21. No ______ (t\u00fa) tan r\u00e1pido, es peligroso.",o:["hablas","hables","hablar","habla"],a:1,exp:"Olumsuz emirlerde (t\u00fa i\u00e7in) Subjuntivo \u00e7ekimi kullan\u0131l\u0131r."},
{q:"22. No ______ (vosotros) tarde a la clase.",o:["llegu\u00e9is","llega\u00efs","llegar","lleguen"],a:0,exp:"\"Vosotros\" i\u00e7in olumsuz emir Subjuntivo (ar -> \u00e9is) formundad\u0131r."},
{q:"23. Por favor, no ______ (usted) la puerta.",o:["abre","abrir","abras","abra"],a:3,exp:"\"Usted\" i\u00e7in hem olumlu hem olumsuz emirlerde Subjuntivo k\u00f6k\u00fc kullan\u0131l\u0131r."},
{q:"24. No ______ (nosotros) sin desayunar.",o:["salimos","salir","salgamos","salgan"],a:2,exp:"\"Hadi \u00e7\u0131kmayal\u0131m\" \u015feklindeki olumsuz teklif/emir yap\u0131s\u0131 Subjuntivo ister."},
{q:"25. Quiero ______ a Espa\u00f1a este verano.",o:["que voy","vaya","ir","que vaya"],a:2,exp:"\u00d6zneler ayn\u0131 (Ben istiyorum / Ben gidece\u011fim). Bu durumda \"que\" kullan\u0131lmaz, mastar (infinitivo) gelir."},
{q:"26. Ella espera que nosotros ______ \u00e9xito.",o:["tenemos","tener","tuvimos","tengamos"],a:3,exp:"\u00d6zneler farkl\u0131 (O umuyor / Biz ba\u015far\u0131l\u0131 olal\u0131m). Subjuntivo \u015fart."},
{q:"27. Me alegro de ______ aqu\u00ed con vosotros.",o:["estar","est\u00e9","estoy","que est\u00e9"],a:0,exp:"Duygu ifadesinde \u00f6zneler ayn\u0131ysa \"que\" kalkar ve mastar gelir."},
{q:"28. Es importante ______ todos los d\u00edas.",o:["estudies","estudiar","estudias","estudie"],a:1,exp:"Belirli bir ki\u015fiye hitap etmeyen genel gereklilik c\u00fcmlelerinde \"que\" yoksa mastar kullan\u0131l\u0131r."},
{q:"29. Tal vez ______ raz\u00f3n, pero no estoy seguro.",o:["tienes","tengas","tener","tuviste"],a:1,exp:"Belirsizlik/\u015f\u00fcphe a\u011f\u0131r bast\u0131\u011f\u0131 i\u00e7in \"Tal vez\" Subjuntivo ile devam eder."},
{q:"30. Quiz\u00e1s ______ hoy m\u00e1s tarde.",o:["viene","venir","venga","vino"],a:2,exp:"\"Quiz\u00e1s\" belirsizlik bildirdi\u011fi i\u00e7in Subjuntivo tetikler."},
{q:"31. Posiblemente ______ fr\u00edo ma\u00f1ana.",o:["hace","hacer","hizo","haga"],a:3,exp:"\"Posiblemente\" (Muhtemelen) ihtimal belirtti\u011fi i\u00e7in Subjuntivo kullan\u0131l\u0131r."},
{q:"32. Tal vez ______ raz\u00f3n. (Daha kesin bir ifade)",o:["tienes","tengas","tener","tuviste"],a:0,exp:"Notlardaki \"Dikkat!\" k\u0131sm\u0131na g\u00f6re; e\u011fer kesinlik/emin olma durumu fazlaysa \"Tal vez\"den sonra Indicativo gelebilir."},
{q:"33. Lo hago sin que nadie me ______.",o:["ayude","ayuda","ayudar","ayud\u00f3"],a:0,exp:"\"Sin que\" (-maks\u0131z\u0131n / kimse yard\u0131m etmeden) her zaman Subjuntivo ister."},
{q:"34. Aunque ______ fr\u00edo, ir\u00e9 a la playa.",o:["hace","hacer","haga","hac\u00eda"],a:2,exp:"Henüz ger\u00e7ekle\u015fmemi\u015f veya belirsiz bir durum (\"So\u011fuk olsa bile\") i\u00e7in \"Aunque\" Subjuntivo al\u0131r."},
{q:"35. Habla de manera que todos te ______.",o:["entienden","entiendan","entender","entendieron"],a:1,exp:"Ama\u00e7 bildiren \"De manera que\" (Anlasınlar diye) yap\u0131s\u0131 Subjuntivo ister."},
{q:"36. Sal antes de que ______ oscuro.",o:["se pone","ponerse","se puso","se ponga"],a:3,exp:"\"Antes de que\" (-meden \u00f6nce) ba\u011flac\u0131 her zaman Subjuntivo ile kullan\u0131l\u0131r."},
{q:"37. Dudo que \u00e9l ______ la respuesta.",o:["sabe","saber","sepa","sabr\u00e1"],a:2,exp:"\"Dudar que\" \u015f\u00fcphe fiilidir. Saber -> Sepa (Irregular)."},
{q:"38. Es mejor que nosotros ______ ahora.",o:["salimos","salir","saliste","salgamos"],a:3,exp:"\"Es mejor que\" de\u011ferlendirme yap\u0131s\u0131d\u0131r. Salir -> Salgamos."},
{q:"39. Busco un libro que ______ interesante.",o:["sea","es","ser","era"],a:0,exp:"Belirsiz bir \u015feyi ararken (Varl\u0131\u011f\u0131 kesin de\u011fil) Subjuntivo kullan\u0131l\u0131r."},
{q:"40. No salgas hasta que ______ de llover.",o:["para","pare","parar","par\u00f3"],a:1,exp:"Gelece\u011fe y\u00f6nelik s\u0131n\u0131r (Durana kadar) Subjuntivo gerektirir."},

var state={cur:0,answered:[],scores:[],okCount:0,errCount:0};

function startQuiz(){
  var name=document.getElementById('introName').value;
  if(!name){alert('L\u00fctfen ad\u0131n\u0131z\u0131 se\u00e7in.');return;}
  document.getElementById('resName').value=name;
  document.getElementById('resName2').value=name;
  document.getElementById('introScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  renderQ();
}

function syncResName(){
  var v=document.getElementById('resName2').value;
  document.getElementById('resName').value=v;
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderQ(){
  var i=state.cur;var q=Q[i];var html='';
  html+='<span class="q-type-badge badge-mc">\u00c7OKTAN SE\u00c7MEL\u0130</span>';
  html+='<div class="q-text">'+esc(q.q)+'</div>';
  html+='<div class="opts">';
  var L=['A','B','C','D'];
  for(var j=0;j<q.o.length;j++){
    var cls='opt-btn';var dis='';var ans=state.answered[i];
    if(ans!==undefined){dis='disabled';if(j===q.a)cls+=' correct';else if(j===ans&&ans!==q.a)cls+=' wrong';}
    html+='<button class="'+cls+'" '+dis+' onclick="checkAns('+j+')"><strong>'+L[j]+')</strong> '+esc(q.o[j])+'</button>';
  }
  html+='</div>';
  html+='<div class="exp-box'+(state.answered[i]!==undefined?' show':'')+'">'+esc(q.exp)+'</div>';
  document.getElementById('qCard').innerHTML=html;
  var done=state.answered[i]!==undefined;
  document.getElementById('btnBack').disabled=(i===0);
  document.getElementById('btnNext').disabled=(!done||i===Q.length-1);
  document.getElementById('btnSkip').disabled=(i>=Q.length-1);
  document.getElementById('qMeta').textContent='Soru '+(i+1)+' / '+Q.length;
  document.getElementById('progFill').style.width=((i+1)/Q.length*100)+'%';
  document.getElementById('cntOk').textContent='\u2713 '+state.okCount;
  document.getElementById('cntErr').textContent='\u2717 '+state.errCount;
}

function checkAns(j){
  var i=state.cur;
  if(state.answered[i]!==undefined)return;
  var q=Q[i];
  state.answered[i]=j;
  if(j===q.a){state.okCount++;state.scores[i]=1;}
  else{state.errCount++;state.scores[i]=0;}
  renderQ();
}

function goNext(){if(state.cur<Q.length-1){state.cur++;renderQ();}}
function goBack(){if(state.cur>0){state.cur--;renderQ();}}
function skipQ(){if(state.cur<Q.length-1){state.cur++;renderQ();}}

function confirmFinish(){
  var answered=0;
  for(var i=0;i<Q.length;i++){if(state.answered[i]!==undefined)answered++;}
  var unanswered=Q.length-answered;
  var msg='Toplam '+Q.length+' sorudan '+answered+' tanesini cevaplad\u0131n\u0131z.';
  if(unanswered>0)msg+='\n\n'+unanswered+' soru cevaps\u0131z kalacak (0 puan).';
  msg+='\n\nTesti bitirmek istedi\u011finize emin misiniz?';
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmOverlay').style.display='flex';
}

function closeConfirm(){document.getElementById('confirmOverlay').style.display='none';}
function doFinish(){closeConfirm();showResult();}

function showResult(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  var total=0;
  for(var i=0;i<Q.length;i++){total+=(state.scores[i]||0);}
  var pct=Math.round(total*100/Q.length);
  document.getElementById('resScore').textContent=pct;
  document.getElementById('resOk').textContent='\u2713 '+state.okCount+' do\u011fru';
  document.getElementById('resErr').textContent='\u2717 '+state.errCount+' yanl\u0131\u015f';
  document.getElementById('resNote').textContent='100 sorudan '+state.okCount+' tanesi do\u011fru';
  document.getElementById('submitWarning').style.display='block';
  document.getElementById('btnSubmit').style.display='block';
  var rev=document.getElementById('reviewList');
  var L=['A','B','C','D'];
  var html='';
  for(var i=0;i<Q.length;i++){
    var ans=state.answered[i];
    if(ans===undefined||ans===Q[i].a)continue;
    var q=Q[i];
    html+='<div class="rev-item"><div class="rev-q">'+esc(q.q.split('\n')[0])+'</div>';
    html+='<div class="rev-chosen">Verdi\u011finiz cevap: '+esc(q.o[ans])+'</div>';
    html+='<div class="rev-correct">Do\u011fru cevap: '+esc(q.o[q.a])+'</div>';
    html+='<div class="rev-exp">'+esc(q.exp)+'</div></div>';
  }
  rev.innerHTML=html||'<div style="padding:.5rem;color:#666">Yanl\u0131\u015f soru bulunamad\u0131.</div>';
}

function toggleReview(){
  var rv=document.getElementById('reviewList');
  rv.style.display=(rv.style.display==='flex'?'none':'flex');
}

var submitted=false;
function submitResult(){
  if(submitted)return;
  var name=document.getElementById('resName').value;
  if(!name){alert('L\u00fctfen isminizi se\u00e7in.');return;}
  var total=0;
  for(var i=0;i<Q.length;i++){total+=(state.scores[i]||0);}
  var pct=Math.round(total*100/Q.length);
  var payload=JSON.stringify({ogrenci:name,odev:ODEV_ADI,grup:'B1.1',puan:pct,dogru:state.okCount,yanlis:state.errCount,tarih:new Date().toLocaleDateString('tr-TR')});
  document.getElementById('submitMsg').style.display='block';
  document.getElementById('submitMsg').textContent='G\u00f6nderiliyor...';
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:payload})
  .then(function(){
    submitted=true;
    document.getElementById('submitWarning').style.display='none';
    document.getElementById('btnSubmit').style.display='none';
    document.getElementById('submitMsg').textContent=name+' \u00f6\u011frencisinin \u201c'+ODEV_ADI+'\u201d \u00f6devi teslim edildi. Puan: '+pct+'/100. Te\u015fekk\u00fcrler!';
  })
  .catch(function(){
    submitted=true;
    document.getElementById('submitWarning').style.display='none';
    document.getElementById('btnSubmit').style.display='none';
    document.getElementById('submitMsg').textContent=name+' \u00f6\u011frencisinin \u201c'+ODEV_ADI+'\u201d \u00f6devi teslim edildi. Puan: '+pct+'/100.';
  });
}
</script>
