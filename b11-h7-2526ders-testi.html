<script>
var SURL='https://script.google.com/macros/s/AKfycbwbAQtk4nhM73aqYCKwg0z5s5qxPaCAWeLncNVHtSQ2jHbuo7SomG4PJpOBN8C0sXzTQw/exec';
var ODEV='H7 \u2013 25-26.Ders';

// q: Türkçe soru
// pre: Cümlenin boşluktan önceki sabit kısmı (varsa)
// post: Cümlenin boşluktan sonraki sabit kısmı
// a: doğru cevap (boşluğa yazılacak)
// full: tam doğru cümle
// exp: açıklama
var Q=[
{q:'Soru 1\n"Daha d\u00fczenli \u00e7al\u0131\u015fmak istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'de forma m\u00e1s organizada.',a:'Quiero estudiar',full:'Quiero estudiar de forma m\u00e1s organizada.',exp:'Bu c\u00fcmlede iste\u011fi dile getiren ki\u015fi ile eylemi yapacak ki\u015fi ayn\u0131d\u0131r. Yani "ben istiyorum" ve "ben \u00e7al\u0131\u015faca\u011f\u0131m." Bu y\u00fczden quiero + mastar yap\u0131s\u0131 kullan\u0131l\u0131r.\nEstudiar fiili mastar h\u00e2lindedir.\nBurada quiero que kullan\u0131lmaz \u00e7\u00fcnk\u00fc ikinci bir \u00f6zne yoktur.'},
{q:'Soru 2\n"\u00d6\u011fretmenimin bana daha fazla \u00f6rnek vermesini istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi profesora me d\u00e9 m\u00e1s ejemplos.',a:'Quiero que',full:'Quiero que mi profesora me d\u00e9 m\u00e1s ejemplos.',exp:'Bu c\u00fcmlede iste\u011fi dile getiren ki\u015fi "ben"dir, ama eylemi yapacak ki\u015fi "\u00f6\u011fretmenim"dir. Yani iki farkl\u0131 \u00f6zne vard\u0131r. Bu y\u00fczden quiero que + subjuntivo kullan\u0131l\u0131r.\nDar fiili subjuntivo\'da d\u00e9 olur.\nC\u00fcmlede "bana" anlam\u0131 i\u00e7in me kullan\u0131lm\u0131\u015ft\u0131r.'},
{q:'Soru 3\n"Bug\u00fcn evde dinlenmek istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'en casa hoy.',a:'Quiero descansar',full:'Quiero descansar en casa hoy.',exp:'Bu c\u00fcmlede isteyen ki\u015fi ile dinlenecek ki\u015fi ayn\u0131d\u0131r. Yani ki\u015fi kendi iste\u011finden bahseder. Bu y\u00fczden quiero + mastar kullan\u0131l\u0131r.\nDescansar fiili mastar h\u00e2linde kal\u0131r.\nQuiero que kullan\u0131lmaz \u00e7\u00fcnk\u00fc ba\u015fka bir ki\u015fiden bir \u015fey yap\u0131lmas\u0131 istenmiyor.'},
{q:'Soru 4\n"Karde\u015fimin bug\u00fcn evde dinlenmesini istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi hermano descanse en casa hoy.',a:'Quiero que',full:'Quiero que mi hermano descanse en casa hoy.',exp:'Bu c\u00fcmlede "ben istiyorum" ama "karde\u015fim dinlensin" anlam\u0131 vard\u0131r. Yani isteyen ki\u015fi ve eylemi yapacak ki\u015fi farkl\u0131d\u0131r. Bu y\u00fczden quiero que + subjuntivo gerekir.\nDescansar fiilinin subjuntivo \u00e7ekimi descanse olur.\nE\u011fer quiero descansar deseydik, "ben dinlenmek istiyorum" anlam\u0131na gelirdi.'},
{q:'Soru 5\n"\u0130spanyolca konu\u015fmam\u0131 geli\u015ftirmek istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi expresi\u00f3n oral en espa\u00f1ol.',a:'Quiero mejorar',full:'Quiero mejorar mi expresi\u00f3n oral en espa\u00f1ol.',exp:'Bu c\u00fcmlede ki\u015fi kendi konu\u015fma becerisini geli\u015ftirmek istiyor. \u0130steyen ki\u015fi ile geli\u015ftirecek ki\u015fi ayn\u0131d\u0131r. Bu y\u00fczden quiero + mastar kullan\u0131l\u0131r.\nMejorar fiili mastar h\u00e2lindedir.\nBurada quiero que kullan\u0131lmaz \u00e7\u00fcnk\u00fc ikinci bir \u00f6zne yoktur.'},
{q:'Soru 6\n"Arkada\u015f\u0131m\u0131n benimle \u0130spanyolca konu\u015fmas\u0131n\u0131 istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi amigo hable espa\u00f1ol conmigo.',a:'Quiero que',full:'Quiero que mi amigo hable espa\u00f1ol conmigo.',exp:'Burada isteyen ki\u015fi "ben"dir, konu\u015facak ki\u015fi ise "arkada\u015f\u0131m"d\u0131r. Yani iki farkl\u0131 \u00f6zne vard\u0131r. Bu y\u00fczden quiero que + subjuntivo kullan\u0131l\u0131r.\nHablar fiili subjuntivo\'da hable olur.\nConmigo "benimle" anlam\u0131na gelir.'},
{q:'Soru 7\n"Bu hafta daha az telefon kullanmak istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'menos el tel\u00e9fono esta semana.',a:'Quiero usar',full:'Quiero usar menos el tel\u00e9fono esta semana.',exp:'Bu c\u00fcmlede ki\u015fi kendi davran\u0131\u015f\u0131ndan bahsediyor. Yani "ben daha az telefon kullanmak istiyorum" anlam\u0131 vard\u0131r. Bu y\u00fczden quiero + mastar kullan\u0131l\u0131r.\nUsar fiili mastar h\u00e2linde kal\u0131r.\nMenos "daha az" anlam\u0131na gelir.'},
{q:'Soru 8\n"Ailemin bu hafta daha az telefon kullanmas\u0131n\u0131 istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi familia use menos el tel\u00e9fono esta semana.',a:'Quiero que',full:'Quiero que mi familia use menos el tel\u00e9fono esta semana.',exp:'Bu c\u00fcmlede isteyen ki\u015fi "ben"dir, telefonu daha az kullanmas\u0131 istenen ki\u015fi ise "ailem"dir. Bu y\u00fczden quiero que + subjuntivo kullan\u0131l\u0131r.\nUsar fiilinin subjuntivo \u00e7ekimi use olur.\nMi familia tekil kabul edilir, bu nedenle fiil de tekil \u00e7ekimlenir.'},
{q:'Soru 9\n"Hafta sonu erken kalkmak istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'temprano el fin de semana.',a:'Quiero levantarme',full:'Quiero levantarme temprano el fin de semana.',exp:'Burada ki\u015fi kendisi erken kalkmak istiyor. Bu y\u00fczden quiero + mastar kullan\u0131l\u0131r.\nFiil d\u00f6n\u00fc\u015fl\u00fc oldu\u011fu i\u00e7in levantarse fiili kullan\u0131l\u0131r.\nQuiero levantarme yap\u0131s\u0131nda d\u00f6n\u00fc\u015fl\u00fc zamir me, mastar\u0131n sonuna eklenir.'},
{q:'Soru 10\n"K\u0131z karde\u015fimin hafta sonu erken kalkmas\u0131n\u0131 istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi hermana se levante temprano el fin de semana.',a:'Quiero que',full:'Quiero que mi hermana se levante temprano el fin de semana.',exp:'Bu c\u00fcmlede isteyen ki\u015fi "ben", erken kalkacak ki\u015fi ise "k\u0131z karde\u015fim"dir. Bu y\u00fczden quiero que + subjuntivo kullan\u0131l\u0131r.\nLevantarse d\u00f6n\u00fc\u015fl\u00fc bir fiildir. Subjuntivo \u00e7ekimi se levante olur.\nBurada se zamiri "mi hermana" i\u00e7in kullan\u0131l\u0131r.'},
{q:'Soru 11\n"Daha sa\u011fl\u0131kl\u0131 yemek yemek istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'de forma m\u00e1s saludable.',a:'Quiero comer',full:'Quiero comer de forma m\u00e1s saludable.',exp:'Bu c\u00fcmlede ki\u015fi kendi iste\u011fini anlat\u0131r. Yani isteyen ki\u015fi ve yemek yiyecek ki\u015fi ayn\u0131d\u0131r. Bu y\u00fczden quiero + mastar yap\u0131s\u0131 kullan\u0131l\u0131r.\nComer fiili mastar h\u00e2lindedir.\nDe forma m\u00e1s saludable "daha sa\u011fl\u0131kl\u0131 bir \u015fekilde" anlam\u0131na gelir.'},
{q:'Soru 12\n"Annemin daha sa\u011fl\u0131kl\u0131 yemekler pi\u015firmesini istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi madre cocine comidas m\u00e1s saludables.',a:'Quiero que',full:'Quiero que mi madre cocine comidas m\u00e1s saludables.',exp:'Burada isteyen ki\u015fi "ben"dir, yemek pi\u015firecek ki\u015fi ise "annem"dir. \u0130ki farkl\u0131 \u00f6zne oldu\u011fu i\u00e7in quiero que + subjuntivo gerekir.\nCocinar fiili subjuntivo\'da cocine olur.\nComidas m\u00e1s saludables "daha sa\u011fl\u0131kl\u0131 yemekler" anlam\u0131na gelir.'},
{q:'Soru 13\n"Her g\u00fcn biraz y\u00fcr\u00fcmek istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'un poco todos los d\u00edas.',a:'Quiero caminar',full:'Quiero caminar un poco todos los d\u00edas.',exp:'Burada isteyen ki\u015fi ile y\u00fcr\u00fcyen ki\u015fi ayn\u0131d\u0131r. Bu y\u00fczden quiero + mastar kullan\u0131l\u0131r.\nCaminar fiili mastar h\u00e2linde kal\u0131r.\nUn poco "biraz", todos los d\u00edas ise "her g\u00fcn" anlam\u0131na gelir.'},

{q:'Soru 41\n"Bu konuda karar vermek istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'sobre este tema.',a:'Quiero decidir',full:'Quiero decidir sobre este tema.',exp:'Bu c\u00fcmlede karar vermek isteyen ki\u015fi "ben"dir. \u0130steyen ki\u015fi ile karar verecek ki\u015fi ayn\u0131d\u0131r. Bu y\u00fczden quiero + mastar kullan\u0131l\u0131r.\nDecidir fiili mastar h\u00e2lindedir.\nSobre este tema "bu konuda" anlam\u0131na gelir.'},
{q:'Soru 42\n"Annemin bu konuda karar vermesini istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi madre decida sobre este tema.',a:'Quiero que',full:'Quiero que mi madre decida sobre este tema.',exp:'Bu c\u00fcmlede isteyen ki\u015fi "ben", karar vermesi istenen ki\u015fi ise "annem"dir. \u0130ki farkl\u0131 \u00f6zne oldu\u011fu i\u00e7in quiero que + subjuntivo kullan\u0131l\u0131r.\nDecidir fiilinin subjuntivo \u00e7ekimi decida olur.\nBurada quiero decidir denirse "ben karar vermek istiyorum" anlam\u0131na gelir.'},
{q:'Soru 43\n"Bu yaz\u0131y\u0131 T\u00fcrk\u00e7eye \u00e7evirmek istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'este texto al turco.',a:'Quiero traducir',full:'Quiero traducir este texto al turco.',exp:'Bu c\u00fcmlede ki\u015fi kendi yapmak istedi\u011fi eylemi anlat\u0131r. \u00c7eviri yapacak ki\u015fi "ben"dir. Bu y\u00fczden quiero + mastar kullan\u0131l\u0131r.\nTraducir fiili mastar h\u00e2lindedir.\nAl turco "T\u00fcrk\u00e7eye" anlam\u0131na gelir.'},
{q:'Soru 44\n"Arkada\u015f\u0131m\u0131n bu yaz\u0131y\u0131 T\u00fcrk\u00e7eye \u00e7evirmesini istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi amigo traduzca este texto al turco.',a:'Quiero que',full:'Quiero que mi amigo traduzca este texto al turco.',exp:'Burada isteyen ki\u015fi "ben", metni \u00e7evirmesi istenen ki\u015fi ise "arkada\u015f\u0131m"d\u0131r. Bu y\u00fczden quiero que + subjuntivo gerekir.\nTraducir fiili subjuntivo\'da d\u00fczensizdir ve traduzca olur.\nEste texto "bu metin", al turco ise "T\u00fcrk\u00e7eye" anlam\u0131na gelir.'},
{q:'Soru 45\n"Daha sakin konu\u015fmak istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'con m\u00e1s calma.',a:'Quiero hablar',full:'Quiero hablar con m\u00e1s calma.',exp:'Bu c\u00fcmlede ki\u015fi kendi konu\u015fma bi\u00e7imiyle ilgili bir istek anlat\u0131r. Konu\u015facak ki\u015fi yine "ben"dir. Bu nedenle quiero + mastar kullan\u0131l\u0131r.\nHablar fiili mastar h\u00e2lindedir.\nCon m\u00e1s calma "daha sakin bir \u015fekilde" anlam\u0131na gelir.'},
{q:'Soru 46\n"Babam\u0131n daha sakin konu\u015fmas\u0131n\u0131 istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi padre hable con m\u00e1s calma.',a:'Quiero que',full:'Quiero que mi padre hable con m\u00e1s calma.',exp:'Bu c\u00fcmlede isteyen ki\u015fi "ben", daha sakin konu\u015fmas\u0131 istenen ki\u015fi ise "babam"d\u0131r. Bu y\u00fczden quiero que + subjuntivo kullan\u0131l\u0131r.\nHablar fiilinin subjuntivo \u00e7ekimi hable olur.\nE\u011fer quiero hablar deseydik, "ben konu\u015fmak istiyorum" anlam\u0131na gelirdi.'},
{q:'Soru 47\n"Bu \u015fehirde ya\u015famak istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'en esta ciudad.',a:'Quiero vivir',full:'Quiero vivir en esta ciudad.',exp:'Bu c\u00fcmlede isteyen ki\u015fi ve ya\u015fayacak ki\u015fi ayn\u0131d\u0131r. Yani "ben bu \u015fehirde ya\u015famak istiyorum" anlam\u0131 vard\u0131r. Bu y\u00fczden quiero + mastar yap\u0131s\u0131 kullan\u0131l\u0131r.\nVivir fiili mastar h\u00e2lindedir.\nEn esta ciudad "bu \u015fehirde" anlam\u0131na gelir.'},
{q:'Soru 48\n"K\u0131z\u0131m\u0131n bu \u015fehirde ya\u015famas\u0131n\u0131 istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'mi hija viva en esta ciudad.',a:'Quiero que',full:'Quiero que mi hija viva en esta ciudad.',exp:'Bu c\u00fcmlede isteyen ki\u015fi "ben", bu \u015fehirde ya\u015famas\u0131 istenen ki\u015fi ise "k\u0131z\u0131m"d\u0131r. Bu nedenle quiero que + subjuntivo kullan\u0131l\u0131r.\nVivir fiilinin subjuntivo \u00e7ekimi viva olur.\nBu c\u00fcmlede quiero vivir denirse "ben ya\u015famak istiyorum" anlam\u0131na gelir.'},
{q:'Soru 49\n"Bu f\u0131rsat\u0131 de\u011ferlendirmek istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'esta oportunidad.',a:'Quiero aprovechar',full:'Quiero aprovechar esta oportunidad.',exp:'Bu c\u00fcmlede ki\u015fi kendi iste\u011fini anlat\u0131r. F\u0131rsat\u0131 de\u011ferlendirmek isteyen ki\u015fi "ben"dir. Bu y\u00fczden quiero + mastar kullan\u0131l\u0131r.\nAprovechar fiili mastar h\u00e2lindedir.\nEsta oportunidad "bu f\u0131rsat" anlam\u0131na gelir.'},
{q:'Soru 50\n"Senin bu f\u0131rsat\u0131 de\u011ferlendirmeni istiyorum." c\u00fcmlesini \u0130spanyolcaya \u00e7evirin.',pre:'',post:'aproveches esta oportunidad.',a:'Quiero que',full:'Quiero que aproveches esta oportunidad.',exp:'Bu c\u00fcmlede isteyen ki\u015fi "ben", f\u0131rsat\u0131 de\u011ferlendirmesi istenen ki\u015fi ise "sen"dir. Yani iki farkl\u0131 \u00f6zne vard\u0131r. Bu y\u00fczden quiero que + subjuntivo kullan\u0131l\u0131r.\nAprovechar fiilinin t\u00fa i\u00e7in subjuntivo \u00e7ekimi aproveches olur.\nBurada tam yap\u0131 quiero que aproveches \u015feklindedir.'}
];

var checked=[],scores=[],okCount=0,errCount=0,cur=0;

function nrm(s){
  if(!s)return'';
  s=s.toLowerCase().replace(/\u0131/g,'i');
  s=s.replace(/[\u00a1\u00bf!?,.:;'"()\-]/g,'');
  s=s.replace(/[àáâãä]/g,'a').replace(/[èéêë]/g,'e').replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o').replace(/[ùúûü]/g,'u').replace(/ñ/g,'n').replace(/ç/g,'c');
  return s.replace(/\s+/g,' ').trim();
}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function startQuiz(){
  var n=document.getElementById('selName').value;
  if(!n){alert('Lütfen adınızı seçin.');return;}
  document.getElementById('rName').value=n;
  document.getElementById('rName2').value=n;
  document.getElementById('sIntro').style.display='none';
  document.getElementById('sQuiz').style.display='block';
  render();
}

function render(){
  var i=cur; var q=Q[i];
  var done=checked[i]===true;
  var h='<div class="badge">&#9997; BOSLUK DOLDURMA &ndash; '+
        (nrm(q.a).indexOf('quiero que')>=0 || nrm(q.a)==='quiero que' ? 'Quiero que + Subjuntivo' : 'Quiero + Mastar')+
        '</div>';
  h+='<div class="qtext">'+esc(q.q)+'</div>';
  h+='<div class="fill-area">';
  h+='<div class="fill-label">C\u00fcmleyi tamamlay\u0131n:</div>';
  h+='<div class="fill-row">';

  var correct=done&&scores[i]===1;
  var wrong=done&&scores[i]===0;
  var cls='fill-input'+(correct?' ok':wrong?' err':'');

  h+='<input type="text" id="fi" class="'+cls+'" placeholder="Ba\u015flang\u0131c\u0131 yaz\u0131n..." '+(done?'disabled value="'+esc(checked[i]==='skip'?'(cevaps\u0131z)':String(document.querySelector&&document.getElementById?'':q.a))+'\"':'')+' />';
  if(!done){
    h+='<button class="btn-check" id="bchk" onclick="doCheck()">Kontrol Et</button>';
  }
  h+='</div>';
  h+='<div style="font-size:.8rem;color:#9b7de0;margin-top:.35rem">...&nbsp;<span style="color:#555">'+esc(q.post)+'</span></div>';
  h+='</div>';

  if(done){
    var col=scores[i]===1?'#2e9e6b':'#d94040';
    h+='<div style="font-size:.88rem;background:#f0eef8;border-radius:8px;padding:.6rem .85rem;margin-bottom:.6rem;line-height:1.7">';
    h+='<span style="color:#6c4eb8;font-weight:700">Tam c\u00fcmle: </span>';
    h+='<span style="color:'+col+';font-weight:700">'+esc(q.a)+'</span> '+esc(q.post);
    h+='</div>';
    h+='<div class="exp-box show"><span class="exp-ans">&#10003; Do\u011fru cevap: '+esc(q.a)+' '+esc(q.post)+'</span>'+esc(q.exp)+'</div>';
  }
  document.getElementById('qCard').innerHTML=h;

  // Restore input value if done
  if(done){
    var fi=document.getElementById('fi');
    if(fi&&_userInputs[i]!==undefined)fi.value=_userInputs[i];
  } else {
    // Focus and enter key
    setTimeout(function(){
      var fi=document.getElementById('fi');
      if(fi){fi.focus();fi.onkeydown=function(e){if(e.key==='Enter')doCheck();};}
    },50);
  }

  document.getElementById('btnBk').disabled=(i===0);
  document.getElementById('btnNx').disabled=(!done||i===Q.length-1);
  document.getElementById('qMeta').textContent='Soru '+(i+1)+' / '+Q.length;
  document.getElementById('pFill').style.width=((i+1)/Q.length*100)+'%';
  document.getElementById('cOk').textContent='\u2713 '+okCount;
  document.getElementById('cErr').textContent='\u2717 '+errCount;
  window.scrollTo(0,0);
}

var _userInputs=[];

function doCheck(){
  var i=cur;
  if(checked[i])return;
  var fi=document.getElementById('fi');
  if(!fi||fi.value.trim()===''){alert('Lütfen bir cevap yazın.');return;}
  var given=fi.value.trim();
  _userInputs[i]=given;
  var correct=nrm(given)===nrm(Q[i].a);
  // Also accept if they wrote the full sentence starting with the answer
  if(!correct){
    var fullGiven=nrm(given+' '+Q[i].post);
    var fullCorrect=nrm(Q[i].full);
    if(fullGiven===fullCorrect)correct=true;
  }
  checked[i]=true;
  if(correct){okCount++;scores[i]=1;}else{errCount++;scores[i]=0;}
  render();
}

function goNext(){if(cur<Q.length-1){cur++;render();}}
function goBack(){if(cur>0){cur--;render();}}

function confirmFinish(){
  var a=checked.filter(function(x){return x;}).length;
  var u=Q.length-a;
  var msg=Q.length+' sorudan '+a+' tanesini cevapladınız.';
  if(u>0)msg+='\n\n'+u+' soru cevapsız kalacak (0 puan).';
  msg+='\n\nTesti bitirmek istediğinize emin misiniz?';
  document.getElementById('cmsg').textContent=msg;
  document.getElementById('overlay').classList.add('show');
}
function closeOv(){document.getElementById('overlay').classList.remove('show');}
function doFinish(){closeOv();showResult();}

function showResult(){
  document.getElementById('sQuiz').style.display='none';
  document.getElementById('sResult').style.display='block';
  var total=0;for(var i=0;i<Q.length;i++)total+=(scores[i]||0);
  document.getElementById('rScore').textContent=total;
  document.getElementById('rOk').textContent='\u2713 '+okCount+' do\u011fru';
  document.getElementById('rErr').textContent='\u2717 '+errCount+' yanl\u0131\u015f';
  document.getElementById('rNote').textContent='50 sorudan '+okCount+' tanesi do\u011fru';
  var html='';
  for(var i=0;i<Q.length;i++){
    if(scores[i]===1)continue;
    var q=Q[i];
    var given=_userInputs[i]||'(Cevaps\u0131z)';
    html+='<div class="rvi"><div class="rvq">'+esc(q.q.split('\n')[0]+' '+q.q.split('\n').slice(1).join(' '))+'</div>';
    html+='<div class="rvg">Verdi\u011finiz: '+esc(given)+'</div>';
    html+='<div class="rvc">Do\u011fru: '+esc(q.full)+'</div>';
    html+='<div class="rve">'+esc(q.exp)+'</div></div>';
  }
  document.getElementById('revList').innerHTML=html||'<div style="padding:.5rem;color:#666">Yanl\u0131\u015f soru bulunamad\u0131.</div>';
  window.scrollTo(0,0);
}
function toggleRev(){var r=document.getElementById('revList');r.style.display=r.style.display==='flex'?'none':'flex';}

var submitted=false;
function submitResult(){
  if(submitted)return;
  var name=document.getElementById('rName').value;
  if(!name){alert('Lütfen isminizi seçin.');return;}
  var total=0;for(var i=0;i<Q.length;i++)total+=(scores[i]||0);
  var payload=JSON.stringify({ogrenci:name,odev:ODEV,grup:'B1.1',puan:total,dogru:okCount,yanlis:errCount,tarih:new Date().toLocaleDateString('tr-TR')});
  document.getElementById('smsg').style.display='block';
  document.getElementById('smsg').textContent='Gönderiliyor...';
  fetch(SURL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:payload})
  .then(function(){fin(name,total);}).catch(function(){fin(name,total);});
}
function fin(name,total){
  submitted=true;
  document.getElementById('swarn').style.display='none';
  document.getElementById('bsub').style.display='none';
  document.getElementById('smsg').textContent=name+' öğrencisinin "'+ODEV+'" ödevi teslim edildi. Puan: '+total+'/50. Teşekkürler!';
}
</script>
