var ODEV_ADI='H6 \u2013 21-22.Ders';

var REF1=['\u00a1Que cumplas muchos m\u00e1s!','\u00a1Que tengas un buen viaje!','\u00a1Que te mejores pronto!','\u00a1Que tengas mucha suerte!','\u00a1Que descanses!','\u00a1Que te guste!','\u00a1Que se\u00e1is muy felices!','\u00a1Que te vaya bien!','\u00a1Que tengas un buen fin de semana!','\u00a1Que te diviertas!','\u00a1Que aproveche!','\u00a1Que tengas dulces sue\u00f1os!','\u00a1Que te sea leve!','\u00a1Que encuentres lo que buscas!','\u00a1Que te diviertas mucho!','\u00a1Que Dios te bendiga!','\u00a1Que lo disfrutes!','\u00a1Que gane el mejor!','\u00a1Que no sea nada!','\u00a1Que tengas un buen d\u00eda!','\u00a1Que recibas muchos regalos!','\u00a1Que se cumplan tus deseos!','\u00a1Que te salga bien el examen!','\u00a1Que aproveches el tiempo!','\u00a1Que vuelvas pronto!','\u00a1Que no te falte nada!','\u00a1Que brille el sol!','\u00a1Que descans\u00e9is bien!','\u00a1Que os lo pas\u00e9is bomba!','\u00a1Que tengas \u00e9xito!'];

var Q=[
/* 1-30: expresiones */
{q:"soru 1\n\u00bfQu\u00e9 le dices a un amigo el d\u00eda de su cumplea\u00f1os?",o:["\u00a1Que cumplas muchos m\u00e1s!","\u00a1Que te mejores pronto!","\u00a1Que descanses!","\u00a1Que gane el mejor!"],a:0,exp:"\u00a1Que cumplas muchos m\u00e1s!\nCumplir fiili subjuntivo yap\u0131lm\u0131\u015ft\u0131r. \"Daha nicelerini kutlaman dile\u011fiyle\" anlam\u0131na gelir. Bu ifade do\u011fum g\u00fcn\u00fc olan bir arkada\u015f\u0131m\u0131za kurabileceimiz bir c\u00fcmledir."},
{q:"soru 2\n\u00bfQu\u00e9 le dices a alguien que va a salir de viaje?",o:["\u00a1Que te guste!","\u00a1Que tengas buen viaje!","\u00a1Que aproveche!","\u00a1Que vuelvas pronto!"],a:1,exp:"\u00a1Que tengas buen viaje!\nTener fiili subjuntivo \u00e7ekimlenmi\u015ftir. Seyahate \u00e7\u0131kan birisine iyi yolculuklar dilemek i\u00e7in kullan\u0131l\u0131r."},
{q:"soru 3\n\u00bfQu\u00e9 le dices a un familiar que est\u00e1 enfermo?",o:["\u00a1Que te diviertas!","\u00a1Que no sea nada!","\u00a1Que te mejores pronto!","\u00a1Que tengas \u00e9xito!"],a:2,exp:"\u00a1Que te mejores pronto!\nMejorarse fiili subjuntivo \u00e7ekimlenmi\u015ftir. \"\u00c7abuk iyile\u015fmen dile\u011fiyle\" anlam\u0131n\u0131 ta\u015f\u0131r."},
{q:"soru 4\n\u00bfQu\u00e9 le dices a un estudiante antes de un examen dif\u00edcil?",o:["\u00a1Que lo disfrutes!","\u00a1Que tengas mucha suerte!","\u00a1Que descanses!","\u00a1Que brille el sol!"],a:1,exp:"\u00a1Que tengas mucha suerte!\nTener Fiili kullan\u0131l\u0131r. Birine \"bol \u015fans\" dilemek i\u00e7in en yayg\u0131n kullan\u0131lan subjuntivo kal\u0131plar\u0131ndan biridir."},
{q:"soru 5\n\u00bfQu\u00e9 le dices a alguien que se va a dormir?",o:["\u00a1Que aproveche!","\u00a1Que te sea leve!","\u00a1Que descanses!","\u00a1Que te vaya bien!"],a:2,exp:"\u00a1Que descanses!\nDescansar (dinlenmek) fiili kullan\u0131l\u0131r. \"İyi dinlenmeler\" veya yatmaya giden birine \"iyi uykular\" demek i\u00e7in kullan\u0131l\u0131r."},
{q:"soru 6\n\u00bfQu\u00e9 le dices al entregar un regalo a alguien?",o:["\u00a1Que se cumplan tus deseos!","\u00a1Que te guste!","\u00a1Que no te falte nada!","\u00a1Que cumplas muchos m\u00e1s!"],a:1,exp:"\u00a1Que te guste!\nGustar fiili subjuntivo formundad\u0131r. \"Umar\u0131m ho\u015funa gider/be\u011fenirsin\" anlam\u0131nda kullan\u0131l\u0131r."},
{q:"soru 7\n\u00bfQu\u00e9 le dices a una pareja que se acaba de casar?",o:["\u00a1Que os lo pas\u00e9is bomba!","\u00a1Que descans\u00e9is bien!","\u00a1Que se\u00e1is muy felices!","\u00a1Que recibas muchos regalos!"],a:2,exp:"\u00a1Que se\u00e1is muy felices!\nSer fiili \"vosotros\" (\u015diz) \u015fah\u0131s\u0131na g\u00f6re subjuntivo \u00e7ekimlenmi\u015ftir. Yeni evlenen \u00e7ifte mutluluk dilemek i\u00e7in kullan\u0131l\u0131r."},
{q:"soru 8\n\u00bfQu\u00e9 le dices a alguien que empieza un nuevo proyecto o trabajo?",o:["\u00a1Que llueva!","\u00a1Que te vaya bien!","\u00a1Que no sea nada!","\u00a1Que gane el mejor!"],a:1,exp:"\u00a1Que te vaya bien!\nIr fiili kullan\u0131lm\u0131\u015ft\u0131r. \"Her \u015feyin yolunda gitmesi/i\u015finin rast gitmesi\" dile\u011fini belirtir."},
{q:"soru 9\n\u00bfQu\u00e9 le dices a un colega el viernes al terminar el trabajo?",o:["\u00a1Que tengas un buen fin de semana!","\u00a1Que te diviertas mucho!","\u00a1Que aproveches el tiempo!","\u00a1Que Dios te bendiga!"],a:0,exp:"\u00a1Que tengas un buen fin de semana!\nHafta sonu i\u00e7in iyi dileklerde bulunurken tener fiili subjuntivo olarak \u00e7ekimlenir."},
{q:"soru 10\n\u00bfQu\u00e9 le dices a alguien que se va a una fiesta?",o:["\u00a1Que te sea leve!","\u00a1Que encuentres lo que buscas!","\u00a1Que te diviertas!","\u00a1Que descans\u00e9is bien!"],a:2,exp:"\u00a1Que te diviertas!\nDivertirse (e\u011flenmek) fiili kullan\u0131lm\u0131\u015ft\u0131r. Birine \"iyi e\u011flenceler\" demenin en do\u011fal yoludur."},
{q:"soru 11\n\u00bfQu\u00e9 le dices a alguien que est\u00e1 empezando a comer?",o:["\u00a1Que aproveche!","\u00a1Que tengas dulces sue\u00f1os!","\u00a1Que lo disfrutes!","\u00a1Que vuelvas pronto!"],a:0,exp:"\u00a1Que aproveche!\nAprovechar fiili kullan\u0131l\u0131r. \u0130spanyolcada \"afiyet olsun\" demenin kar\u015f\u0131l\u0131\u011f\u0131d\u0131r."},
{q:"soru 12\n\u00bfQu\u00e9 le dices a un ni\u00f1o antes de que se quede dormido?",o:["\u00a1Que brille el sol!","\u00a1Que tengas dulces sue\u00f1os!","\u00a1Que te salga bien el examen!","\u00a1Que no te falte nada!"],a:1,exp:"\u00a1Que tengas dulces sue\u00f1os!\n\"Tatl\u0131 r\u00fcyalar g\u00f6rmen dile\u011fiyle\" anlam\u0131nda, uyku \u00f6ncesi s\u00f6ylenen bir temenni c\u00fcmlesidir."},
{q:"soru 13\n\u00bfQu\u00e9 le dices a alguien que tiene que hacer una tarea larga y pesada?",o:["\u00a1Que te sea leve!","\u00a1Que os lo pas\u00e9is bomba!","\u00a1Que cumplas muchos m\u00e1s!","\u00a1Que tengas mucha suerte!"],a:0,exp:"\u00a1Que te sea leve!\nSer fiili kullan\u0131lm\u0131\u015ft\u0131r. \"Umar\u0131m hafif ge\u00e7er/kolay gelsin\" anlam\u0131nda, zor bir i\u015fe ba\u015flayan ki\u015fiye s\u00f6ylenir."},
{q:"soru 14\n\u00bfQu\u00e9 le dices a alguien que est\u00e1 buscando algo importante?",o:["\u00a1Que recibas muchos regalos!","\u00a1Que tengas un buen d\u00eda!","\u00a1Que encuentres lo que buscas!","\u00a1Que Dios te bendiga!"],a:2,exp:"\u00a1Que encuentres lo que buscas!\nEncontrar (bulmak) fiili subjuntivo \u00e7ekimlenmi\u015ftir. Aranan \u015feyin bulunmas\u0131 temennisini i\u00e7erir."},
{q:"soru 15\n\u00bfQu\u00e9 le dices a unos amigos que van a un parque de atracciones?",o:["\u00a1Que te diviertas mucho!","\u00a1Que aproveche!","\u00a1Que no sea nada!","\u00a1Que gane el mejor!"],a:0,exp:"\u00a1Que te diviertas mucho!\n\"\u00c7ok e\u011flenmem dile\u011fiyle\" anlam\u0131n\u0131 ta\u015f\u0131r. E\u011flence seviyesini vurgulamak i\u00e7in kullan\u0131l\u0131r."},
{q:"soru 16\n\u00bfQu\u00e9 le dices para expresar una bendici\u00f3n tradicional?",o:["\u00a1Que brille el sol!","\u00a1Que Dios te bendiga!","\u00a1Que se\u00e1is muy felices!","\u00a1Que te vaya bien!"],a:1,exp:"\u00a1Que Dios te bendiga!\nBendecir fiili kullan\u0131lm\u0131\u015ft\u0131r. \"Tanr\u0131 seni kutsas\u0131n / Allah raz\u0131 olsun\" gibi durumlarda kullan\u0131lan bir duad\u0131r."},
{q:"soru 17\n\u00bfQu\u00e9 le dices a alguien que acaba de comprarse un coche nuevo?",o:["\u00a1Que descans\u00e9is bien!","\u00a1Que te mejores pronto!","\u00a1Que lo disfrutes!","\u00a1Que se cumplan tus deseos!"],a:2,exp:"\u00a1Que lo disfrutes!\nDisfrutar (tad\u0131n\u0131 \u00e7\u0131karmak) fiili kullan\u0131lm\u0131\u015ft\u0131r. \"G\u00fcle g\u00fcle kullan, tad\u0131n\u0131 \u00e7\u0131kar\" anlam\u0131ndad\u0131r."},
{q:"soru 18\n\u00bfQu\u00e9 le dices antes de que empiece una competici\u00f3n deportiva?",o:["\u00a1Que gane el mejor!","\u00a1Que te guste!","\u00a1Que aproveches el tiempo!","\u00a1Que no te falte nada!"],a:0,exp:"\u00a1Que gane el mejor!\nGanar Fiili subjuntivo \u00e7ekimlenmi\u015ftir. \"En iyi olan kazans\u0131n\" temennisidir."},
{q:"soru 19\n\u00bfQu\u00e9 le dices a alguien que ha tenido un peque\u00f1o golpe pero parece estar bien?",o:["\u00a1Que vuelvas pronto!","\u00a1Que no sea nada!","\u00a1Que tengas un buen viaje!","\u00a1Que cumplas muchos m\u00e1s!"],a:1,exp:"\u00a1Que no sea nada!\n\"Umar\u0131m bir \u015feyin yoktur / K\u00f6t\u00fc bir sonu\u00e7 \u00e7\u0131kmaz\" anlam\u0131nda kullan\u0131lan bir teselli c\u00fcmlesidir."},
{q:"soru 20\n\u00bfQu\u00e9 le dices al despedirte de alguien por la ma\u00f1ana?",o:["\u00a1Que te diviertas!","\u00a1Que no te falte nada!","\u00a1Que tengas un buen d\u00eda!","\u00a1Que os lo pas\u00e9is bomba!"],a:2,exp:"\u00a1Que tengas un buen d\u00eda!\nG\u00fcn\u00fcn geri kalan\u0131 i\u00e7in iyi dilek belirtirken kullan\u0131l\u0131r."},
{q:"soru 21\n\u00bfQu\u00e9 le dices a alguien que est\u00e1 celebrando el d\u00eda de Navidad?",o:["\u00a1Que recibas muchos regalos!","\u00a1Que te sea leve!","\u00a1Que brille el sol!","\u00a1Que gane el mejor!"],a:0,exp:"\u00a1Que recibas muchos regalos!\nRecibir (almak/teslim almak) fiili kullan\u0131lm\u0131\u015ft\u0131r. \"\u00c7ok hediye alman dile\u011fiyle\" anlam\u0131ndad\u0131r."},
{q:"soru 22\n\u00bfQu\u00e9 le dices a alguien que est\u00e1 soplando las velas de su tarta?",o:["\u00a1Que aproveche!","\u00a1Que lo disfrutes!","\u00a1Que se cumplan tus deseos!","\u00a1Que Dios te bendiga!"],a:2,exp:"\u00a1Que se cumplan tus deseos!\nCumplirse fiili \u00e7o\u011ful subjuntivo yap\u0131lm\u0131\u015ft\u0131r. \"Dileklerinin ger\u00e7ekle\u015fmesi temennisiyle\" s\u00f6ylenir."},
{q:"soru 23\n\u00bfQu\u00e9 le dices a un alumno justo antes de entrar al aula para su examen?",o:["\u00a1Que tengas dulces sue\u00f1os!","\u00a1Que te salga bien el examen!","\u00a1Que descanses!","\u00a1Que vuelvas pronto!"],a:1,exp:"\u00a1Que te salga bien el examen!\nSalir fiili kullan\u0131lm\u0131\u015ft\u0131r. \"S\u0131nav\u0131n\u0131n iyi sonu\u00e7lanmas\u0131\" dile\u011fini belirtir."},
{q:"soru 24\n\u00bfQu\u00e9 le dices a alguien que tiene unos d\u00edas de vacaciones?",o:["\u00a1Que no sea nada!","\u00a1Que encuentres lo que buscas!","\u00a1Que aproveches el tiempo!","\u00a1Que se\u00e1is muy felices!"],a:2,exp:"\u00a1Que aproveches el tiempo!\nAprovechar fiili kullan\u0131lm\u0131\u015ft\u0131r. \"Vaktini iyi de\u011flendirmen / tad\u0131n\u0131 \u00e7\u0131karman dile\u011fiyle\" demektir."},
{q:"soru 25\n\u00bfQu\u00e9 le dices a un amigo que se va a vivir fuera un tiempo?",o:["\u00a1Que vuelvas pronto!","\u00a1Que te diviertas mucho!","\u00a1Que tengas un buen fin de semana!","\u00a1Que recibas muchos regalos!"],a:0,exp:"\u00a1Que vuelvas pronto!\nVolver(d\u00f6nmek) fiili subjuntivo yap\u0131lm\u0131\u015ft\u0131r. \"\u00c7abuk d\u00f6nmen dile\u011fiyle\" anlam\u0131na gelir."},
{q:"soru 26\n\u00bfQu\u00e9 le dices como un deseo general de prosperidad?",o:["\u00a1Que te vaya bien!","\u00a1Que no te falte nada!","\u00a1Que te guste!","\u00a1Que gane el mejor!"],a:1,exp:"\u00a1Que no te falte nada!\nFaltar (eksik olmak) fiili kullan\u0131lm\u0131\u015ft\u0131r. \"Hi\u00e7bir \u015feyin eksik olmamas\u0131\" temennisidir."},
{q:"soru 27\n\u00bfQu\u00e9 le dices si quieres que haga buen tiempo para una fiesta exterior?",o:["\u00a1Que brille el sol!","\u00a1Que os lo pas\u00e9is bomba!","\u00a1Que tengas \u00e9xito!","\u00a1Que no sea nada!"],a:0,exp:"\u00a1Que brille el sol!\nBrillar fiili kullan\u0131lm\u0131\u015ft\u0131r. \"G\u00fcne\u015fin parlamas\u0131/havan\u0131n g\u00fczel olmas\u0131\" dile\u011fidir."},
{q:"soru 28\n\u00bfQu\u00e9 le dices a un grupo de personas que se van a descansar?",o:["\u00a1Que descans\u00e9is bien!","\u00a1Que te diviertas!","\u00a1Que lo disfrutes!","\u00a1Que se cumplan tus deseos!"],a:0,exp:"\u00a1Que descans\u00e9is bien!\nDescansar fiili \"vosotros\" (\u015diz) \u015fah\u0131s\u0131na g\u00f6re \u00e7ekimlenmi\u015ftir. \u00c7o\u011ful bir gruba iyi dinlenmeler dilerken kullan\u0131l\u0131r."},
{q:"soru 29\n\u00bfQu\u00e9 le dices a unos amigos que van a un concierto muy esperado?",o:["\u00a1Que aproveche!","\u00a1Que os lo pas\u00e9is bomba!","\u00a1Que tengas buen viaje!","\u00a1Que encuentres lo que buscas!"],a:1,exp:"\u00a1Que os lo pas\u00e9is bomba!\nPasarlo bomba (harika vakit ge\u00e7irmek) deyimi subjuntivo olarak \u00e7ekimlenmi\u015ftir. \"\u00c7ok iyi vakit ge\u00e7irmeniz dile\u011fiyle\" anlam\u0131ndad\u0131r."},
{q:"soru 30\n\u00bfQu\u00e9 le dices a alguien que abre su propio negocio?",o:["\u00a1Que descanses!","\u00a1Que te mejores pronto!","\u00a1Que tengas \u00e9xito!","\u00a1Que brille el sol!"],a:2,exp:"\u00a1Que tengas \u00e9xito!\nTener fiili ba\u015far\u0131 temennisiyle \u00e7ekimlenmi\u015ftir. \"Ba\u015far\u0131l\u0131 olman dile\u011fiyle\" anlam\u0131na gelir."},
/* 31-50 */
{q:"soru 31\nMe da miedo que mis amigos no __________ a mi fiesta de cumplea\u00f1os.",o:["van","vengan","vienen","vayan"],a:1,exp:"Me da miedo que mis amigos no vengan a mi fiesta de cumplea\u00f1os.\n(Arkada\u015flar\u0131m\u0131n do\u011fum g\u00fcn\u00fc partime gelmemesinden korkuyorum.)\nBurada \"me da miedo que\" ifadesi bir korku/duygu (emoci\u00f3n) belirtti\u011fi i\u00e7in devam\u0131nda Subjuntivo kullan\u0131lm\u0131\u015ft\u0131r."},
{q:"soru 32\nEs una l\u00e1stima que Juan __________ enfermo y no pueda venir a la clase de espa\u00f1ol.",o:["est\u00e1","estuvo","est\u00e9","estar\u00e1"],a:2,exp:"Es una l\u00e1stima que Juan est\u00e9 enfermo y no pueda venir a la clase de espa\u00f1ol.\n(Juan'\u0131n hasta olmas\u0131 ve \u0130spanyolca dersine gelememesi ne yaz\u0131k.)\n\"Es una l\u00e1stima que\" yap\u0131s\u0131 bir de\u011fer yarg\u0131s\u0131 ve \u00fcz\u00fcnt\u00fc belirtti\u011fi i\u00e7in Subjuntivo gerektirir."},
{q:"soru 33\nEs fundamental que __________ los deberes antes de la clase de ma\u00f1ana.",o:["haces","har\u00e1s","hagas","hiciste"],a:2,exp:"Es fundamental que hagas los deberes antes de la clase de ma\u00f1ana.\n(Yar\u0131nki dersten \u00f6nce \u00f6devleri yapman temel bir gerekliliktir.)\n\"Es fundamental que\" yap\u0131s\u0131 bir zorunluluk/gereklilik bildirdi\u011fi i\u00e7in Subjuntivo kullan\u0131l\u0131r."},
{q:"soru 34\nMis padres quieren que mi hermana __________ medicina en Esmirna.",o:["estudia","estudi\u00f3","estudiar\u00e1","estudie"],a:3,exp:"Mis padres quieren que mi hermana estudie medicina en Esmirna.\n(Ailem, k\u0131z karde\u015fimin \u0130zmir'de t\u0131p okumasn\u0131 istiyor.)\n\"Querer que\" fiili bir ba\u015fkas\u0131ndan bir istekte bulunmay\u0131 (voluntad) ifade etti\u011fi i\u00e7in Subjuntivo ile devam eder."},
{q:"soru 35\nDudo mucho que este examen __________ tan dif\u00edcil como el anterior.",o:["es","fue","ser\u00e1","sea"],a:3,exp:"Dudo mucho que este examen sea tan dif\u00edcil como el anterior.\n(Bu s\u0131nav\u0131n bir \u00f6nceki kadar zor oldu\u011fundan \u00e7ok \u015f\u00fcphe duyuyorum.)\n\"Dudar que\" fiili \u015f\u00fcphe (duda) belirtti\u011fi i\u00e7in ard\u0131ndan gelen fiil Subjuntivo olur."},
{q:"soru 36\nMe fastidia que siempre __________ tarde a nuestras reuniones.",o:["llegas","llegaste","llegar\u00e1s","llegues"],a:3,exp:"Me fastidia que siempre llegues tarde a nuestras reuniones.\n(Toplant\u0131lar\u0131m\u0131za her zaman ge\u00e7 gelmen can\u0131m\u0131 s\u0131k\u0131yor.)\n\"Me fastidia que\" ifadesi bir rahats\u0131zl\u0131k/duygu belirtti\u011fi i\u00e7in Subjuntivo tetikleyicisidir."},
{q:"soru 37\nEs probable que __________ ma\u00f1ana por la tarde en Antalya.",o:["llueve","llovi\u00f3","llover\u00e1","llueva"],a:3,exp:"Es probable que llueva ma\u00f1ana por la tarde en Antalya.\n(Yar\u0131n \u00f6\u011fleden sonra Antalya'da ya\u011fmur ya\u011fmas\u0131 muhtemel.)\n\"Es probable que\" yap\u0131s\u0131 olas\u0131l\u0131k (probabilidad) bildirdi\u011fi i\u00e7in Subjuntivo kullan\u0131l\u0131r."},
{q:"soru 38\nNo me parece bien que Alex se __________ de vacaciones sin avisar.",o:["va","fue","ir\u00e1","vaya"],a:3,exp:"No me parece bien que Alex se vaya de vacaciones sin avisar.\n(Alex'in haber vermeden tatile gitmesi bana do\u011fru gelmiyor.)\nKi\u015fisel bir g\u00f6r\u00fc\u015f veya yarg\u0131 (valoraci\u00f3n) bildiren \"no me parece bien que\" yap\u0131s\u0131 Subjuntivo ile kullan\u0131l\u0131r."},
{q:"soru 39\nPrefiero que __________ m\u00e1s verduras y menos comida r\u00e1pida.",o:["comes","comiste","comer\u00e1s","comas"],a:3,exp:"Prefiero que comas m\u00e1s verduras y menos comida r\u00e1pida.\n(Daha \u00e7ok sebze, daha az haz\u0131r yemek yemeni tercih ederim.)\n\"Preferir que\" tercihi ba\u015fka bir \u00f6zne \u00fczerinden belirtti\u011fi i\u00e7in Subjuntivo kullan\u0131l\u0131r."},
{q:"soru 40\n\u00a1Ojal\u00e1 __________ mucha suerte en tu nuevo canal de YouTube!",o:["tienes","tuviste","tendr\u00e1s","tengas"],a:3,exp:"\u00a1Ojal\u00e1 tengas mucha suerte en tu nuevo canal de YouTube!\n(Umar\u0131m yeni YouTube kanal\u0131nda \u00e7ok \u015fansl\u0131 olursun!)\n\"Ojal\u00e1\" kelimesi her zaman bir dilek belirtir ve Subjuntivo ile kullan\u0131l\u0131r."},
{q:"soru 41\nTe aconsejo que no le __________ la verdad todav\u00eda a Harun.",o:["dices","dijiste","dir\u00e1s","digas"],a:3,exp:"Te aconsejo que no le digas la verdad todav\u00eda a Harun.\n(Harun'a ger\u00e7e\u011fi hen\u00fcz s\u00f6ylememeni tavsiye ederim.)\nTavsiye (aconsejar) bildiren yap\u0131lar Subjuntivo ile kurulur."},
{q:"soru 42\nTe pido por favor que me __________ con la limpieza de la cocina.",o:["ayudas","ayudaste","ayudar\u00e1s","ayudes"],a:3,exp:"Te pido por favor que me ayudes con la limpieza de la cocina.\n(L\u00fctfen mutfak temizli\u011finde bana yard\u0131m etmeni rica ediyorum.)\nRica veya emir (petici\u00f3n) bildiren \"pedir que\" Subjuntivo gerektirir."},
{q:"soru 43\nBusco un coche que __________ un maletero muy grande para mis viajes.",o:["tiene","tuvo","tendr\u00e1","tenga"],a:3,exp:"Busco un coche que tenga un maletero muy grande para mis viajes.\n(Seyahatlerim i\u00e7in \u00e7ok b\u00fcy\u00fck bagaj\u0131 olan bir araba ar\u0131yorum.)\nBelirsiz veya hen\u00fcz bulunmam\u0131\u015f bir \u00f6zellikten (existencia no experimentada) bahsederken \"busco que\" yap\u0131s\u0131 Subjuntivo al\u0131r."},
{q:"soru 44\nAunque __________ venir a visitarme, no estar\u00e9 en casa el fin de semana.",o:["puedes","pudiste","podr\u00e1s","puedas"],a:3,exp:"Aunque puedas venir a visitarme, no estar\u00e9 en casa el fin de semana.\n(Beni ziyarete gelebilsen bile, hafta sonu evde olmayaca\u011f\u0131m.)\nHen\u00fcz ger\u00e7ekle\u015fmemi\u015f veya belirsiz bir engel durumunda \"aunque\" Subjuntivo ile kullan\u0131l\u0131r."},
{q:"soru 45\nTe presto mi coche con tal de que __________ d\u00f3nde vas exactamente.",o:["sabemos","sup\u00edramos","sabremos","sepamos"],a:3,exp:"Te presto mi coche con tal de que sepamos d\u00f3nde vas exactamente.\n(Nereye gitti\u011fini tam olarak bilmemiz \u015fart\u0131yla arabam\u0131 sana \u00f6d\u00fcn\u00e7 veririm.)\n\"Con tal de que\" bir \u015fart (condici\u00f3n) belirtti\u011fi i\u00e7in Subjuntivo ile kullan\u0131l\u0131r."},
{q:"soru 46\nProhibimos que los clientes __________ dentro del restaurante.",o:["fuman","fumaron","fumar\u00e1n","fumen"],a:3,exp:"Prohibimos que los clientes fumen dentro del restaurante.\n(M\u00fc\u015fterilerin restoran i\u00e7inde sigara i\u00e7mesini yasakl\u0131yoruz.)\nYasaklama (prohibici\u00f3n) bildiren fiiller Subjuntivo tetikler."},
{q:"soru 47\nMe alegra mucho que __________ el primer premio del concurso.",o:["ganas","ganaste","ganar\u00e1s","ganes"],a:3,exp:"Me alegra mucho que ganes el primer premio del concurso.\n(Yar\u0131\u015fman\u0131n birincilik \u00f6d\u00fcl\u00fcn\u00fc kazanmana \u00e7ok seviniyorum.)\n\"Me alegra que\" bir mutluluk/duygu (alegr\u00eda) bildirdi\u011fi i\u00e7in Subjuntivo kullan\u0131l\u0131r."},
{q:"soru 48\nSiento mucho que __________ el tren todos los d\u00edas, es muy estresante.",o:["pierdes","perdiste","perder\u00e1s","pierdas"],a:3,exp:"Siento mucho que pierdas el tren todos los d\u00edas, es muy estresante.\n(Her g\u00fcn treni ka\u00e7\u0131rmana \u00e7ok \u00fcz\u00fcl\u00fcyorum, \u00e7ok stresli.)\n\u00dczüntü/Pi\u015fmanl\u0131k (sentimiento) bildiren yap\u0131lar Subjuntivo ile devam eder."},
{q:"soru 49\nEs mejor que __________ los consejos de tu profesora de espa\u00f1ol.",o:["escuchas","escuchaste","escuchar\u00e1s","escuches"],a:3,exp:"Es mejor que escuches los consejos de tu profesora de espa\u00f1ol.\n(\u0130spanyolca \u00f6\u011fretmeninin tavsiyelerini dinlesen iyi olur.)\n\"Es mejor que\" yap\u0131s\u0131 bir \u00f6neri/yarg\u0131 belirtti\u011fi i\u00e7in Subjuntivo gerektirir."},
{q:"soru 50\nTe lo explico otra vez para que __________ bien el uso del subjuntivo.",o:["entiendes","entendiste","entender\u00e1s","entiendas"],a:3,exp:"Te lo explico otra vez para que entiendas bien el uso del subjuntivo.\n(Subjuntivo kullan\u0131m\u0131n\u0131 iyi anlaman i\u00e7in sana tekrar a\u00e7\u0131kl\u0131yorum.)\nAma\u00e7 bildiren \"para que\" ba\u011flac\u0131 her zaman Subjuntivo ile kullan\u0131l\u0131r."},
/* 51-70 */
{q:"soru 51\nNo entiendo por qu\u00e9 siempre est\u00e1s de mal humor. Me da rabia que me __________ as\u00ed cuando solo intento ayudarte con tus problemas.",o:["hablas","hablaste","hablar\u00e1s","hables"],a:3,exp:"No entiendo por qu\u00e9 siempre est\u00e1s de mal humor. Me da rabia que me hables as\u00ed cuando solo intento ayudarte con tus problemas.\n(Neden hep k\u00f6t\u00fc ruh halinde oldu\u011funu anlam\u0131yorum. Ben sadece sorunlar\u0131nda sana yard\u0131m etmeye \u00e7al\u0131\u015f\u0131rken bana b\u00f6yle konu\u015fman beni \u00f6fkelendiriyor.)\n\"Me da rabia que\" ifadesi bir k\u0131zg\u0131nl\u0131k/duygu belirtti\u011fi i\u00e7in Subjuntivo tetikler."},
{q:"soru 52\nHe visto el tr\u00e1iler de la nueva pel\u00edcula y no me convence. No creo que __________ tan interesante como dicen los cr\u00edticos en la televisi\u00f3n.",o:["es","fue","ser\u00e1","sea"],a:3,exp:"He visto el tr\u00e1iler de la nueva pel\u00edcula y no me convence. No creo que sea tan interesante como dicen los cr\u00edticos en la televisi\u00f3n.\n(Yeni filmin fragman\u0131n\u0131 izledim ve beni ikna etmedi. Televizyondaki ele\u015ftirmenlerin dedi\u011fi kadar ilgin\u00e7 oldu\u011funa inanm\u0131yorum.)\n\"No creer que\" yap\u0131s\u0131 bir \u015f\u00fcphe ve inanmama belirtti\u011fi i\u00e7in Subjuntivo ile devam eder."},
{q:"soru 53\nS\u00e9 que vas a ir al supermercado ahora mismo. Te pido que me __________ un poco de queso manchego para la cena de esta noche.",o:["traes","trajiste","traer\u00e1s","traigas"],a:3,exp:"S\u00e9 que vas a ir al supermercado ahora mismo. Te pido que me traigas un poco de queso manchego para la cena de esta noche.\n(\u015eu an s\u00fcpermarkete gidece\u011fini biliyorum. Bu ak\u015famlaki ak\u015fam yeme\u011fi i\u00e7in bana biraz Manchego peyniri getirmeni rica ediyorum.)\n\"Pedir que\" fiili bir ba\u015fkas\u0131ndan bir ricada bulunmay\u0131 ifade etti\u011fi i\u00e7in Subjuntivo gerektirir."},
{q:"soru 54\nMucha gente trabaja duro pero no gana lo suficiente. Me parece injusto que una persona __________ que trabajar m\u00e1s de doce horas al d\u00eda para sobrevivir.",o:["tiene","tuvo","tendr\u00e1","tenga"],a:3,exp:"Mucha gente trabaja duro pero no gana lo suficiente. Me parece injusto que una persona tenga que trabajar m\u00e1s de doce horas al d\u00eda para sobrevivir.\n(Pek \u00e7ok insan \u00e7ok \u00e7al\u0131\u015f\u0131yor ama yeterince kazanm\u0131yor. Bir insan\u0131n hayatta kalmak i\u00e7in g\u00fcnde on iki saatten fazla \u00e7al\u0131\u015fmak zorunda olmas\u0131 bana adaletsiz geliyor.)\n\"Me parece injusto que\" bir de\u011fer yarg\u0131s\u0131 (valoraci\u00f3n) bildirdi\u011fi i\u00e7in Subjuntivo kullan\u0131l\u0131r."},
{q:"soru 55\nEstoy estudiando gram\u00e1tica todas las tardes sin falta. Lo hago para que mi profesora __________ que estoy progresando mucho en mis clases.",o:["sabe","supo","sabr\u00e1","sepa"],a:3,exp:"Estoy estudiando gram\u00e1tica todas las tardes sin falta. Lo hago para que mi profesora sepa que estoy progresando mucho en mis clases.\n(Her ak\u015fam hi\u00e7 aksatmadan gramer \u00e7al\u0131\u015f\u0131yorum. Bunu, \u00f6\u011fretmenimin derslerimde \u00e7ok ilerledi\u011fimi bilmesi i\u00e7in yap\u0131yorum.)\nAma\u00e7 bildiren \"para que\" ba\u011flac\u0131ndan sonra her zaman Subjuntivo gelir."},
{q:"soru 56\nEl cielo est\u00e1 muy oscuro y hace bastante fr\u00edo hoy. Es posible que __________ en las monta\u00f1as de los alrededores de la ciudad este fin de semana.",o:["nieva","nev\u00f3","nevar\u00e1","nieve"],a:3,exp:"El cielo est\u00e1 muy oscuro y hace bastante fr\u00edo hoy. Es posible que nieve en las monta\u00f1as de los alrededores de la ciudad este fin de semana.\n(G\u00f6ky\u00fcz\u00fc \u00e7ok karanl\u0131k ve bug\u00fcn hava olduk\u00e7a so\u011fuk. Bu hafta sonu \u015fehrin \u00e7evresindeki da\u011flara kar ya\u011fmas\u0131 muhtemel.)\n\"Es posible que\" olas\u0131l\u0131k bildirdi\u011fi i\u00e7in Subjuntivo kullan\u0131l\u0131r."},
{q:"soru 57\nEspero que te __________ mucho el regalo que te he comprado en Estambul; es algo muy especial para ti.",o:["gusta","gust\u00f3","gustar\u00e1","guste"],a:3,exp:"Espero que te guste mucho el regalo que te he comprado en Estambul; es algo muy especial para ti.\n(Umar\u0131m \u0130stanbul'dan senin i\u00e7in ald\u0131\u011f\u0131m hediyeyi \u00e7ok be\u011fenirsin; senin i\u00e7in \u00e7ok \u00f6zel bir \u015fey.)\n\"Esperar que\" bir umut ve dilek belirtti\u011fi i\u00e7in Subjuntivo ile kullan\u0131l\u0131r."},
{q:"soru 58\nTu habitaci\u00f3n est\u00e1 siempre muy desordenada. No voy a dejar que __________ la ropa sucia tirada por todo el suelo de la casa.",o:["dejas","dejaste","dejar\u00e1s","dejes"],a:3,exp:"Tu habitaci\u00f3n est\u00e1 siempre muy desordenada. No voy a dejar que dejes la ropa sucia tirada por todo el suelo de la casa.\n(Odan her zaman \u00e7ok da\u011f\u0131n\u0131k. Kirli k\u0131yafetleri evin her yerinde yerlere at\u0131lm\u0131\u015f halde b\u0131rakmana izin vermeyece\u011fim.)\n\"No dejar que\" (izin vermemek) bir irade ve yasaklama belirtti\u011fi i\u00e7in Subjuntivo al\u0131r."},
{q:"soru 59\nMe encanta que __________ en una ciudad tan bonita como Antalya; aqu\u00ed siempre hay algo interesante que hacer.",o:["vives","viviste","vivir\u00e1s","vivas"],a:3,exp:"Me encanta que vivas en una ciudad tan bonita como Antalya; aqu\u00ed siempre hay algo interesante que hacer.\n(Antalya gibi g\u00fczel bir \u015fehirde ya\u015f\u0131yor olman ho\u015fuma gidiyor; burada her zaman yapacak ilgin\u00e7 bir \u015feyler var.)\n\"Me encanta que\" ho\u015flanma ve duygu belirtti\u011fi i\u00e7in Subjuntivo gerektirir."},
{q:"soru 60\nSi quieres aprobar el examen del DELE, hace falta que __________ espa\u00f1ol al menos dos horas cada d\u00eda.",o:["estudias","estudiaste","estudiar\u00e1s","estudies"],a:3,exp:"Si quieres aprobar el examen del DELE, hace falta que estudies espa\u00f1ol al menos dos horas cada d\u00eda.\n(DELE s\u0131nav\u0131n\u0131 ge\u00e7mek istiyorsan, her g\u00fcn en az iki saat \u0130spanyolca \u00e7al\u0131\u015fman gerekiyor.)\n\"Hace falta que\" gereklilik bildiren bir yap\u0131 oldu\u011fu i\u00e7in Subjuntivo ile kullan\u0131l\u0131r."},
{q:"soru 61\nNo entiendo por qu\u00e9 est\u00e1s tan enfadada conmigo. Me extra\u00f1a mucho que no me __________ a los mensajes de WhatsApp desde ayer.",o:["contestas","contestaste","contestar\u00e1s","contestes"],a:3,exp:"No entiendo por qu\u00e9 est\u00e1s tan enfadada conmigo. Me extra\u00f1a mucho que no me contestes a los mensajes de WhatsApp desde ayer.\n(Bana neden bu kadar k\u0131zg\u0131n oldu\u011funu anlam\u0131yorum. D\u00fcnden beri WhatsApp mesajlar\u0131ma cevap vermemen beni \u00e7ok \u015fa\u015f\u0131rt\u0131yor.)\n\"Me extra\u00f1a que\" \u015fa\u015f\u0131rma/duygu bildirdi\u011fi i\u00e7in Subjuntivo ile devam eder."},
{q:"soru 62\nTus padres son muy generosos y siempre te apoyan. Es l\u00f3gico que __________ de ti cuando tienes problemas personales.",o:["se cuidan","se cuidaron","se cuidar\u00e1n","te cuiden"],a:3,exp:"Es l\u00f3gico que se cuiden de ti cuando tienes problemas personales.\n(Ailen \u00e7ok c\u00f6mert ve seni her zaman destekliyorlar. Ki\u015fisel sorunlar\u0131n oldu\u011funda seninle ilgilenmeleri/seni korumalar\u0131 mant\u0131kl\u0131d\u0131r.)\n\"Es l\u00f3gico que\" mant\u0131ksal bir yarg\u0131 belirtti\u011fi i\u00e7in Subjuntivo tetikler."},
{q:"soru 63\nNo me importa que te __________ de fiesta con tus amigos, pero por favor av\u00edsame cuando llegues a casa para no preocuparme.",o:["vas","fuiste","ir\u00e1s","vayas"],a:3,exp:"No me importa que te vayas de fiesta con tus amigos, pero por favor av\u00edsame cuando llegues a casa para no preocuparme.\n(Arkada\u015flar\u0131nla partiye gitmen umurumda de\u011fil/benim i\u00e7in sorun de\u011fil, ama l\u00fctfen merak etmemem i\u00e7in eve vard\u0131\u011f\u0131nda bana haber ver.)\n\"No me importa que\" bir durumun \u00f6zne \u00fczerindeki etkisini/duygusunu belirtti\u011fi i\u00e7in Subjuntivo al\u0131r."},
{q:"soru 64\nLa biblioteca es un lugar de estudio y silencio. No permiten que nadie __________ o haga ruido mientras los dem\u00e1s est\u00e1n trabajando.",o:["grita","grit\u00f3","gritar\u00e1","grite"],a:3,exp:"La biblioteca es un lugar de estudio y silencio. No permiten que nadie grite o haga ruido mientras los dem\u00e1s est\u00e1n trabajando.\n(K\u00fct\u00fcphane \u00e7al\u0131\u015fma ve sessizlik yeridir. Di\u011ferleri \u00e7al\u0131\u015f\u0131rken kimsenin ba\u011f\u0131rmas\u0131na veya g\u00fcr\u00fclt\u00fc yapmas\u0131na izin vermiyorlar.)\n\"No permitir que\" izin vermeme/yasak bildirdi\u011fi i\u00e7in Subjuntivo gerektirir."},
{q:"soru 65\nNo es verdad que Harun __________ todo sobre la sorpresa que estamos preparando para su cumplea\u00f1os; todav\u00eda es un secreto.",o:["sabe","supo","sabr\u00e1","sepa"],a:3,exp:"No es verdad que Harun sepa todo sobre la sorpresa que estamos preparando para su cumplea\u00f1os; todav\u00eda es un secreto.\n(Harun'un do\u011fum g\u00fcn\u00fc i\u00e7in haz\u0131rlad\u0131\u011f\u0131m\u0131z s\u00fcrpriz hakk\u0131nda her \u015feyi bildi\u011fi do\u011fru de\u011fil; hala bir s\u0131r.)\n\"No es verdad que\" bir ger\u00e7e\u011fi reddetti\u011fi/\u015f\u00fcpheye d\u00fc\u015f\u00fcrd\u00fc\u011f\u00fc i\u00e7in Subjuntivo ile kullan\u0131l\u0131r."},
{q:"soru 66\nResulta lamentable que el gobierno no __________ m\u00e1s dinero en la educaci\u00f3n y en la sanidad p\u00fablica de este pa\u00eds.",o:["invierte","invirti\u00f3","invertir\u00e1","invierta"],a:3,exp:"Resulta lamentable que el gobierno no invierta m\u00e1s dinero en la educaci\u00f3n y en la sanidad p\u00fablica de este pa\u00eds.\n(H\u00fck\u00fcmetin bu \u00fclkenin e\u011fitimine ve halk sa\u011fl\u0131\u011f\u0131na daha fazla para yat\u0131rmamas\u0131 ac\u0131nas\u0131/\u00fcz\u00fcl\u00fc bir durum.)\n\"Resulta lamentable que\" \u00fcz\u00fcnt\u00fc ve ele\u015ftirel bir yarg\u0131 belirtti\u011fi i\u00e7in Subjuntivo al\u0131r."},
{q:"soru 67\n\u00a1Qu\u00e9 pena que no __________ tiempo para venir con nosotros a la playa este fin de semana!",o:["tienes","tuviste","tendr\u00e1s","tengas"],a:3,exp:"\u00a1Qu\u00e9 pena que no tengas tiempo para venir con nosotros a la playa este fin de semana!\n(Bu hafta sonu bizimle plaja gelmek i\u00e7in vaktinin olmamas\u0131 ne yaz\u0131k/ne ac\u0131!)\n\"Qu\u00e9 pena que\" \u00fcz\u00fcnt\u00fc bildiren bir \u00fcnlem yap\u0131s\u0131 oldu\u011fu i\u00e7in Subjuntivo ile devam eder."},
{q:"soru 68\nBusco un apartamento en el centro de la ciudad que __________ mucha luz natural y una terraza con vistas al mar.",o:["tiene","tuvo","tendr\u00e1","tenga"],a:3,exp:"Busco un apartamento en el centro de la ciudad que tenga mucha luz natural y una terraza con vistas al mar.\n(\u015eehir merkezinde \u00e7ok do\u011fal \u0131\u015f\u0131k alan ve deniz manzaral\u0131 teras\u0131 olan bir daire ar\u0131yorum.)\nHen\u00fcz bulunmam\u0131\u015f, hayali veya ar\u0131nan bir \u00f6zellikten bahsedildi\u011fi i\u00e7in \"Busco un/una ... que\" yap\u0131s\u0131 Subjuntivo gerektirir."},
{q:"soru 69\nMe asusta que __________ algo malo en el mundo debido al cambio clim\u00e1tico; tenemos que cuidar m\u00e1s el planeta.",o:["ocurre","ocurri\u00f3","ocurrir\u00e1","ocurra"],a:3,exp:"Me asusta que ocurra algo malo en el mundo debido al cambio clim\u00e1tico; tenemos que cuidar m\u00e1s el planeta.\n(\u0130klim de\u011fi\u015fikli\u011fi nedeniyle d\u00fcnyada k\u00f6t\u00fc bir \u015fey olmas\u0131ndan korkuyorum; gezegene daha \u00e7ok bakmal\u0131y\u0131z.)\n\"Me asusta que\" bir korku/duygu belirtti\u011fi i\u00e7in Subjuntivo tetikleyicisidir."},
{q:"soru 70\nTe lo cuento ahora para que no te __________ por sorpresa cuando veas a Zeynep en la oficina el lunes por la ma\u00f1ana.",o:["pilla","pill\u00f3","pillar\u00e1","pille"],a:3,exp:"Te lo cuento ahora para que no te pille por sorpresa cuando veas a Zeynep en la oficina el lunes por la ma\u00f1ana.\n(Pazartesi sabah\u0131 ofiste Zeynep'i g\u00f6rd\u00fc\u011f\u00fcnde seni haz\u0131rl\u0131ks\u0131z yakalamasin/\u015fa\u015f\u0131rtmas\u0131n diye bunu sana \u015fimdi anlat\u0131yorum.)\n\"Para que\" (ama\u00e7 bildiren ba\u011fla\u00e7) her zaman Subjuntivo ile kullan\u0131l\u0131r."},
/* 71-100 */
{q:"soru 71\nVeo que Juan __________ mucho para sus clases, por eso no me sorprende que __________ buenas notas siempre.",o:["estudia / saque","estudie / saca","estudia / saca","estudie / saque"],a:0,exp:"\"Veo que Juan estudia mucho para sus clases, por eso no me sorprende que saque buenas notas siempre.\"\n(Juan'\u0131n \u00e7ok \u00e7al\u0131\u015ft\u0131\u011f\u0131n\u0131 g\u00f6r\u00fcyorum, bu y\u00fczden hep iyi not almas\u0131 beni \u015fa\u015f\u0131rtm\u0131yor.)\n\u0130lk k\u0131s\u0131m bir tespit/g\u00f6zlemdir (Indicativo), ikinci k\u0131s\u0131m \"me sorprende que\" ile duygu belirtir (Subjuntivo)."},
{q:"soru 72\nEs cierto que Luc\u00eda __________ mucho trabajo, pero dudo que __________ tiempo para venir al cine con nosotros.",o:["tenga / tiene","tiene / tenga","tenga / tenga","tiene / tiene"],a:1,exp:"\"Es cierto que Luc\u00eda tiene mucho trabajo, pero dudo que tenga tiempo...\"\n(Luc\u00eda'\u0131n \u00e7ok i\u015fi oldu\u011fu do\u011fru ama vaktinin oldu\u011fundan \u015f\u00fcpheliyim.)\n\"Es cierto\" kesinlik bildirir (Indicativo), \"Dudar\" \u015f\u00fcphe bildirir (Subjuntivo)."},
{q:"soru 73\nS\u00e9 que Harun __________ en Antalya, pero mi madre quiere que __________ a visitarnos a Esmirna pronto.",o:["viva / venga","vive / viene","vive / venga","viva / viene"],a:2,exp:"\"S\u00e9 que Harun vive en Antalya, pero mi madre quiere que venga...\"\n(Harun'un Antalya'da ya\u015fad\u0131\u011f\u0131n\u0131 biliyorum ama annem gelmesini istiyor.)\nBilgi verme \"Saber\" (Indicativo) gerektirirken, ba\u015fkas\u0131ndan istek \"Querer que\" (Subjuntivo) gerektirir."},
{q:"soru 74\nNo es verdad que Zeynep __________ enferma; yo veo que ella __________ muy contenta hoy.",o:["est\u00e1 / est\u00e9","est\u00e1 / est\u00e1","est\u00e9 / est\u00e9","est\u00e9 / est\u00e1"],a:3,exp:"\"No es verdad que Zeynep est\u00e9 enferma; yo veo que ella est\u00e1 muy contenta...\"\n(Zeynep'in hasta oldu\u011fu do\u011fru de\u011fil; onun \u00e7ok mutlu oldu\u011funu g\u00f6r\u00fcyorum.)\nBir ger\u00e7e\u011fi inkar etmek \"No es verdad\" (Subjuntivo) al\u0131rken, do\u011frudan g\u00f6zlem \"Ver\" (Indicativo) al\u0131r."},
{q:"soru 75\nMe da pena que no __________ sol hoy, ya que est\u00e1 claro que __________ a llover muy pronto.",o:["hace / vaya","haga / vaya","hace / va","haga / va"],a:3,exp:"\"Me da pena que no haga sol hoy, ya que est\u00e1 claro que va a llover...\"\n(G\u00fcne\u015f olmamas\u0131 beni \u00fcz\u00fcyor \u00e7\u00fcnk\u00fc ya\u011fmur ya\u011faca\u011f\u0131 net.)\nDuygu belirtme (Subjuntivo), netlik belirtme \"Est\u00e1 claro\" (Indicativo) gerektirir."},
{q:"soru 76\nCreo que el examen __________ f\u00e1cil, pero me asusta que __________ algunas preguntas muy dif\u00edciles.",o:["es / hay","sea / haya","es / haya","sea / hay"],a:2,exp:"\"Creo que el examen es f\u00e1cil, pero me asusta que haya...\"\n(S\u0131nav\u0131n kolay oldu\u011funa inan\u0131yorum ama zor sorular olmas\u0131ndan korkuyorum.)\n\"Creo que\" olumlu inan\u00e7t\u0131r (Indicativo), \"Me asusta que\" korku/duygu bildirir (Subjuntivo)."},
{q:"soru 77\nEst\u00e1 claro que t\u00fa __________ mucho talento; por eso quiero que __________ un gran proyecto este a\u00f1o.",o:["tengas / hagas","tienes / hagas","tienes / haces","tengas / haces"],a:1,exp:"\"Est\u00e1 claro que t\u00fa tienes mucho talento; por eso quiero que hagas...\"\n(Yetenekli oldu\u011fun a\u00e7\u0131k; bu y\u00fczden proje yapman\u0131 istiyorum.)\nNetlik (Indicativo), ba\u015fkas\u0131na y\u00f6nelik istek (Subjuntivo)."},
{q:"soru 78\nTe digo que el libro __________ muy bueno, as\u00ed que te aconsejo que lo __________ pronto.",o:["es / leas","sea / lees","es / lees","sea / leas"],a:0,exp:"\"Te digo que el libro es muy bueno, as\u00ed que te aconsejo que lo leas...\"\n(Kitab\u0131n iyi oldu\u011funu s\u00f6yl\u00fcyorum, okumanı tavsiye ederim.)\nBilgi aktar\u0131m\u0131 \"Decir\" (Indicativo), tavsiye verme \"Aconsejar\" (Subjuntivo)."},
{q:"soru 79\nNoto que el clima __________ mucho, por eso es importante que __________ m\u00e1s el medio ambiente.",o:["cambia / cuidemos","cambie / cuidamos","cambia / cuidamos","cambie / cuidemos"],a:0,exp:"\"Noto que el clima cambia mucho, por eso es importante que cuidemos...\"\n(\u0130klimin de\u011fi\u015fti\u011fini fark ediyorum, \u00e7evreyi korumam\u0131z \u00f6nemli.)\nTespit (Indicativo), gereklilik (Subjuntivo)."},
{q:"soru 80\nParece que Alex __________ cansado; sugiero que __________ un poco de caf\u00e9 antes de estudiar.",o:["est\u00e9 / bebe","est\u00e1 / bebe","est\u00e1 / beba","est\u00e9 / beba"],a:2,exp:"\"Parece que Alex est\u00e1 cansado; sugiero que beba...\"\n(Alex yorgun g\u00f6r\u00fcn\u00fcyor; kahve i\u00e7mesini \u00f6neririm.)\nG\u00f6zlem (Indicativo), \u00f6neri \"Sugerir\" (Subjuntivo)."},
{q:"soru 81\nBusco un hotel que __________ barato porque s\u00e9 que los precios __________ muy altos este a\u00f1o.",o:["es / son","sea / sean","es / sean","sea / son"],a:3,exp:"\"Busco un hotel que sea barato porque s\u00e9 que los precios son muy altos...\"\n(Ucuz olan bir otel ar\u0131yorum \u00e7\u00fcnk\u00fc fiyatlar\u0131n y\u00fcksek oldu\u011funu biliyorum.)\nBelirsiz bir \u00f6zellik aray\u0131\u015f\u0131 (Subjuntivo), kesin bilgi (Indicativo)."},
{q:"soru 82\nEs evidente que Zeytin __________ hambre; me alegra que __________ toda su comida hoy.",o:["tenga / coma","tiene / coma","tiene / come","tenga / come"],a:1,exp:"\"Es evidente que Zeytin tiene hambre; me alegra que coma...\"\n(Zeytin'in a\u00e7 oldu\u011fu a\u015fikar; yeme\u011fini yemesine seviniyorum.)\nBelirginlik (Indicativo), duygu (Subjuntivo)."},
{q:"soru 83\nSupongo que Luc\u00eda __________ en casa, pero prefiero que __________ al parque con nosotros.",o:["est\u00e9 / venga","est\u00e1 / venga","est\u00e1 / viene","est\u00e9 / viene"],a:1,exp:"\"Supongo que Luc\u00eda est\u00e1 en casa, pero prefiero que venga...\"\n(San\u0131r\u0131m Lucia evde ama gelmesini tercih ederim.)\nOlumlu tahmin (Indicativo), tercih belirtme (Subjuntivo)."},
{q:"soru 84\nNo creo que David __________ la verdad, aunque es obvio que __________ algo extra\u00f1o en su cara.",o:["sabe / hay","sepa / haya","sabe / haya","sepa / hay"],a:3,exp:"\"No creo que David sepa la verdad, aunque es obvio que hay...\"\n(David'in do\u011fruyu bildi\u011fine inanm\u0131yorum ama y\u00fczünde bir \u015fey oldu\u011fu ortada.)\n\u015e\u00fcphe/\u0130nanmama (Subjuntivo), netlik (Indicativo)."},
{q:"soru 85\nVeo que la puerta __________ abierta; me extra\u00f1a que nadie la __________ cerrado todav\u00eda.",o:["est\u00e1 / haya","est\u00e9 / ha","est\u00e1 / ha","est\u00e9 / haya"],a:0,exp:"\"Veo que la puerta est\u00e1 abierta; me extra\u00f1a que nadie la haya cerrado...\"\n(Kap\u0131n\u0131n a\u00e7\u0131k oldu\u011funu g\u00f6r\u00fcyorum, kapat\u0131lmam\u0131\u015f olmas\u0131 beni \u015fa\u015f\u0131rt\u0131yor.)\nG\u00f6zlem (Indicativo), \u015fa\u015f\u0131rma/duygu (Subjuntivo)."},
{q:"soru 86\nEs verdad que nosotros __________ mucho espa\u00f1ol, pero es necesario que __________ un poco m\u00e1s cada d\u00eda.",o:["sepamos / estudiemos","sabemos / estudiamos","sabemos / estudiemos","sepamos / estudiamos"],a:2,exp:"\"Es verdad que sabemos mucho espa\u00f1ol, pero es necesario que estudiemos...\"\n(Bildi\u011fimiz do\u011fru ama \u00e7al\u0131\u015fmam\u0131z gerek.)\nDo\u011frulama/Ger\u00e7ek (Indicativo), gereklilik (Subjuntivo)."},

{q:"soru 92\nDudo que Luc\u00eda __________ la respuesta, a pesar de que s\u00e9 que ella __________ mucho para este examen.",o:["sabe / estudie","sepa / estudie","sabe / estudia","sepa / estudia"],a:3,exp:"\"Dudo que Luc\u00eda sepa la respuesta, a pesar de que s\u00e9 que ella estudia...\"\n(Bildi\u011finden \u015f\u00fcpheliyim oysa \u00e7al\u0131\u015ft\u0131\u011f\u0131n\u0131 biliyorum.)\n\u015e\u00fcphe (Subjuntivo), kesin bilgi (Indicativo)."},
{q:"soru 93\nEs l\u00f3gico que t\u00fa __________ nervioso; est\u00e1 claro que este examen __________ muy dif\u00edcil.",o:["est\u00e1s / es","est\u00e9s / es","est\u00e1s / sea","est\u00e9s / sea"],a:1,exp:"\"Es l\u00f3gico que est\u00e9s nervioso; est\u00e1 claro que este examen es...\"\n(Gergin olman mant\u0131kl\u0131; s\u0131nav\u0131n zor oldu\u011fu ortada.)\nMant\u0131ksal yarg\u0131 (Subjuntivo), netlik (Indicativo)."},

{q:"soru 100\nEs obvio que Roberto __________ cansado, por eso le pido que __________ un poco m\u00e1s.",o:["est\u00e9 / descanse","est\u00e1 / descansa","est\u00e1 / descanse","est\u00e9 / descansa"],a:2,exp:"\"Es obvio que Roberto est\u00e1 cansado, por eso le pido que descanse...\"\n(Yorgun oldu\u011fu ortada, bu y\u00fczden dinlenmesini rica ediyorum.)\nNetlik (Indicativo), rica/istek (Subjuntivo)."}
];

var state={cur:0,answered:[],scores:[],okCount:0,errCount:0};

function getRef(i){
  if(i>=0&&i<=29)return 1;
  if(i>=30&&i<=49)return 2;
  if(i>=50&&i<=69)return 3;
  return 0;
}

function renderRefBox(i){
  var r=getRef(i);
  var el=document.getElementById('refBox');
  if(r===1){
    var html='<div class="ref-box"><div class="ref-box-title">Expresiones para usar en las preguntas 1-30</div><div class="ref-pills">';
    for(var k=0;k<REF1.length;k++)html+='<span class="ref-pill">'+escR(REF1[k])+'</span>';
    html+='</div></div>';
    el.innerHTML=html;
  } else if(r===2){
    var html='<div class="ref-box"><div class="ref-box-title">Opciones para usar en las preguntas 31-50</div><div class="ref-pills">';
    for(var k=0;k<REF2.length;k++)html+='<span class="ref-pill">'+escR(REF2[k])+'</span>';
    html+='</div></div>';
    el.innerHTML=html;
  } else if(r===3){
    var html='<div class="ref-box"><div class="ref-box-title">Opciones para usar en las preguntas 51-70</div><div class="ref-pills">';
    for(var k=0;k<REF3.length;k++)html+='<span class="ref-pill">'+escR(REF3[k])+'</span>';
    html+='</div></div>';
    el.innerHTML=html;
  } else {
    el.innerHTML='';
  }
}

function escR(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function startQuiz(){
  var name=document.getElementById('introName').value;
  if(!name){alert('L\u00fctfen ad\u0131n\u0131z\u0131 se\u00e7in.');return;}
  document.getElementById('resName').value=name;
  document.getElementById('resName2').value=name;
  document.getElementById('introScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  renderQ();
}

function syncResName(){
  document.getElementById('resName').value=document.getElementById('resName2').value;
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderQ(){
  var i=state.cur;var q=Q[i];
  renderRefBox(i);
  var html='<span class="q-type-badge badge-mc">\u00c7OKTAN SE\u00c7MEL\u0130</span>';
  html+='<div class="q-text">'+esc(q.q)+'</div>';
  html+='<div class="opts">';
  var L=['A','B','C','D'];
  for(var j=0;j<q.o.length;j++){
    var cls='opt-btn';var dis='';var ans=state.answered[i];
    if(ans!==undefined){dis='disabled';if(j===q.a)cls+=' correct';else if(j===ans&&ans!==q.a)cls+=' wrong';}
    html+='<button class="'+cls+'" '+dis+' onclick="checkAns('+j+')"><strong>'+L[j]+')</strong> '+esc(q.o[j])+'</button>';
  }
  html+='</div>';
  html+='<div class="exp-box'+(state.answered[i]!==undefined?' show':'')+'">'+esc(q.exp)+'</div>';
  document.getElementById('qCard').innerHTML=html;
  var done=state.answered[i]!==undefined;
  document.getElementById('btnBack').disabled=(i===0);
  document.getElementById('btnNext').disabled=(!done||i===Q.length-1);
  document.getElementById('btnSkip').disabled=(i>=Q.length-1);
  document.getElementById('qMeta').textContent='Soru '+(i+1)+' / '+Q.length;
  document.getElementById('progFill').style.width=((i+1)/Q.length*100)+'%';
  document.getElementById('cntOk').textContent='\u2713 '+state.okCount;
  document.getElementById('cntErr').textContent='\u2717 '+state.errCount;
}

function checkAns(j){
  var i=state.cur;
  if(state.answered[i]!==undefined)return;
  state.answered[i]=j;
  if(j===Q[i].a){state.okCount++;state.scores[i]=1;}
  else{state.errCount++;state.scores[i]=0;}
  renderQ();
}

function goNext(){if(state.cur<Q.length-1){state.cur++;renderQ();}}
function goBack(){if(state.cur>0){state.cur--;renderQ();}}
function skipQ(){if(state.cur<Q.length-1){state.cur++;renderQ();}}

function confirmFinish(){
  var answered=0;
  for(var i=0;i<Q.length;i++){if(state.answered[i]!==undefined)answered++;}
  var unanswered=Q.length-answered;
  var msg='Toplam '+Q.length+' sorudan '+answered+' tanesini cevaplad\u0131n\u0131z.';
  if(unanswered>0)msg+='\n\n'+unanswered+' soru cevaps\u0131z kalacak (0 puan).';
  msg+='\n\nTesti bitirmek istedi\u011finize emin misiniz?';
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmOverlay').style.display='flex';
}

function closeConfirm(){document.getElementById('confirmOverlay').style.display='none';}
function doFinish(){closeConfirm();showResult();}

function showResult(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  var total=0;
  for(var i=0;i<Q.length;i++){total+=(state.scores[i]||0);}
  var pct=Math.round(total*100/Q.length);
  document.getElementById('resScore').textContent=pct;
  document.getElementById('resOk').textContent='\u2713 '+state.okCount+' do\u011fru';
  document.getElementById('resErr').textContent='\u2717 '+state.errCount+' yanl\u0131\u015f';
  document.getElementById('resNote').textContent='100 sorudan '+state.okCount+' tanesi do\u011fru';
  document.getElementById('submitWarning').style.display='block';
  document.getElementById('btnSubmit').style.display='block';
  var L=['A','B','C','D'];
  var html='';
  for(var i=0;i<Q.length;i++){
    var ans=state.answered[i];
    if(ans===undefined||ans===Q[i].a)continue;
    var q=Q[i];
    html+='<div class="rev-item"><div class="rev-q">'+esc(q.q.split('\n')[0])+' — '+esc(q.q.split('\n')[1]||'')+'</div>';
    html+='<div class="rev-chosen">Verdi\u011finiz cevap: '+esc(q.o[ans])+'</div>';
    html+='<div class="rev-correct">Do\u011fru cevap: '+esc(q.o[q.a])+'</div>';
    html+='<div class="rev-exp">'+esc(q.exp)+'</div></div>';
  }
  document.getElementById('reviewList').innerHTML=html||'<div style="padding:.5rem;color:#666">Yanl\u0131\u015f soru bulunamad\u0131.</div>';
}

function toggleReview(){
  var rv=document.getElementById('reviewList');
  rv.style.display=(rv.style.display==='flex'?'none':'flex');
}

var submitted=false;
function submitResult(){
  if(submitted)return;
  var name=document.getElementById('resName').value;
  if(!name){alert('L\u00fctfen isminizi se\u00e7in.');return;}
  var total=0;
  for(var i=0;i<Q.length;i++){total+=(state.scores[i]||0);}
  var pct=Math.round(total*100/Q.length);
  var payload=JSON.stringify({ogrenci:name,odev:ODEV_ADI,grup:'B1.1',puan:pct,dogru:state.okCount,yanlis:state.errCount,tarih:new Date().toLocaleDateString('tr-TR')});
  document.getElementById('submitMsg').style.display='block';
  document.getElementById('submitMsg').textContent='G\u00f6nderiliyor...';
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:payload})
  .then(function(){
    submitted=true;
    document.getElementById('submitWarning').style.display='none';
    document.getElementById('btnSubmit').style.display='none';
    document.getElementById('submitMsg').textContent=name+' \u00f6\u011frencisinin \u201c'+ODEV_ADI+'\u201d \u00f6devi teslim edildi. Puan: '+pct+'/100. Te\u015fekk\u00fcrler!';
  })
  .catch(function(){
    submitted=true;
    document.getElementById('submitWarning').style.display='none';
    document.getElementById('btnSubmit').style.display='none';
    document.getElementById('submitMsg').textContent=name+' \u00f6\u011frencisinin \u201c'+ODEV_ADI+'\u201d \u00f6devi teslim edildi. Puan: '+pct+'/100.';
  });
}
</script>
